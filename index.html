<!DOCTYPE html>
<html lang="zh-TW" data-v="26">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>еЈ•з®ЛзЉЇе§±ињљиє§з≥їзµ±</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#6B6F72;--surface:#F4F2EF;--card:#fff;--border:#D0CEC9;--border2:#E8E6E2;
  --text:#1E1D1B;--text2:#5F5E5A;--text3:#9A9896;
  --purple:#3C3489;--green:#2E6B26;--green-lt:#EAF6E7;
  --red:#A32D2D;--red-lt:#FFF0F0;--amber:#7A4200;--amber-lt:#FFF4E0;
  --blue:#185FA5;--blue-lt:#EBF4FF;
  --font:'Noto Sans TC',sans-serif;--r:10px;--rs:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.shell{max-width:1700px;margin:0 auto;padding:14px}
.page-hdr{color:#fff;font-size:19px;font-weight:700;letter-spacing:.04em;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.page-hdr span{font-size:12px;font-weight:400;opacity:.65}
.card{border-radius:14px;padding:16px;transition:box-shadow .3s}
.card-main  {background:#F0EEF8;box-shadow:0 2px 14px rgba(60,52,137,.13)}
.card-main:hover{box-shadow:0 8px 32px rgba(60,52,137,.22)}
.card-vendor{background:#EEF6F0;box-shadow:0 2px 14px rgba(15,110,86,.11)}
.card-vendor:hover{box-shadow:0 8px 32px rgba(15,110,86,.22)}
.card-warn  {background:#FFF5EE;box-shadow:0 2px 14px rgba(163,45,45,.11)}
.card-warn:hover{box-shadow:0 8px 32px rgba(163,45,45,.22)}
.card-cal   {background:#EEF4FF;box-shadow:0 2px 14px rgba(24,95,165,.11)}
.card-cal:hover{box-shadow:0 8px 32px rgba(24,95,165,.22)}
.card-zones {background:#FFFAEE;box-shadow:0 2px 14px rgba(122,66,0,.11)}
.card-zones:hover{box-shadow:0 8px 32px rgba(122,66,0,.22)}
.card-mgr   {background:#FFF0F8;box-shadow:0 2px 14px rgba(122,0,85,.11)}
.card-mgr:hover{box-shadow:0 8px 32px rgba(122,0,85,.22)}

/* вФАвФА Tabs вАФ aligned grid style вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.tabs-wrap{margin-bottom:14px;position:relative;padding-top:24px}
.tab-btn-group{position:absolute;right:0;top:0;display:flex;gap:6px}
.tab-edit-btn{font-size:10.5px;padding:3px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px}
.tab-edit-btn:hover{color:var(--text);border-color:var(--text2)}
.tab-edit-btn.active{color:var(--purple);border-color:var(--purple);background:rgba(60,52,137,.06)}
.tab-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px 6px;border-bottom:1.5px solid var(--border);padding-bottom:4px}
.tab{padding:7px 6px 7px 10px;font-size:11.5px;font-weight:500;cursor:pointer;
  border:1px solid var(--border2);border-bottom:none;background:var(--surface);
  color:var(--text2);border-radius:8px 8px 0 0;margin-bottom:-1.5px;
  font-family:var(--font);white-space:nowrap;transition:color .15s,background .15s;user-select:none;
  min-width:0;text-align:left;overflow:hidden;text-overflow:ellipsis}
.tab:hover{color:var(--text);background:var(--border2)}
.tab.active{color:var(--purple);font-weight:700;background:var(--card);border-color:var(--border);border-bottom:1.5px solid var(--card);position:relative;z-index:1}
.tab-filler{box-sizing:border-box;min-height:33px;padding:7px 6px;border:1px solid transparent;border-bottom:1.5px solid var(--border);margin-bottom:-1.5px;visibility:hidden}
.tabs-wrap.edit-mode .tab-filler{border:1px dashed var(--border2);border-radius:8px;margin-bottom:0;visibility:visible}
/* вФАвФА Tab edit mode вАФ binder/жіїй†Б style, even grid, draggable in any direction вФА */
.tabs-wrap.edit-mode .tab-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:5px;border-bottom:none;margin-bottom:5px}
.tabs-wrap.edit-mode .tab{
  border:1px solid var(--border);border-radius:8px 8px 0 0;background:var(--card);
  min-width:0;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:grab;margin-bottom:0;border-bottom:1px solid var(--border);white-space:nowrap}
.tabs-wrap.edit-mode .tab.active{color:var(--purple);background:rgba(60,52,137,.08);border-color:var(--purple)}
.tabs-wrap.edit-mode .tab.tab-drag-over{border-color:var(--amber);border-width:2px}
.tab-grip{font-size:10px;color:var(--text3);line-height:1}

/* вФАвФА Alert / Event tables вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.ae-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.ae-tbl th{background:#ECEAE6;font-size:11px;font-weight:600;color:var(--text2);padding:6px 7px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.ae-tbl td{padding:5px 6px;border-bottom:1px solid var(--border2);vertical-align:middle}
.ae-tbl tr:last-child td{border-bottom:none}
.ae-tbl tr:hover td{background:rgba(0,0,0,.02)}
.ae-tbl input[type=text],.ae-tbl textarea{width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);outline:none;background:var(--card)}
.ae-tbl input[type=text]:focus,.ae-tbl textarea:focus{border-color:var(--purple)}
.ae-tbl textarea{min-height:34px;resize:vertical}
.ae-tbl input[type=date]{font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);outline:none;background:var(--card);color:var(--text)}
.ae-tbl input[type=date]:focus{border-color:var(--purple)}
.ae-tbl select{width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);outline:none;background:var(--card)}
.ae-sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.ae-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ae-sec-title{font-size:13px;font-weight:700;flex:1}
.ae-done-date{color:var(--green);font-weight:600}
.ae-overdue{color:var(--red);font-weight:600}
.ae-id{color:var(--text3);font-size:10px;text-align:center;width:24px}
.card-event{background:#F0F4FF;box-shadow:0 2px 14px rgba(24,95,165,.13)}
.card-done{background:#EAF6E7;box-shadow:0 2px 14px rgba(46,107,38,.13)}
.card-done:hover{box-shadow:0 8px 32px rgba(46,107,38,.22)}
.card-event:hover{box-shadow:0 8px 32px rgba(24,95,165,.22)}


/* вФАвФА Progress bar вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.prog-wrap{margin-top:5px;background:#E8E6E2;border-radius:4px;height:7px;overflow:hidden}
.prog-bar{height:7px;border-radius:4px;transition:width .4s}
.prog-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-align:right}

/* вФАвФА PDF import button вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.btn-pdf-import{background:#E8E0F8;color:#3C3489;border:1px solid #C4B8F0}
.btn-pdf-import:hover{background:#D8CCF4}


/* вФАвФА Pagination вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
.pg-bar{display:flex;align-items:center;gap:6px;padding:8px 4px;flex-wrap:wrap}
.pg-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font)}
.pg-btn:hover{background:var(--surface)}
.pg-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:11px;color:var(--text2);margin:0 6px}

/* drag tabs */
.tab.tab-drag-over{border-bottom:2.5px solid var(--amber)!important}

.bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.bar select{font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);font-family:var(--font);outline:none}
.bar select:focus{border-color:var(--purple)}
.btn{font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .18s}
.btn:hover{background:var(--border2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-p{background:var(--purple)!important;color:#fff!important;border-color:var(--purple)!important;font-weight:500}
.btn-p:hover{background:#2a2460!important}
.btn-d{background:var(--red-lt)!important;color:var(--red)!important;border-color:#ffcaca!important}
.btn-pdf{background:#fff3e0!important;color:#a34200!important;border-color:#f5c07a!important}
.btn-g{background:var(--green-lt)!important;color:var(--green)!important;border-color:#b5d9ae!important}
.btn-sm{padding:3px 8px!important;font-size:11px!important}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-bottom:12px}
.stat{background:rgba(255,255,255,.65);border-radius:var(--rs);padding:.6rem .85rem;border:1px solid rgba(255,255,255,.9)}
.stat-l{font-size:10px;color:var(--text2);margin-bottom:2px;font-weight:500;letter-spacing:.04em}
.stat-v{font-size:21px;font-weight:700}

.bulk-bar{display:none;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(60,52,137,.08);border:1px solid rgba(60,52,137,.2);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:12px}
.bulk-bar.show{display:flex}
.bulk-bar select,.bulk-bar input[type=text],.bulk-bar input[type=date]{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);outline:none;background:var(--card)}

.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--card);box-shadow:0 1px 6px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#ECEAE6;font-weight:600;font-size:10px;color:var(--text2);padding:7px 4px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:bottom}
thead th.th-chk{width:26px;text-align:center}
thead th.th-date{white-space:normal;line-height:1.3}
tbody tr{border-bottom:1px solid var(--border2);transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:rgba(60,52,137,.04)!important}
tbody tr.r-over td{background:#FFF0F0!important}
tbody tr.r-w3 td{background:#FFF4E0!important}
tbody tr.r-w7 td{background:#EBF4FF!important}
tbody tr.r-done td{background:#EAF6E7!important}
tbody tr.row-sel td{background:rgba(60,52,137,.1)!important;outline:1px solid var(--purple)}
td{padding:4px 4px;vertical-align:top;overflow:hidden}
td.td-txt{white-space:pre-wrap;word-break:break-all;min-width:90px;max-width:220px}
td.td-issue{white-space:pre-wrap;word-break:break-all;min-width:100px;max-width:240px}
td input[type=text],td textarea,td select{font-size:11px;padding:3px 4px;border:1px solid var(--border);border-radius:3px;background:var(--card);color:var(--text);font-family:var(--font);width:100%;outline:none}
td input[type=text],td select{height:36px;box-sizing:border-box}
td input[type=text]:focus,td select:focus,td textarea:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(60,52,137,.08)}
td input[type=date]{font-size:10px;padding:2px 3px;border:1px solid var(--border);border-radius:3px;width:auto;background:var(--card);color:var(--text);min-width:0}
td input[type=date]:focus{border-color:var(--purple)}
td input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--purple)}
td textarea{resize:vertical;min-height:32px;line-height:1.5}
.dow-lbl{font-size:10px;color:var(--purple);font-weight:600;margin-left:4px;white-space:nowrap}
.date-wrap{display:flex;align-items:center;flex-wrap:nowrap;gap:2px;margin-bottom:3px}
.date-pre{font-size:9px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
.date-pre.plan{color:#185FA5}.date-pre.actual{color:#2E6B26}

.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.bdone{background:var(--green-lt);color:var(--green)}.bover{background:var(--red-lt);color:var(--red)}
.b3{background:var(--amber-lt);color:var(--amber)}.b7{background:var(--blue-lt);color:var(--blue)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 3px;border-radius:3px;font-size:13px;line-height:1}
.del-btn:hover{color:var(--red);background:var(--red-lt)}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:12px}

#toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;background:var(--purple);color:#fff;border-radius:var(--rs);padding:9px 15px;font-size:12px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.22);animation:tIn .2s ease;max-width:320px}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:14px;padding:22px 24px;min-width:300px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.modal input[type=text]{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);outline:none;margin-bottom:12px}
.modal input[type=text]:focus{border-color:var(--purple)}
.modal .modal-btns{display:flex;gap:8px;justify-content:flex-end}

.sec{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);transition:box-shadow .2s}
.sec:hover{box-shadow:0 5px 18px rgba(0,0,0,.12)}
.sec-hdr{padding:8px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sec-hdr-l{display:flex;align-items:center;gap:8px}

.vcards{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:12px}
.vcards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.vc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer;transition:all .18s}
.vc:hover{border-color:#888;transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.vc.sel{border:2px solid var(--purple);box-shadow:0 0 0 3px rgba(60,52,137,.12)}
.vc-name{font-size:12px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.vc-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border2)}
.vc-row:last-child{border-bottom:none}

.side-editor{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;width:230px;flex-shrink:0;box-shadow:0 1px 5px rgba(0,0,0,.07)}
/* drag-sortable list */
.ed-list{list-style:none}
.ed-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2);cursor:default}
.ed-item:last-child{border-bottom:none}
.ed-item.drag-over{border-top:2px solid var(--purple)}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;flex-shrink:0;user-select:none;padding:0 2px}
.drag-handle:active{cursor:grabbing}

.ztab{padding:7px 14px;font-size:12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--card);color:var(--text2);font-family:var(--font);font-weight:500;transition:all .15s}
.ztab:hover{border-color:#888;transform:translateY(-1px)}
.ztab.active{color:#fff;border-color:transparent;font-weight:600}
.zs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.zs-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;border-left:4px solid transparent;cursor:pointer;transition:all .18s}
.zs-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.zs-card.sel{box-shadow:0 0 0 2px var(--purple)}
.zs-title{font-size:12px;font-weight:600;margin-bottom:7px}
.zs-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border2)}
.zs-row:last-child{border-bottom:none}

.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#ECEAE6;border-bottom:1px solid var(--border)}
.cal-lbl{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:5px 0;background:var(--surface);border-bottom:1px solid var(--border2)}
.cal-dow.wknd{color:var(--red)}
.cal-cell{min-height:90px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:4px;background:var(--card);vertical-align:top;transition:background .12s}
.cal-cell:hover{background:#F6F4FF}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.today-c{background:#F0EEFF}
.cal-cell.wknd-c{background:#FAFAF8}
.cal-dnum{font-size:10px;font-weight:600;margin-bottom:2px;line-height:1.3}
.cal-dnum.today-n{background:var(--purple);color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:9px}
.cal-ev{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.ev-in{background:#B5D4F4;color:#042C53}
.ev-done{background:#C0DD97;color:#173404}
.ev-ad{background:#CECBF6;color:#26215C}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text2);padding:7px 13px;border-bottom:1px solid var(--border2)}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.import-drop{border:2px dashed var(--border);border-radius:var(--r);padding:14px;text-align:center;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:12px}
.import-drop:hover,.import-drop.drag{border-color:var(--purple);background:rgba(60,52,137,.04)}

window._fbSave = async function(data){
  try{
    await setDoc(ref, { payload: JSON.stringify(data) }, { merge: true });

};

window._fbListen = function(onChange){
  let _snapTimer=null;
  return onSnapshot(ref, snap => {
    if(!snap.exists()) return;
    clearTimeout(_snapTimer);
    _snapTimer=setTimeout(()=>{
      try{
        const d = JSON.parse(snap.data().payload);
        if(d && d.rows) onChange(d);
      } catch(e){ console.error('[Firebase] parse error', e); }
    },500);
  });
};

window._fbLoad = async function(){

  } catch(e){ console.error('[Firebase] load error', e); return null; }
};

// вФАвФА еМѓеЗЇжЬ™дЊЖNе§©дЇ§е±ЛжИґеИ•зЉЇе§±жЄЕеЦЃпЉИдЊЫжОТз®ЛдїїеЛЩиЃАеПЦпЉМжЛЖжИРе§Ъз≠Же∞ПжЦЗдїґйБњеЕНеЦЃз≠ЖйБОе§ІпЉЙвФАвФА
// еЃМеЕ®зН®зЂЛеѓ¶дљЬпЉМдЄНдЊЭи≥і classic script еЕІзЪДеЕ®еЯЯеЗљеЉП/иЃКжХЄпЉИmodule scope зД°ж≥Хе≠ШеПЦпЉЙ
window.exportHandoverExport = async function(days){
  days = days || 14;
  try{
    const esc2=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const DOW2=['жЧ•','дЄА','дЇМ','дЄЙ','еЫЫ','дЇФ','еЕ≠'];
    const pd2=s=>{if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return isNaN(d)?null:d};
    const fmtMD2=s=>{const d=pd2(s);if(!d)return'';return`${d.getMonth()+1}/${d.getDate()}(${DOW2[d.getDay()]})`};
    const TODAY2=new Date();TODAY2.setHours(0,0,0,0);
    const du2=s=>{const d=pd2(s);if(!d)return null;return Math.ceil((d-TODAY2)/86400000)};
    const getStatus2=r=>{
      if(r.actualDone)return'done';
      const d=du2(r.planDone);
      if(d!==null&&d<0)return'overdue';
      if(r.actualIn)return'ongoing';
      return'pending';
    };
    const unitDisplayName2=key=>!key?'':String(key).replace(/^(еЬ∞|ж•≠)/,'');

    const fb = await window._fbLoad();
    if(!fb || !fb.handoverUnits) return {error:'no data from _fbLoad'};
    const hu = fb.handoverUnits;
    const allRows=[...(fb.completed||[]),...(fb.rows||[])];
    const defectCache=new Map();
    allRows.forEach(r=>{
      if(!r.unit)return;
      const k=String(r.unit).trim();
      if(!defectCache.has(k))defectCache.set(k,[]);
      defectCache.get(k).push(r);
    });
    const getDefectRows2=unitKey=>{
      if(!unitKey)return[];
      const displayName=unitDisplayName2(unitKey);
      const m=displayName.match(/^([A-Za-z]+\d*)-(\d+)$/);
      const col=m?m[1].toUpperCase():'';
      const flr=m?m[2]:'';
      const seen=new Set();const result=[];
      const addRows=rows=>{if(!rows)return;rows.forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);result.push(r);}});};
      addRows(defectCache.get(unitKey));addRows(defectCache.get(displayName));
      addRows(defectCache.get(String(unitKey).toUpperCase()));addRows(defectCache.get(displayName.toUpperCase()));
      if(col&&flr&&result.length===0){
        defectCache.forEach((rows,ru)=>{
          if(!rows.length)return;
          const clean=ru.replace(/^(еЬ∞|ж•≠)/,'').trim();
          if(clean.toUpperCase()===displayName.toUpperCase()){addRows(rows);return;}
          const ruCol=clean.replace(/[(пЉИ][^)пЉЙ]*[)пЉЙ]/g,'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
          if(ruCol===col){
            const matched=rows.filter(r=>String(r.floor||'').replace(/[^0-9]/g,'')===flr);
            if(matched.length)addRows(matched);
          }
        });
      }
      return result;
    };
    const hoUnitPct2=unit=>{
      const rows=getDefectRows2(unit);
      if(!rows.length)return null;
      const completedCnt=rows.filter(r=>r.compId!=null).length;
      return Math.round(completedCnt/rows.length*100);
    };
    const hoGrade2=pct=>{
      if(pct===null)return{label:'зД°и≥ЗжЦЩ',color:'#B4B2A9'};
      if(pct===100)return{label:'вЬЕ еПѓдЇ§е±Л',color:'#3B6D11'};
      if(pct>=90) return{label:'рЯФµ жО•ињСеЃМжИР',color:'#185FA5'};
      if(pct>=80) return{label:'рЯЯ° йА≤и°МдЄ≠',color:'#854F0B'};
      if(pct>=60) return{label:'рЯЯ† еЊЕеК†еЉЈ',color:'#BA7517'};
      return{label:'рЯФі жЬ™еЃМжИР',color:'#A32D2D'};
    };
    const unitDefectsBody2=unitKey=>{
      const rows=getDefectRows2(unitKey);
      const huu=hu[unitKey]||{};
      const cl=(fb.clientData&&fb.clientData[unitKey])||{};
      const displayName=unitDisplayName2(unitKey);
      const pct=hoUnitPct2(displayName)??hoUnitPct2(unitKey);
      const grade=hoGrade2(pct);
      const info=`<div style="margin-bottom:10px;font-size:11px;color:#555">
        <span>жИґеИ•пЉЪ<strong>${esc2(unitKey)}</strong></span>
        ${cl.name?`<span style="margin-left:12px">еЃҐжИґпЉЪ${esc2(cl.name)}</span>`:''}
        ${cl.tel?`<span style="margin-left:12px">йЫїи©±пЉЪ${esc2(cl.tel)}</span>`:''}
        <span style="margin-left:12px">еЃМжИРеЇ¶пЉЪ<strong style="color:${grade.color}">${pct??'вАФ'}%</strong></span>
        ${huu.planDate?`<span style="margin-left:12px">й†РеЃЪй©ЧжФґпЉЪ${huu.planDate}</span>`:''}
      </div>`;
      const thead=`<tr><th>еї†еХЖ</th><th>зЉЇе§±еЕІеЃє</th><th>еВЩи®ї</th><th>й†Ри®ИйА≤е†і</th><th>й†Ри®ИеЃМжИР</th><th>еѓ¶йЪЫеЃМжИР</th><th>зЛАжЕЛ</th></tr>`;
      const tbody=rows.map(r=>{const st=getStatus2(r);const stLabel={done:'еЈ≤еЃМжИР',ongoing:'йА≤и°МдЄ≠',overdue:'йАЊжЬЯ',pending:'жЬ™йЦЛеІЛ'}[st]||'';return`<tr class="r-${st}"><td>${esc2(r.vendor)}</td><td>${esc2(r.issue)}</td><td>${esc2(r.note)}</td><td>${fmtMD2(r.planIn)}</td><td>${fmtMD2(r.planDone)}</td><td>${r.actualDone?fmtMD2(r.actualDone):'вАФ'}</td><td>${stLabel}</td></tr>`;}).join('');
      const empty=!rows.length?'<p style="color:#888;font-size:11px">ж≠§жИґзЫЃеЙНзД°зЉЇе§±й†ЕзЫЃи®ШйМД</p>':'';
      return info+(rows.length?`<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`:empty);
    };

    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(today); end.setDate(end.getDate()+days);
    const fmt = d => d.toISOString().slice(0,10);
    const keys = Object.keys(hu).filter(k=>{
      const p = hu[k].planDate;
      if(!p) return false;
      const d = new Date(p);
      return d>=today && d<=end;
    }).sort((a,b)=> (hu[a].planDate||'').localeCompare(hu[b].planDate||''));

    // еРМжЩВеѓЂеЕ•еИЖй†БеРИдљµ HTMLпЉМдЊЫжОТз®ЛдїїеЛЩдї•еЫЇеЃЪиЈѓеЊСпЉИзД° pageTokenпЉЙиЃАеПЦ
    const pageCol = collection(db,'projects/main/export_pages');
    const oldPages = await getDocs(pageCol);
    for(const d of oldPages.docs){ await deleteDoc(d.ref); }
    const CHUNK = 8;
    let pageCount = 0;
    for(let i=0;i<keys.length;i+=CHUNK){
      const chunk = keys.slice(i,i+CHUNK);
      let body='';
      chunk.forEach((k,idx)=>{
        const html = `<h3 style="font-size:13px;font-weight:700;margin:0 0 8px;color:#3C3489">${esc2(unitDisplayName2(k))}пЉИй†РеЃЪдЇ§е±ЛпЉЪ${hu[k].planDate||''}пЉЙ</h3>${unitDefectsBody2(k)}`;
        body += `<div style="${(i+idx)>0?'page-break-before:always;':''}padding-top:${(i+idx)>0?'14px':'0'}">${html}</div>`;
      });
      await setDoc(doc(pageCol, 'page'+pageCount), { body, from: i, to: Math.min(i+CHUNK,keys.length) });
      pageCount++;
    }
    await setDoc(doc(db,'projects/main/meta','handover_export'), {
      generatedAt: Date.now(), dateFrom: fmt(today), dateTo: fmt(end),
      order: keys.map(k=>k.replace(/[\/\.]/g,'_')), count: keys.length, pageCount
    });
    return { ok:true, count: keys.length, pageCount, dateFrom: fmt(today), dateTo: fmt(end) };
  } catch(e){ return { error: String(e) }; }
};

// вФАвФА PresenceпЉИиЈ®и£ЭзљЃеЬ®зЈЪдЇЇжХЄпЉЙвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
(async function setupPresence(){
  const PRESENCE_COL = 'projects/main/presence';
  const SESSION_ID = Math.random().toString(36).slice(2)+Date.now().toString(36);
  const presRef = doc(db, PRESENCE_COL, SESSION_ID);
  const HEARTBEAT_MS = 10000;  // жѓП 10 зІТжЫіжЦ∞дЄАжђ°
  const STALE_MS = 25000;      // иґЕйБО 25 зІТи¶ЦзВЇйЫҐзЈЪ

  async function writeHeartbeat(){
    try{
      await setDoc(presRef, { t: Date.now(), alive: true }, { merge: true });
    }catch(e){}
  }

  async function removeSession(){
    try{ await deleteDoc(presRef); }catch(e){}
  }

  // йЫҐйЦЛжЩВеИ™йЩ§ presence
  window.addEventListener('beforeunload', ()=>{ removeSession(); });
  window.addEventListener('pagehide', ()=>{ removeSession(); });

  // еЃЪжЬЯењГиЈ≥
  await writeHeartbeat();
  setInterval(writeHeartbeat, HEARTBEAT_MS);

  // зЫ£иБљ presence йЫЖеРИпЉМи®ИзЃЧеЬ®зЈЪдЇЇжХЄ
  onSnapshot(collection(db, PRESENCE_COL), snap=>{
    const now=Date.now();
    let count=0;
    snap.forEach(d=>{
      const data=d.data();
      const t=typeof data.t==='number'?data.t:(data.t?.seconds?data.t.seconds*1000:0);
      if(now-t < STALE_MS) count++;
    });
    // жЫіжЦ∞зХЂйЭҐ
    const el=document.getElementById('user-count');
    if(el){ el.style.display=''; el.textContent='рЯС§ '+Math.max(1,count)+' дЇЇ'; }
    // еРМж≠•еИ∞дЄїз®ЛеЉПиЃУ BroadcastChannel дЄНеЖНи¶ЖиУЛ
    window._onlineCount=Math.max(1,count);
  });
})();

async function load(){
  // 1. еЕИи©¶еИЖдЇЂйА£зµР
  try{
    const h=location.hash.slice(1);
    if(h.startsWith('data=')){
      const d=JSON.parse(decodeURIComponent(atob(h.slice(5))));
      if(d.rows){S=migrateState(d);history.replaceState(null,'',location.pathname);toast('еЈ≤еЊЮеИЖдЇЂйА£зµРиЉЙеЕ•и≥ЗжЦЩ рЯОЙ','вЬЕ');}
    }
  }catch(e){}

  // 2. иЛ• Firebase еЈ≤е∞±зЈТпЉМеЊЮйЫ≤зЂѓиЉЙеЕ•
  if(window._fbLoad){
    setSyncStatus('connecting');
    // зђђдЄАжђ°йА£зЈЪжЩВ Firestore йАЪйБУжЬЙжЩВе∞ЪжЬ™е∞±зЈТпЉМеПѓиГљйХЈжЩВйЦУ pendingпЉЫ
    // еК†дЄКйАЊжЩВдњЭи≠ЈпЉМйАЊжЩВе∞±йЗНи©¶дЄАжђ°пЉМйБњеЕНзХЂйЭҐеН°еЬ®гАМйА£зЈЪдЄ≠вА¶гАН
    const withTimeout=(ms)=>new Promise((resolve)=>{
      let done=false;
      const timer=setTimeout(()=>{if(!done){done=true;resolve('__TIMEOUT__');}},ms);
      window._fbLoad().then(v=>{if(!done){done=true;clearTimeout(timer);resolve(v);}})
        .catch(e=>{if(!done){done=true;clearTimeout(timer);resolve('__TIMEOUT__');}});
    });
    try{
      let remote=await withTimeout(7000);
      if(remote==='__TIMEOUT__')remote=await withTimeout(12000);
      if(remote&&remote!=='__TIMEOUT__'&&remote.rows){
        S=migrateState(remote);
        try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
        setSyncStatus('online');
        startFirebaseListen();
        return;
      }
    }catch(e){setSyncStatus('error');}
  }

  // 3. еВЩжПіпЉЪlocalStorage
  try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);if(d.rows)S=migrateState(d);}}catch(e){}
  setSyncStatus(window._fbReady?'online':'offline');
  if(window._fbReady)startFirebaseListen();
}

  return S.rows.find(r=>!isDone(r.id)&&(r.unit||'').trim()===u&&(r.floor||'').trim()===f&&(r.issue||'').trim()===is)||null;
}

function rowClick(e,id,visIds){
  if(['INPUT','SELECT','TEXTAREA','BUTTON'].includes(e.target.tagName))return;
  const idx=visIds.indexOf(id);
  if(e.shiftKey&&lastSelIdx!==null){
    const lo=Math.min(lastSelIdx,idx),hi=Math.max(lastSelIdx,idx);
    for(let i=lo;i<=hi;i++)selectedIds.add(visIds[i]);
  }else{
    selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
  }
  lastSelIdx=idx;renderAll();
}

  const fields=[

function applyBulk(){

    });

    selectedIds.forEach(id=>{
      const r=S.rows.find(x=>x.id===id);if(!r)return;
      if(value&&r.planIn&&value<r.planIn){toast(`#${id} еЃМжИРжЧ•жЬЯдЄНеПѓжЧ©жЦЉйА≤е†іжЧ•жЬЯпЉМиЈ≥йБО`,'вЪ†пЄП');return;}

      r.actualDone=value;

function applyMissingDateFilter(){

  // зѓ©еЗЇеЈ≤еЃМжИРдљЖжЧ•жЬЯжЬ™е°ЂзЪД rows дЄ¶еЕ®йБЄ
  const isDoneCheck=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  const missIds=S.rows.filter(r=>{const isDone=isDoneCheck(r.id);const hasDoneStatus=getStatus(r)==='done';return(isDone||hasDoneStatus)&&(!r.actualIn||!r.actualDone);}).map(r=>r.id);

function wireBulk(){
  const sel=document.getElementById('bField');if(!sel)return;
  const showEl=(id,show)=>{const e=document.getElementById(id);if(e)e.style.display=show?'':'none';};
  sel.onchange=()=>{
    const v=sel.value;
    showEl('bVendorSel',v==='vendor');
    showEl('bZoneSel',v==='zone');
    showEl('bMgrSel',v==='manager');
    showEl('bText',['floor','unit'].includes(v));
    showEl('bDateIn',['planIn','actualIn'].includes(v));
    showEl('bDateDone',['planDone','actualDone'].includes(v));
  };
  // Live conflict check on bulk date inputs
  function checkBulkDateConflict(){
    const field=sel.value;
    const dateIn=document.getElementById('bDateIn'),dateDone=document.getElementById('bDateDone');
    const val=(dateDone&&dateDone.style.display!=='none')?dateDone.value:(dateIn?dateIn.value:'');
    if(!val||!field){
      if(dateIn)dateIn.style.cssText=dateIn.style.cssText.replace(/;?color:[^;]+/,'').replace(/;?border-color:[^;]+/,'');
      if(dateDone)dateDone.style.cssText=dateDone.style.cssText.replace(/;?color:[^;]+/,'').replace(/;?border-color:[^;]+/,'');
      return;
    }
    let hasConflict=false;
    if(field==='planDone'||field==='actualDone'){
      const inField=field==='planDone'?'planIn':'actualIn';
      selectedIds.forEach(id=>{const r=S.rows.find(x=>x.id===id);if(r&&r[inField]&&val<r[inField])hasConflict=true;});
      const el=dateDone;
      if(el){el.style.color=hasConflict?'var(--red)':'';el.style.borderColor=hasConflict?'var(--red)':'';}
    } else if(field==='planIn'||field==='actualIn'){
      const doneField=field==='planIn'?'planDone':'actualDone';
      selectedIds.forEach(id=>{const r=S.rows.find(x=>x.id===id);if(r&&r[doneField]&&val>r[doneField])hasConflict=true;});
      const el=dateIn;
      if(el){el.style.color=hasConflict?'var(--red)':'';el.style.borderColor=hasConflict?'var(--red)':'';}
    }
  }
  const bDateIn=document.getElementById('bDateIn'),bDateDone=document.getElementById('bDateDone');
  if(bDateIn){bDateIn.onchange=()=>{checkBulkDateConflict();};}
  if(bDateDone){bDateDone.onchange=()=>{checkBulkDateConflict();};}
}

let dragSrc=null;
function dsDragStart(e,idx,listKey){
  dragSrc={idx,listKey};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',idx);
}
function dsDragOver(e,el){e.preventDefault();el.classList.add('drag-over');}
function dsDragLeave(el){el.classList.remove('drag-over');}
function dsDrop(e,toIdx,listKey,rerender){
  e.preventDefault();
  document.querySelectorAll('.ed-item').forEach(el=>el.classList.remove('drag-over'));
  if(!dragSrc||dragSrc.listKey!==listKey||dragSrc.idx===toIdx)return;
  const arr=listKey==='vendor'?S.vendors:listKey==='zone'?S.zones:listKey==='mgr'?S.managers:null;
  if(!arr)return;
  const item=arr.splice(dragSrc.idx,1)[0];arr.splice(toIdx,0,item);
  dragSrc=null;save();rerender();
}
// tab drag-sort
let tabDragSrc=null;
function tabDragStart(e,id){tabDragSrc=id;e.dataTransfer.effectAllowed='move';}
function tabDragOver(e,target){
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('tab-drag-over',typeof target==='string'&&t.dataset.id===target&&target!==tabDragSrc);
  });
}
function tabDrop(e,target){
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('tab-drag-over'));
  if(!tabDragSrc||!_editSlots)return;
  const from=_editSlots.indexOf(tabDragSrc);
  const to=typeof target==='number'?(-target-1):_editSlots.indexOf(target);
  if(from<0||to<0||from===to){tabDragSrc=null;return;}
  _editSlots[from]=null;
  _editSlots[to]=tabDragSrc;
  tabDragSrc=null;renderTabBar();
}

const FMAP={
  'зЃ°зРЖдЇЇ':'manager','зЃ°зРЖдЇЇеУ°':'manager',
  'жИґеИ•':'unit','жИґеРН':'unit','жИґиЩЯ':'unit',

  'еї†еХЖ':'vendor','еї†еХЖеРНз®±':'vendor',
  'зЉЇе§±еЕІеЃє':'issue','зЉЇе§±':'issue','еХПй°М':'issue','зЉЇе§±й†ЕзЫЃ':'issue','еЈ•й†Е':'issue',
  'еВЩи®ї':'note','еВЩи®їи™™жШО':'note','и™™жШО':'note','еВЩж≥®':'note',
  'й†Ри®ИйА≤е†і':'planIn','й†Ри®ИйА≤е†іжЧ•жЬЯ':'planIn','йА≤е†іжЧ•жЬЯ':'planIn','й†Ри®ИйА≤е†іжЩВйЦУ':'planIn',
  'й†Ри®ИеЃМжИР':'planDone','й†Ри®ИеЃМжИРжЧ•жЬЯ':'planDone','еЃМжИРжЧ•жЬЯ':'planDone','й†Ри®ИеЃМжИРжЩВйЦУ':'planDone',
  'еѓ¶йЪЫйА≤е†і':'actualIn','еѓ¶йЪЫйА≤е†іжЧ•жЬЯ':'actualIn','еѓ¶йЪЫйА≤е†іжЩВйЦУ':'actualIn','йА≤е†іжЧ•':'actualIn',
  'еѓ¶йЪЫеЃМжИР':'actualDone','еѓ¶йЪЫеЃМжИРжЧ•жЬЯ':'actualDone','еѓ¶йЪЫеЃМжИРжЩВйЦУ':'actualDone','еЃМжИРжЧ•':'actualDone','еѓ¶йЪЫеЃМеЈ•':'actualDone',
  'еНАеЯЯ':'zone_label','еИЖеНА':'zone_label','еЈ•еНА':'zone_label','зЛАжЕЛ':'_status',
};
const DATE_FIELDS=['planIn','planDone','actualIn','actualDone'];

function excelToISO(v){
  if(v===null||v===undefined||v==='')return'';
  // Excel Date зЙ©дїґ
  if(v instanceof Date){
    const y=v.getFullYear(),mo=v.getMonth()+1,d=v.getDate();
    if(y<1900||y>2200)return'';
    return`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  // Excel еЇПеИЧжХЄпЉИжХіжХЄжИЦжµЃйїЮпЉЙ
  if(typeof v==='number'){
    if(v<1||v>100000)return'';
    const d=new Date(Math.round((v-25569)*86400000));
    const y=d.getUTCFullYear();
    if(y<1900||y>2200)return'';
    return`${y}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  if(typeof v!=='string')return'';
  const s=v.trim().replace(/\s+/g,' ');
  if(!s)return'';
  const thisYear=new Date().getFullYear();
  let m;

  // 1. YYYY-MM-DDпЉИISO ж®ЩжЇЦпЉЙ
  m=s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})([T\s].*)?$/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;

  // 2. YYYYеєіMжЬИDжЧ•
  m=s.match(/^(\d{4})\s*еєі\s*(\d{1,2})\s*жЬИ\s*(\d{1,2})\s*[жЧ•еПЈ]?/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;

  // 3. ж∞СеЬЛеєі RRR/M/D жИЦ RRR-M-DпЉИдЄЙдљНжХЄ 100-200пЉЙ
  m=s.match(/^(\d{3})[-\/.](\d{1,2})[-\/.](\d{1,2})$/);
  if(m){
    const roc=parseInt(m[1]);
    if(roc>=100&&roc<=200)return`${roc+1911}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }

  // 4. M/D/YYYY жИЦ D/M/YYYYпЉИеЫЫдљНжХЄеєідїљеЬ®еЊМпЉЙ
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})$/);
  if(m)return`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;

  // 5. зіФжХЄе≠Ч YYYYMMDD
  m=s.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m)return`${m[1]}-${m[2]}-${m[3]}`;

  // 6. еП™жЬЙжЬИ/жЧ•пЉИM/D жИЦ M-DпЉЙвЖТ иЗ™еЛХи£ЬзХґеєі
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})$/);
  if(m){
    const mo=parseInt(m[1]),d=parseInt(m[2]);
    if(mo>=1&&mo<=12&&d>=1&&d<=31)
      return`${thisYear}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  }

  // 7. иЛ±жЦЗжЬИдїљпЉЪJune 10, 2026 / 10 June 2026
  const MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
    january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  m=s.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if(m){const mo=MONTHS[m[1].toLowerCase()];if(mo)return`${m[3]}-${String(mo).padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
  m=s.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
  if(m){const mo=MONTHS[m[2].toLowerCase()];if(mo)return`${m[3]}-${String(mo).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}

  return'';
}
function importExcel(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      const wsName=wb.SheetNames.find(n=>n.includes('ињљиє§')||n.includes('зЉЇе§±'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('ExcelзД°жЬЙжХИи≥ЗжЦЩ','вЪ†пЄП');return;}
      let added=0,skipped=0;
      raw.forEach(row=>{
        const mapped={};
        Object.entries(row).forEach(([k,rawVal])=>{
          // ж®Щй†≠ж≠£и¶ПеМЦпЉЪеОїйЩ§еЙНеЊМз©ЇзЩљгАБеЕ®ељҐз©ЇзЩљгАБеЕ®ељҐзђ¶иЩЯиљЙеНКељҐ
          const kn=k.trim().replace(/[\sгАА]+/g,'').replace(/пЉЪ/g,':').replace(/пЉИ/g,'(').replace(/пЉЙ/g,')');
          const fk=FMAP[kn]||FMAP[k.trim()];if(!fk||fk==='_status')return;
          if(DATE_FIELDS.includes(fk)){
            const iso=excelToISO(rawVal);
            mapped[fk]=iso;
          }else{mapped[fk]=String(rawVal||'').trim();}
        });
        if(!mapped.issue&&!mapped.unit){skipped++;return;}
        // auto-add vendor
        if(mapped.vendor&&!S.vendors.includes(mapped.vendor)){S.vendors.push(mapped.vendor);toast(`еЈ≤иЗ™еЛХжЦ∞еҐЮеї†еХЖпЉЪ${mapped.vendor}`,'рЯПҐ');}
        // auto-add manager
        if(mapped.manager&&!S.managers.includes(mapped.manager)){S.managers.push(mapped.manager);toast(`еЈ≤иЗ™еЛХжЦ∞еҐЮзЃ°зРЖдЇЇпЉЪ${mapped.manager}`,'рЯС§');}
        let zone=S.zones[0]?S.zones[0].id:'indoor';
        if(mapped.zone_label){
          const zn=S.zones.find(z=>z.label===mapped.zone_label||mapped.zone_label.includes(z.label.replace(/\s/g,'')));
          if(zn){zone=zn.id;}
          else{
            // иЗ™еЛХжЦ∞еҐЮеИЖеНА
            const newZoneId='z'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
            const newColor=V_COLORS[S.zones.length%V_COLORS.length];
            S.zones.push({id:newZoneId,label:mapped.zone_label,color:newColor});
            zone=newZoneId;
            toast('еЈ≤иЗ™еЛХжЦ∞еҐЮеИЖеНАпЉЪ'+mapped.zone_label,'рЯУБ');
          }
        }
        // enforce date order
        if(mapped.planIn&&mapped.planDone&&mapped.planDone<mapped.planIn)mapped.planDone=mapped.planIn;
        if(mapped.actualIn&&mapped.actualDone&&mapped.actualDone<mapped.actualIn)mapped.actualDone=mapped.actualIn;
        if(mapped.planIn&&!mapped.planDone)mapped.planDone=mapped.planIn;
        S.rows.push({id:S.nextId++,zone,manager:mapped.manager||'',unit:mapped.unit||'',floor:mapped.floor||'',
          vendor:mapped.vendor||S.vendors[0]||'',issue:mapped.issue||'',note:mapped.note||'',
          planIn:mapped.planIn||'',planDone:mapped.planDone||'',actualIn:mapped.actualIn||'',actualDone:mapped.actualDone||''});
        added++;
      });
      toast(`еМѓеЕ•еЃМжИРпЉЪжЦ∞еҐЮ ${added} з≠ЖпЉМзХ•йБО ${skipped} з≠Ж`,'рЯУК');
      logChange('рЯУВ Excel еМѓеЕ•', `ж™Фж°ИпЉЪ${file.name}пЉМжЦ∞еҐЮ ${added} з≠ЖпЉМзХ•йБО ${skipped} з≠Ж`);
      save();renderAll();
    }catch(ex){toast('еМѓеЕ•е§±жХЧпЉЪ'+ex.message,'вЭМ');}
  };
  rd.readAsArrayBuffer(file);
}
function setupImport(dropId,inpId){
  const drop=document.getElementById(dropId),inp=document.getElementById(inpId);if(!drop||!inp)return;
  drop.onclick=()=>inp.click();
  inp.onchange=e=>{if(e.target.files[0])importExcel(e.target.files[0])};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])importExcel(e.dataTransfer.files[0])};
}

// вФАвФА date cell named handlers (avoid nested backticks) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function onPlanDoneChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.planDone=v;save();renderAll();return;}
  if(r.planIn&&v<r.planIn){toast('еЃМжИРжЧ•жЬЯдЄНеПѓжЧ©жЦЉйА≤е†іжЧ•жЬЯ','вЪ†пЄП');renderAll();return;}
  r.planDone=v;save();renderAll();
}
function onActualInChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.actualIn=v;save();renderAll();return;}
  if(r.actualDone&&v>r.actualDone){toast('еѓ¶йЪЫйА≤е†ідЄНеПѓжЩЪжЦЉеѓ¶йЪЫеЃМжИР','вЪ†пЄП');renderAll();return;}
  r.actualIn=v;save();renderAll();
}
function onActualDoneChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.actualDone=v;save();renderAll();return;}
  if(r.actualIn&&v<r.actualIn){toast('еѓ¶йЪЫеЃМжИРдЄНеПѓжЧ©жЦЉеѓ¶йЪЫйА≤е†і','вЪ†пЄП');renderAll();return;}
  r.actualDone=v;if(v&&!r.actualIn)r.actualIn=v;save();renderAll();
}
function dateCell(id,planF,planV,actualF,actualV){
  const planDow=dowStr(planV),actualDow=dowStr(actualV);
  // Use named handlers to avoid nested backtick issue
  const onPlanChange=planF==='planIn'
    ?'onPlanInChange('+id+',this.value)'
    :'onPlanDoneChange('+id+',this.value)';
  const onActualChange=actualF==='actualIn'
    ?'onActualInChange('+id+',this.value)'
    :'onActualDoneChange('+id+',this.value)';
  const r=S.rows.find(x=>x.id===id);
  const planConflict=r&&planF==='planDone'&&planV&&r.planIn&&planV<r.planIn;
  const actualConflict=r&&actualF==='actualDone'&&actualV&&r.actualIn&&actualV<r.actualIn;
  const planStyle='width:110px'+(planConflict?';color:var(--red);font-weight:600;border-color:var(--red)':'');
  const actualStyle='width:110px'+(actualConflict?';color:var(--red);font-weight:600;border-color:var(--red)':'');
  return '<td style="vertical-align:top;padding:3px 4px">'
    +'<div class="date-wrap">'
    +'<span class="date-pre plan">й†Р</span>'
    +'<input type="date" value="'+planV+'" onchange="'+onPlanChange+'" onclick="event.stopPropagation()" style="'+planStyle+'">'
    +'<span class="dow-lbl">'+planDow+'</span>'
    +'</div>'
    +'<div class="date-wrap" style="margin-top:2px">'
    +'<span class="date-pre actual">еѓ¶</span>'
    +'<input type="date" value="'+actualV+'" onchange="'+onActualChange+'" onclick="event.stopPropagation()" style="'+actualStyle+'">'
    +'<span class="dow-lbl">'+actualDow+'</span>'
    +'</div>'
    +'</td>';
}

function pgBarHTML(total, page, onClickFn){
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(pages<=1)return '';
  const start=page*PAGE_SIZE+1, end=Math.min((page+1)*PAGE_SIZE,total);
  let btns='';
  // дЄКдЄАй†Б
  btns+=`<button class="pg-btn no-print" ${page===0?'disabled':''} onclick="${onClickFn}(${page-1})">вАє</button>`;
  // й†БзҐЉжМЙйИХпЉИй°ѓз§ЇеЙН2гАБзХґеЙН¬±2гАБеЊМ2пЉЙ
  const show=new Set([0,1,page-2,page-1,page,page+1,page+2,pages-2,pages-1].filter(p=>p>=0&&p<pages));
  let prev=-1;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(prev>=0&&p-prev>1)btns+='<span class="pg-info">вА¶</span>';
    btns+=`<button class="pg-btn no-print${p===page?' active':''}" onclick="${onClickFn}(${p})">${p+1}</button>`;
    prev=p;
  });
  // дЄЛдЄАй†Б
  btns+=`<button class="pg-btn no-print" ${page>=pages-1?'disabled':''} onclick="${onClickFn}(${page+1})">вАЇ</button>`;
  btns+=`<span class="pg-info">${start}вАУ${end} / еЕ± ${total} з≠Ж</span>`;
  // ењЂйАЯиЈ≥й†Б
  btns+=`<input type="number" min="1" max="${pages}" value="${page+1}" onchange="gotoMainPage(this.value-1,${pages})" style="width:48px;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;text-align:center;font-family:var(--font)" title="иЈ≥иЗ≥й†БжХЄ">`;
  return `<div class="pg-bar">${btns}</div>`;
}

function alertBulkComplete(){

// вФАвФА йЗНйїЮжПРз§ЇдЇЛй†ЕпЉЪеМѓеЕ•ж™Фж°ИеИЖжµБпЉИPDF / ExcelпЉЙ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function handleAlertImport(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    importMeetingPDF(file);
  } else if(['xlsx','xls','csv'].includes(ext)){
    importAlertExcel(file);
  } else {
    toast('дЄНжФѓжПізЪДж™Фж°Иж†ЉеЉПпЉМиЂЛйБЄжУЗ PDF жИЦ Excel','вЪ†пЄП');
  }
}
function importAlertExcel(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      const wsName=wb.SheetNames.find(n=>n.includes('жПРз§Ї')||n.includes('и≠∞й°М')||n.includes('жЬГи≠∞'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('Excel зД°жЬЙжХИи≥ЗжЦЩ','вЪ†пЄП');return;}
      const AMAP={
        'зЃ°зРЖдЇЇ':'manager','и≤†и≤ђдЇЇ':'manager',
        'е∞НжЗЙеЦЃдљН':'unit','еЦЃдљН':'unit',
        'еНАеЯЯдљНзљЃ':'location','дљНзљЃ':'location','еНАеЯЯ':'location',
        'еЕІеЃєи™™жШО':'content','зЉЇе§±еЕІеЃє':'content','и™™жШО':'content','и≠∞й°М':'content',
        'йЩРиЊ¶жЧ•жЬЯ':'limitDate','жЬЯйЩР':'limitDate','еЃМжИРжЬЯйЩР':'limitDate',
        'еѓ¶йЪЫеЃМжИРжЧ•жЬЯ':'doneDate','еЃМжИРжЧ•жЬЯ':'doneDate',
        'еВЩи®їдЇЛй†Е':'remark','еВЩи®ї':'remark'
      };
      let added=0,skipped=0;
      raw.forEach(row=>{
        const mapped={};
        Object.entries(row).forEach(([k,v])=>{
          const fk=AMAP[k.trim()];if(!fk)return;
          if(['limitDate','doneDate'].includes(fk))mapped[fk]=excelToISO(v);
          else mapped[fk]=String(v||'').trim();
        });
        if(!mapped.content&&!mapped.unit){skipped++;return;}
        if(mapped.manager&&!S.managers.includes(mapped.manager))S.managers.push(mapped.manager);
        S.alerts.push({
          id:S.nextAlertId++,
          manager:mapped.manager||'',
          unit:mapped.unit||'',
          location:mapped.location||'',
          content:mapped.content||'',
          limitDate:mapped.limitDate||'',
          doneDate:mapped.doneDate||'',
          remark:mapped.remark||''
        });
        added++;
      });
      save();renderMain();
      toast(`Excel еМѓеЕ•еЃМжИРпЉЪжЦ∞еҐЮ ${added} з≠ЖпЉМзХ•йБО ${skipped} з≠Ж`,'рЯУК');
      logChange('рЯУВ жПРз§ЇдЇЛй†ЕеМѓеЕ•',`ж™Фж°ИпЉЪ${file.name}пЉМжЦ∞еҐЮ ${added} з≠Ж`);
    }catch(ex){toast('еМѓеЕ•е§±жХЧпЉЪ'+ex.message,'вЭМ');}
  };
  rd.readAsArrayBuffer(file);
}


function setupPdfImport(dropId, inpId){
  const drop=document.getElementById(dropId), inp=document.getElementById(inpId);
  if(!drop||!inp)return;
  drop.onclick=()=>inp.click();
  inp.onchange=e=>{if(e.target.files[0])importMeetingPDF(e.target.files[0]);};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])importMeetingPDF(e.dataTransfer.files[0]);};
}

async function importMeetingPDF(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){toast('иЂЛйБЄжУЗ PDF ж™Фж°И','вЪ†пЄП');return;}
  toast('ж≠£еЬ®иІ£жЮР PDF жЬГи≠∞и®ШйМДпЉМиЂЛз®НеАЩвА¶','вП≥');
  try{
    const base64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=()=>rej(new Error('иЃАеПЦе§±жХЧ'));
      r.readAsDataURL(file);
    });
    const resp=await fetch('https://pdf-proxy.nasa-jetta.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pdfBase64:base64,filename:file.name})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error||'Worker йМѓи™§ '+resp.status);
    }
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    const text=data.text||'{"items":[]}';
    let parsed;
    try{
      const clean=text.replace(/```json|```/g,'').trim();
      parsed=JSON.parse(clean);
    }catch(e){throw new Error('иІ£жЮР AI еЫЮжЗЙе§±жХЧпЉЪ'+e.message);}
    const items=parsed.items||[];
    if(!items.length){toast('PDF дЄ≠жЬ™жЙЊеИ∞и≠∞й°МеЕІеЃєпЉМиЂЛзҐЇи™Н PDF ж†ЉеЉП','вЪ†пЄП');return;}
    let added=0;
    items.forEach(item=>{
      if(!item.content&&!item.remark)return;
      if(item.manager&&!S.managers.includes(item.manager))S.managers.push(item.manager);
      S.alerts.push({
        id:S.nextAlertId++,
        manager:item.manager||'',
        unit:item.unit||'',
        location:item.location||'',
        content:item.content||'',
        limitDate:item.limitDate||'',
        doneDate:'',
        remark:item.remark||''
      });
      added++;
    });
    save();renderMain();
    toast('PDF еМѓеЕ•еЃМжИРпЉЪеЈ≤жЦ∞еҐЮ '+added+' з≠Жи≠∞й°М','вЬЕ');
    logChange('рЯУД PDF еМѓеЕ•',`ж™Фж°ИпЉЪ${file.name}пЉМжЦ∞еҐЮ ${added} з≠ЖйЗНйїЮжПРз§Ї`);
  }catch(e){
    console.error('[PDF Import]',e);
    toast('PDF еМѓеЕ•е§±жХЧпЉЪ'+e.message,'вЭМ');
  }
}

function bulkMarkDone(){
  const doneIds=[...selectedIds].filter(id=>{
    const r=S.rows.find(x=>x.id===id);
    return r&&getStatus(r)==='done';
  });
  if(!doneIds.length){toast('йБЄеПЦй†ЕзЫЃдЄ≠ж≤ТжЬЙзЛАжЕЛзВЇгАМеЈ≤еЃМжИРгАНзЪДй†ЕзЫЃ','вЪ†пЄП');return;}
  const notDone=[...selectedIds].filter(id=>{
    const r=S.rows.find(x=>x.id===id);
    return r&&getStatus(r)!=='done';
  });
  let msg='зҐЇеЃЪе∞З '+doneIds.length+' з≠ЖеЈ≤еЃМжИРй†ЕзЫЃзІїиЗ≥еЈ≤еЃМжИРеЈ•дљЬзЬЛжЭњпЉЯ';
  if(notDone.length)msg+='\nпЉИеП¶жЬЙ '+notDone.length+' з≠ЖйЭЮеЃМжИРзЛАжЕЛзЪДй†ЕзЫЃе∞ЗиҐЂзХ•йБОпЉЙ';
  if(!confirm(msg))return;
  doneIds.forEach(id=>{
    const r=S.rows.find(x=>x.id===id);
    if(!r)return;
    if(!r.actualDone)r.actualDone=todayISO();
    if(!r.actualIn)r.actualIn=r.planIn||todayISO();
    S.completed.push({...r,compId:S.nextCompId++,completedAt:todayISO()});
    S.rows=S.rows.filter(x=>x.id!==id);
    selectedIds.delete(id);
  });
  save();renderAll();
  toast('еЈ≤зІїеЛХ '+doneIds.length+' з≠ЖиЗ≥гАМеЈ≤еЃМжИРеЈ•дљЬгАНзЬЛжЭњ вЬЕ');
}

function _buildMgrStats(){
  // дЄАжђ°жОГеЕ®и°®пЉМеїЇзЂЛеРДзЃ°зРЖдЇЇзЪДзµ±и®И Map
  const map={};
  S.managers.forEach(m=>{map[m]={total:0,done:0,overdue:0};});
  S.rows.forEach(r=>{
    const m=r.manager;
    if(!m||!map[m])return;
    map[m].total++;
    if(r.actualDone){map[m].done++;}
    else{const d=r.planDone?((new Date(r.planDone)-new Date(new Date().toDateString()))/86400000|0):null;
      if(d!==null&&d<0)map[m].overdue++;}
  });
  return map;
}

function hoUnitPct(unit){
  // зҐЇдњЭ cache еМЕеРЂ completed rows
  if(!_defectCache)_buildDefectCache();
  const rows=getDefectRows(unit);
  if(!rows.length)return null;
  // еЃМжИРеЃЪзЊ©пЉЪеЈ≤зІїеЕ•еЃМжИРзЬЛжЭњ(compIdе≠ШеЬ®) OR жШОзҐЇе°ЂеЕ•еѓ¶йЪЫеЃМжИРжЧ•жЬЯ(actualDone)
  const completedCnt=rows.filter(r=>r.compId!=null).length;
  return Math.round(completedCnt/rows.length*100);
}
function hoGrade(pct){

}
let _hovExpanded=null;
function renderHandover(){
  if(!S.handoverUnits)S.handoverUnits={};
  if(!S.clientData)S.clientData={};
  _buildDefectCache();
  const today=new Date();today.setHours(0,0,0,0);
  const allUnits=[...new Set(S.rows.map(r=>r.unit).filter(Boolean))];
  const cntDelivered=allUnits.filter(u=>S.handoverUnits[u]&&S.handoverUnits[u].delivered).length;
  const cnt100=allUnits.filter(u=>hoUnitPct(u)===100).length;
  const totalUnits=allUnits.length;
  const delivPct=totalUnits?Math.round(cntDelivered/totalUnits*100):0;

  // вФАвФА й°ѓз§ЇжОІеИґ вФАвФА
  if(!window._hovShow)window._hovShow='all'; // 'all'|'A'|'B'|'shop'
  // showA/showB/showShop еЬ®зѓ©йБЄеНАеЊМйЭҐдЊЭ _hovFilter.block и®ИзЃЧ

  const batchBar=_hstatsSelected.size>0?`<div style="background:#EEEDFE;border:1px solid #AFA9EC;border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#3C3489;flex-wrap:wrap">
    <strong>еЈ≤еЛЊйБЄ ${_hstatsSelected.size} жИґ</strong>
    <button class="btn btn-p btn-sm" onclick="batchFillInspDate()">жЙєжђ°е°ЂеѓЂй©ЧжФґжЧ•</button>
    <button class="btn btn-sm btn-g" onclick="batchMarkDelivered()">жЙєжђ°ж®Щи®ШеЈ≤дЇ§е±Л</button>
    <button class="btn btn-sm" onclick="_hstatsSelected.clear();renderHandover()">вЬХ еПЦжґИ</button>
  </div>`:'';

  // вФАвФА еИЖжЮРи°®з≠ЙзіЪи®ИзЃЧпЉИеЕ±зФ®еЃЪзЊ©пЉЙвФАвФА
  const tiers=[
    {label:'еЈ≤дњЃзєХеЃМзХҐ',pctMin:100,pctMax:100,desc:'еПѓдЇ§е±Л',flexDays:null},
    {label:'зЉЇе§±й†ЕзЫЃе∞СдЄФй†РеЃЪеЃМжИРжЧ•жЬЯ7е§©еЕІеПѓеЃМжИР',pctMin:90,pctMax:99,desc:'еПѓжОТеЃЪ7е§©еЊМдЇ§е±Л',flexDays:7},
    {label:'зЉЇе§±й†РеЃЪеЃМжИРжЧ•жЬЯ14е§©еЕІеПѓеЃМжИР',pctMin:80,pctMax:89,desc:'еЃЙжОТ2йА±еЊМдЇ§е±Л',flexDays:14},
    {label:'ињљиє§дЄїиЊ¶пЉМзҐЇи™НжЩВйЦУеЈ•жЬЯ',pctMin:60,pctMax:79,desc:'ињљиє§',flexDays:30},
    {label:'ж™Ґи®ОжЩВйЦУ',pctMin:0,pctMax:59,desc:'зД°ж≥ХдЇ§е±Л',flexDays:null},
  ];
  const allPendingWithinDays=(key,days)=>{
    if(!days)return false;
    const dr=getDefectRows(key);
    const pending=dr.filter(r=>r.compId==null);
    if(!pending.length)return false;
    const todayD=new Date();todayD.setHours(0,0,0,0);
    return pending.every(r=>{
      if(!r.planDone)return false;
      const diff=Math.round((new Date(r.planDone)-todayD)/(1000*60*60*24));
      return diff<=days;
    });
  };
  // еП™жЬЙеЬ®йЬАи¶БжЩВпЉИеИЖжЮРи°®жИЦеЃМжИРеЇ¶зѓ©йБЄпЉЙжЙНи®ИзЃЧ allKeys/unitTierMap
  const _needTierCalc=!!(window._hovFilter&&window._hovFilter.tier);
  const allKeys=[];
  G95_FLOORS.forEach(fl=>{G95_A_COLS.forEach(col=>{const k=G95_RAW_A[col]?G95_RAW_A[col][fl]:null;if(k)allKeys.push({key:k,block:'A'});});});
  G95_FLOORS.forEach(fl=>{G95_B_COLS.forEach(col=>{const k=G95_RAW_B[col]?G95_RAW_B[col][fl]:null;if(k)allKeys.push({key:k,block:'B'});});});
  const unitTierMap=new Map();
  if(_needTierCalc){
    allKeys.forEach(({key})=>{
      const rawPct=hoUnitPct(key)??hoUnitPct(unitDisplayName(key));
      const pct=rawPct===null?0:rawPct;
      let tierIdx=tiers.findIndex(t=>pct>=t.pctMin&&pct<=t.pctMax);
      if(tierIdx<0)tierIdx=tiers.length-1;
      for(let i=0;i<tierIdx;i++){
        const t=tiers[i];
        if(t.pctMin===100)continue;
        if(t.flexDays&&allPendingWithinDays(key,t.flexDays)){tierIdx=i;break;}
      }
      unitTierMap.set(key,tierIdx);
    });
  }
  // вФАвФА ж†ЉзЛАеЦЃеЕГж†Љ вФАвФА
  const MILESTONE_FLOORS=[1,5,10,15,20,25,31];
  // еЃМжИРеЇ¶зѓ©йБЄ
  const _hovTierSet=(()=>{
    if(!_needTierCalc)return null;
    const ti=parseInt(window._hovFilter.tier);
    const s=new Set();
    allKeys.forEach(({key})=>{if(unitTierMap.get(key)===ti)s.add(key);});
    return s.size>0?s:null;
  })();
  function cellHTML(key,floor,col){
    if(!key)return`<div style="background:transparent;min-height:64px"></div>`;
    // вФАвФА зѓ©йБЄ вФАвФА
    const hf2=window._hovFilter||{};
    const huF=S.handoverUnits[key]||{};
    const todayMs=today.getTime();

// вФАвФА Defect lookup cacheпЉИrenderHandover/renderHStats йЦЛй†≠еСЉеПЂ _buildDefectCache() еїЇзЂЛпЉЙвФАвФА
let _defectCache=null;
function _buildDefectCache(){
  _defectCache=new Map(); // key: r.unit.trim() вЖТ rows[]
  if(!S.rows)return;
  // еРИдљµ S.rowsпЉИжЬ™еЃМжИРпЉЙеТМ S.completedпЉИеЈ≤еЃМжИРпЉЙдЄАиµЈеїЇзЂЛ cache
  // S.completed еД™еЕИпЉМзҐЇдњЭ compId зЙИжЬђдЄНиҐЂ S.rows зЙИжЬђи¶ЖиУЛ
  const allRows=[...(S.completed||[]),...S.rows];
  allRows.forEach(r=>{
    if(!r.unit)return;
    const k=String(r.unit).trim();
    if(!_defectCache.has(k))_defectCache.set(k,[]);
    _defectCache.get(k).push(r);
  });
}
function getDefectRows(unitKey){
  if(!unitKey||!S.rows)return[];
  const displayName=unitDisplayName(unitKey);
  const m=displayName.match(/^([A-Za-z]+\d*)-(\d+)$/);
  const col=m?m[1].toUpperCase():'';
  const flr=m?m[2]:'';
  const seen=new Set();const result=[];
  function addRows(rows){if(!rows)return;rows.forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);result.push(r);}});}
  // еД™еЕИеЊЮ cache жЯ•пЉМж≤ТжЬЙ cache е∞±жОГеЕ®и°®
  const source=_defectCache||new Map(S.rows.map(r=>{const k=String(r.unit||'').trim();return[k,_defectCache?.get(k)||[]]}));
  const db=_defectCache?_defectCache:(()=>{const m2=new Map();S.rows.forEach(r=>{const k=String(r.unit||'').trim();if(!m2.has(k))m2.set(k,[]);m2.get(k).push(r);});return m2;})();
  // з≤ЊзҐЇжѓФе∞Н
  addRows(db.get(unitKey));addRows(db.get(displayName));
  addRows(db.get(unitKey.toUpperCase()));addRows(db.get(displayName.toUpperCase()));
  // fuzzy жѓФе∞НпЉИunit жђДдљНж†ЉеЉПе¶В A1(еЬ∞) + floor=28FпЉЙ
  if(col&&flr&&result.length===0){
    db.forEach((rows,ru)=>{
      if(!rows.length)return;
      const clean=ru.replace(/^(еЬ∞|ж•≠)/,'').trim();
      if(clean.toUpperCase()===displayName.toUpperCase()){addRows(rows);return;}
      const ruCol=clean.replace(/[(пЉИ][^)пЉЙ]*[)пЉЙ]/g,'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
      if(ruCol===col){
        // йАРз≠ЖйБОжњЊ floorпЉМйБњеЕНжККжХіжЙєдЄНеРМж®Уе±§зЪД rows еЕ®йГ®жТИеЕ•
        const matched=rows.filter(r=>String(r.floor||'').replace(/[^0-9]/g,'')===flr);
        if(matched.length)addRows(matched);
      }
    });
  }
  return result;
}

function _hpendUnitSortKey(name){
  const m=String(name).match(/^(.*)-(\d+)$/);
  if(!m)return{unit:String(name),floor:0};
  return{unit:m[1],floor:parseInt(m[2],10)};
}
function _hpendItemCompare(a,b){
  const aDone=a.st==='done'?1:0,bDone=b.st==='done'?1:0;
  if(aDone!==bDone)return aDone-bDone;
  if(a.planDate!==b.planDate)return a.planDate<b.planDate?-1:1;
  const ka=_hpendUnitSortKey(a.unit),kb=_hpendUnitSortKey(b.unit);
  if(ka.floor!==kb.floor)return kb.floor-ka.floor;
  return ka.unit.localeCompare(kb.unit,'zh-Hant',{numeric:true});
}

// Undo buffer for batch changes
let _bchUndoStack=[];
function saveBchUndo(keys,fields){
  // Save snapshot of affected keys before change
  const snap={};
  keys.forEach(key=>{
    snap[key]={
      handoverUnit:S.handoverUnits[key]?{...S.handoverUnits[key]}:null,
      clientData:S.clientData[key]?{...S.clientData[key]}:null
    };
  });
  _bchUndoStack.push(snap);
  if(_bchUndoStack.length>10)_bchUndoStack.shift();
}
function undoBatchHStats(){
  if(!_bchUndoStack.length){toast('ж≤ТжЬЙеПѓжБҐеЊ©зЪДжУНдљЬ','вЪ†пЄП');return;}
  const snap=_bchUndoStack.pop();
  Object.entries(snap).forEach(([key,data])=>{
    if(data.handoverUnit===null)delete S.handoverUnits[key];
    else{if(!S.handoverUnits)S.handoverUnits={};S.handoverUnits[key]=data.handoverUnit;}
    if(data.clientData===null)delete S.clientData[key];
    else{if(!S.clientData)S.clientData={};S.clientData[key]=data.clientData;}
  });
  save();toast(`еЈ≤жБҐеЊ©дЄКдЄАеАЛжЙєжђ°еЛХдљЬпЉИ${Object.keys(snap).length} жИґпЉЙ`,'вЖ©пЄП');
  renderHStats();
}

function _buildBatchBarHTML(){
  const blk=window._bchBlock||new Set();
  const selFl=window._bchFloors||new Set();
  const selCols=window._bchCols||new Set();
  const hasA=blk.size===0||blk.has('A');
  const hasB=blk.size===0||blk.has('B');
  const hasShop=blk.size===0||blk.has('shop');

  // жЦєе°КжМЙйИХж®£еЉПпЉЪзД°еЬУиІТгАБзД°йЦУйЪЩпЉМйБЄдЄ≠зіЂиЙ≤пЉМжЬ™йБЄзБ∞иЙ≤
  const btnStyle=(active)=>`font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid ${active?'var(--purple)':'var(--border)'};border-right:none;background:${active?'#F0EEFF':'var(--card)'};color:${active?'var(--purple)':'var(--text2)'};cursor:pointer;white-space:nowrap`;
  const btnLast=(active)=>`font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid ${active?'var(--purple)':'var(--border)'};background:${active?'#F0EEFF':'var(--card)'};color:${active?'var(--purple)':'var(--text2)'};cursor:pointer;white-space:nowrap`;

  // ж£ЯеИ•жМЙйИХ
  const blockItems=['all','A','B','shop'];
  const blockBtns=blockItems.map((b,i)=>{
    const active=b==='all'?blk.size===0:blk.has(b);
    const label={all:'еЕ®йГ®',A:'Aж£Я',B:'Bж£Я',shop:'еЇЧйЛ™'}[b];
    const isLast=i===blockItems.length-1;
    return`<button onclick="bchToggleBlock('${b}')" style="${isLast?btnLast(active):btnStyle(active)}">${label}</button>`;
  }).join('');

  // ж®Уе±§жМЙйИХпЉИдЊЭж£ЯеИ•пЉЙ
  let floors=[];
  if(hasA||hasB)floors=[...G95_FLOORS];
  if(hasShop){if(!floors.includes(1))floors.push(1);if(!floors.includes(2))floors.push(2);}
  floors=floors.sort((a,b2)=>b2-a);
  const floorItems=floors.length?['all',...floors.map(String)]:[];
  const floorBtns=floorItems.map((fl,i)=>{
    const active=fl==='all'?selFl.size===0:selFl.has(fl);
    const label=fl==='all'?'еЕ®йГ®':`${fl}F`;

    return`<button onclick="bchToggleFloor('${fl}')" style="${isLast?btnLast(active):btnStyle(active)}">${label}</button>`;

  // жИґеИ•жМЙйИХпЉИдЊЭж£ЯеИ•+ж®Уе±§пЉЙ
  const colSet=new Set();
  function addColsForBlock(rawData,cols){

      const colObj=rawData[col];if(!colObj)return;

  if(hasA)addColsForBlock(G95_RAW_A,G95_A_COLS);
  if(hasB)addColsForBlock(G95_RAW_B,G95_B_COLS);
  if(hasShop)['A1','A2','A3','A5','A6','A7','A8','A9','A10','A11','A12','A15','A16','A17','A18','A19','A20','A21','A22','A23','A25','A26','A27','A28','A29','A30','C1','C2'].forEach(c=>colSet.add('shop:'+c));
  const cols=[...colSet].sort((a,b2)=>a.localeCompare(b2,'zh-TW',{numeric:true}));
  const colItems=cols.length?['all',...cols]:[];
  const colBtns=colItems.map((col,i)=>{
    const active=col==='all'?selCols.size===0:selCols.has(col);
    const label=col==='all'?'еЕ®йГ®':col.replace(/^shop:/,'');
    const isLast=i===colItems.length-1;
    return`<button onclick="bchToggleCol('${col}')" style="${isLast?btnLast(active):btnStyle(active)}">${label}</button>`;
  }).join('');
  return`
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;margin-bottom:4px">

      <span style="font-size:11px;color:var(--text2);font-weight:500;flex-shrink:0">ж®Уе±§пЉЪ</span>
      <div style="display:flex;flex-wrap:nowrap;gap:0;overflow-x:auto">${floorBtns}</div>
    </div>`:''}
    ${cols.length?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px">
      <span style="font-size:11px;color:var(--text2);font-weight:500;flex-shrink:0">жИґеИ•пЉЪ</span>

    </div>`:''}`;
}

    shopAllKeys.forEach(key=>{

      // еЇЧйЛ™жИґеИ•пЉЪbchCols дЄ≠зФ® shop: еЙНзґіпЉМеЕ®йГ®дЄНйБЄдї£и°®еЕ®йБЄ
      if(bchCols.size>0){
        const colMatch=key.match(/([A-C]\d+)/);
        const col=colMatch?('shop:'+colMatch[1]):'';
        if(col&&!bchCols.has(col))return;

      keys.push(key);

  if(keys.length===0){toast('ж≤ТжЬЙзђ¶еРИжҐЭдїґзЪДжИґеИ•','вЪ†пЄП');return;}
  // Save undo snapshot before modifying
  saveBchUndo(keys);

    if(bchDate)S.handoverUnits[key].planDate=bchDate;

  window._bchBlock=new Set();
  window._bchFloors=new Set();

//  HANDOVER CALENDAR  вФАвФА дЇ§е±Ли°МдЇЛжЫЖ

let _hcalOffset=0; // йА±еБПзІїпЉМ0=жЬђйА±
const HCAL_SLOTS=['09:00вАУ10:20','10:30вАУ11:50','14:00вАУ15:20','15:30вАУ16:50'];

function renderHCal(){
  if(!S.handoverUnits)S.handoverUnits={};
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay()===0?6:today.getDay()-1; // йА±дЄА=0
  const isoDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // иЛ• _hcalOffset===0 дЄФжЬђйА±зД°жіїеЛХпЉМиЗ™еЛХиЈ≥еИ∞жЬАињСдЄАжђ°жЬЙжіїеЛХзЪДйА±жђ°
  const baseMonday=new Date(today);baseMonday.setDate(today.getDate()-dow);
  function weekHasActivity(mondayDate){
    for(let i=0;i<7;i++){
      const d=new Date(mondayDate);d.setDate(mondayDate.getDate()+i);
      const ds=isoDate(d);
      if(Object.values(S.handoverUnits).some(hu=>hu.planDate===ds))return true;
    }
    return false;
  }
  // еП™еЬ®й¶Цжђ°йА≤еЕ•пЉИoffset===0пЉЙдЄФжЬђйА±зД°и≥ЗжЦЩжЩВжЙНиЗ™еЛХиЈ≥
  // дљњзФ®иАЕжЙЛеЛХеИЗжПЫеЊМдЄНеЉЈеИґиЈ≥
  if(_hcalOffset===0&&!weekHasActivity(baseMonday)){
    for(let delta=1;delta<=104;delta++){
      const futMon=new Date(baseMonday);futMon.setDate(baseMonday.getDate()+delta*7);
      if(weekHasActivity(futMon)){_hcalOffset=delta;break;}
      const pastMon=new Date(baseMonday);pastMon.setDate(baseMonday.getDate()-delta*7);
      if(weekHasActivity(pastMon)){_hcalOffset=-delta;break;}
    }
  }

  const weekStart=new Date(baseMonday);weekStart.setDate(baseMonday.getDate()+(_hcalOffset*7));
  const week2Start=new Date(weekStart);week2Start.setDate(weekStart.getDate()+7);
  const week1Days=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
  const week2Days=Array.from({length:7},(_,i)=>{const d=new Date(week2Start);d.setDate(week2Start.getDate()+i);return d;});
  const fmtDate=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const fmtDay=d=>['жЧ•','дЄА','дЇМ','дЄЙ','еЫЫ','дЇФ','еЕ≠'][d.getDay()];

  function getUnitsForDateSlot(dateStr,slot){
    const result=[];
    Object.entries(S.handoverUnits).forEach(([key,hu])=>{
      if(hu.planDate===dateStr&&(!slot||hu.slot===slot)){
        const pct=hoUnitPct(unitDisplayName(key))||hoUnitPct(key);
        result.push({key,pct,delivered:hu.delivered});
      }
    });
    return result;
  }

  function buildWeekTable(days,title){
    const isWeekend=d=>d.getDay()===0||d.getDay()===6;
    const todayStr=isoDate(today);

    const dateHdrs=days.map(d=>{
      const ds=isoDate(d);const isToday=ds===todayStr;
      const diff=Math.ceil((d-today)/86400000);
      const diffLabel=isToday?'дїКе§©':diff>0?`${diff}е§©еЊМ`:`${Math.abs(diff)}е§©еЙН`;
      const bg=isToday?'#F0EEFF':isWeekend(d)?'#F5F3EE':'var(--surface)';
      const color=isToday?'var(--purple)':diff<0?'var(--text3)':diff<=3?'var(--red)':'var(--text2)';
      return`<th style="padding:5px 4px;text-align:center;border:1px solid var(--border);font-size:12px;min-width:100px;background:${bg}">
        ${fmtDate(d)}&nbsp;<span style="font-size:10px;color:var(--text3)">йА±${fmtDay(d)}</span><br>
        <span style="font-size:10px;color:${color}">${diffLabel}</span>
      </th>`;
    }).join('');

    const slotRows=HCAL_SLOTS.map(slot=>{
      const cells=days.map(d=>{
        const dateStr=isoDate(d);
        const units=getUnitsForDateSlot(dateStr,slot);
        if(!units.length)return`<td style="border:1px solid var(--border);padding:4px;vertical-align:top;height:50px"></td>`;
        // Aж£Я/Bж£Я/еЇЧйЛ™иЙ≤е°К
        function chipStyle(key){
          const k=String(key);
          // дљњзФ®з≤ЊзҐЇзЪДеЇЧйЛ™ key жЄЕеЦЃеИ§жЦЈпЉМйБњеЕНдї•еЙНзґіж≠£еЙЗи™§еИ§
          const isShop=G95_SHOP_KEYS.has(k);
          const isB=!isShop&&(/^(еЬ∞B|ж•≠B)/i.test(k)||/^B\d+-\d+/.test(k));
          if(isShop)return{bg:'#FFF3CD',border:'#D4A900',text:'#6B4D00',label:'еЇЧ'};
          if(isB)return{bg:'#E1F5EE',border:'#0A6640',text:'#085041',label:'B'};
          return{bg:'#EBF4FF',border:'#185FA5',text:'#0A3D6E',label:'A'};
        }
        const chips=units.map(({key,pct,delivered},idx)=>{
          const cs=chipStyle(key);
          const statusColor=delivered?'#3B6D11':pct===100?'#3B6D11':pct>=80?'#854F0B':'#A32D2D';
          const gap=(idx>0&&idx%4===0)?'margin-top:8px;border-top:1px dashed #ccc;padding-top:4px;':'';
          const isComH=(S.handoverUnits[key]||{}).inspTypes&&(S.handoverUnits[key].inspTypes||[]).includes('еІФе§Цдї£й©Ч');
          return`<div style="font-size:10px;padding:2px 5px;margin-bottom:3px;border-radius:3px;background:${cs.bg};border:1px solid ${cs.border};color:${cs.text};white-space:nowrap;display:flex;align-items:center;gap:3px;${gap}"><span style="font-size:8px;padding:0 3px;background:${cs.border};color:#fff;border-radius:2px;flex-shrink:0">${cs.label}</span>${esc(unitDisplayName(key))}${isComH?' <span style="color:#D4A900;font-size:9px">вШЕ</span>':''}<span style="opacity:.7;font-size:9px;color:${statusColor}"> ${pct??'вАФ'}%</span></div>`;
        }).join('');
        return`<td style="border:1px solid var(--border);padding:4px;vertical-align:top;background:#FAFAFA"><div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px">${units.length}жИґ</div>${chips}</td>`;
      }).join('');
      return`<tr><td style="padding:6px 10px;font-size:11px;border:1px solid var(--border);white-space:nowrap;font-weight:500;background:var(--surface)">${slot}</td>${cells}</tr>`;
    }).join('');

    // зµ±и®ИеИЧ
    const statRow=`<tr style="background:var(--surface)">
      <td style="padding:4px 10px;font-size:11px;border:1px solid var(--border);font-weight:600">й†РеЃЪй©ЧжФґ жИґжХЄ</td>
      ${days.map(d=>{
        const ds=isoDate(d);
        const n=Object.values(S.handoverUnits).filter(hu=>hu.planDate===ds&&hu.slot&&HCAL_SLOTS.includes(hu.slot)).length;
        return`<td style="text-align:center;padding:4px;font-size:12px;border:1px solid var(--border);${n?'font-weight:600;color:var(--purple)':''}">${n||''}</td>`;
      }).join('')}
    </tr>`;

    return`<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);padding:4px 8px;background:var(--surface);border-radius:var(--rs);margin-bottom:5px">${title}</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;width:100%;min-width:700px">
          <thead><tr>
            <th style="padding:6px 10px;border:1px solid var(--border);background:var(--surface);white-space:nowrap;min-width:90px;font-size:11px">жЩВжЃµ / жЧ•жЬЯ</th>
            ${dateHdrs}
          </tr></thead>
          <tbody>${slotRows}${statRow}</tbody>
        </table>
      </div>
    </div>`;
  }

  const w1Title=`зђђ ${_hcalOffset*2+1} йА±пЉИ${fmtDate(week1Days[0])} вАУ ${fmtDate(week1Days[6])}пЉЙ`;
  const w2Title=`зђђ ${_hcalOffset*2+2} йА±пЉИ${fmtDate(week2Days[0])} вАУ ${fmtDate(week2Days[6])}пЉЙ`;

  document.getElementById('pane-hcal').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:700">рЯУЖ дЇ§е±Ли°МдЇЛжЫЖ</span>
      <button class="btn btn-sm" onclick="_hcalOffset--;renderHCal()">вЧА дЄКеЕ©йА±</button>
      <button class="btn btn-sm" onclick="_hcalOffset=0;renderHCal()">жЬђйА±</button>
      <button class="btn btn-sm" onclick="_hcalOffset++;renderHCal()">дЄЛеЕ©йА± вЦґ</button>
      <span style="font-size:12px;color:var(--text2)">${fmtDate(week1Days[0])} вАУ ${fmtDate(week2Days[6])}</span>
      <button class="btn btn-pdf btn-sm no-print" onclick="printHCal()" style="margin-left:auto">рЯЦ® PDF</button>
    </div>
    ${buildWeekTable(week1Days,w1Title)}
    ${buildWeekTable(week2Days,w2Title)}
    <div style="padding:7px 10px;background:var(--surface);border-radius:var(--rs);font-size:11px;color:var(--text3)">
      рЯТ° й©ЧжФґжЩВжЃµеЬ®гАМеЃҐжИґдЇ§е±ЛзЛАжЕЛи°®гАНдЄ≠е±ХйЦЛеРДжИґеН°зЙЗи®≠еЃЪгАВзіЂиЙ≤еЇХиЙ≤ж†Љдї£и°®жЬЙеЃЙжОТжИґеИ•гАВ
    </div>`;
}

function renderPubArea(){
  if(!S.handoverUnits)S.handoverUnits={};
  if(!S.publicAreaList)S.publicAreaList={A:[],B:[]};
  const today=new Date();today.setHours(0,0,0,0);

  function classifyRow(r){
    const unit=String(r.unit||'');const floor=String(r.floor||'').toUpperCase();
    const zoneLabel=S.zones.find(z=>z.id===r.zone);const zoneName=zoneLabel?zoneLabel.label:'';
    if(/еЇЧйЛ™|shop/i.test(unit)||/еЬ∞A\d+$|ж•≠A\d+$|еЬ∞C\d/i.test(unit))return null;
    const isPublicZone=zoneName.includes('еЕђи®≠');
    const isStairA=/зФ≤жҐѓ|дєЩжҐѓ|Aж£ЯжҐѓеї≥|AжҐѓеї≥/.test(unit);
    const isStairB=/дЄЩжҐѓ|дЄБжҐѓ|Bж£ЯжҐѓеї≥|BжҐѓеї≥/.test(unit);
    const isStairCommon=/жҐѓеї≥|ж®УжҐѓйЦУ/.test(unit)&&!isStairA&&!isStairB;
    const isBasementFloor=/^B[1-5]F?$|^B[1-5]$|иїКйБУ|ж©ЯиїКйБУ/.test(floor)||/иїКйБУ|ж©ЯиїКйБУ/.test(unit);
    if(!isPublicZone&&!isStairA&&!isStairB&&!isStairCommon&&!isBasementFloor)return null;
    if(isBasementFloor)return'basement';
    if(isStairA||(isPublicZone&&/Aж£Я|AжҐѓ/.test(zoneName)))return'pubA';
    if(isStairB||(isPublicZone&&/Bж£Я|BжҐѓ/.test(zoneName)))return'pubB';
    if(isPublicZone)return'pubA';
    return null;
  }

  const pubAUnits=new Set(),pubBUnits=new Set(),basementUnitsSet=new Set();
  S.rows.forEach(r=>{if(!r.unit)return;const cls=classifyRow(r);if(cls==='pubA')pubAUnits.add(r.unit);else if(cls==='pubB')pubBUnits.add(r.unit);else if(cls==='basement')basementUnitsSet.add(r.unit);});

  function makeCard(u,label){
    const displayKey=label||u;
    const hu=S.handoverUnits[u]||{};
    const pct=hoUnitPct(u)||0;
    const grade=hoGrade(pct);
    const daysLeft=hu.planDate?Math.ceil((new Date(hu.planDate)-today)/86400000):null;
    const overdue=hu.planDate&&daysLeft<0&&!hu.delivered;
    const urgent=hu.planDate&&daysLeft!=null&&daysLeft>=0&&daysLeft<=3&&!hu.delivered;
    const isExp=_hovExpanded===u;
    let warnTag='';
    if(overdue)warnTag=`<span style="font-size:10px;color:#791F1F;background:#FCEBEB;border-radius:20px;padding:1px 6px">вЪ† йАЊжЬЯ${Math.abs(daysLeft)}е§©</span>`;
    else if(urgent)warnTag=`<span style="font-size:10px;color:#633806;background:#FAEEDA;border-radius:20px;padding:1px 6px">вП∞${daysLeft}е§©еЊМ</span>`;
    let expandHtml='';

function confirmClientEdit(key){
  if(!S.clientData)S.clientData={};

  const allCards=document.querySelectorAll('[data-cl-key]');
  let card=null;
  allCards.forEach(el=>{if(el.getAttribute('data-cl-key')===key)card=el;});
  if(card){
    const n=card.querySelector('.cl-inp-name');if(n)clBufSet(key,'name',n.value);
    const t=card.querySelector('.cl-inp-tel');if(t)clBufSet(key,'tel',t.value);
    const tp=card.querySelector('.cl-inp-type');if(tp)clBufSet(key,'type',tp.value);
    const nt=card.querySelector('.cl-inp-note');if(nt)clBufSet(key,'note',nt.value);

function importClientExcel(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      // иЗ™еЛХйБЄжЬАзЫЄйЧЬзЪДеИЖй†Б
      const wsName=wb.SheetNames.find(n=>n.includes('еЃҐжИґ')||n.includes('еРНеЦЃ')||n.includes('дљПжИґ'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('Excel зД°жЬЙжХИи≥ЗжЦЩ','вЪ†пЄП');return;}
      if(!S.clientData)S.clientData={};
      const CMAP={
        'жИґеИ•':'unit','жИґиЩЯ':'unit','жИњиЩЯ':'unit',
        'еІУеРН':'name','еЃҐжИґеІУеРН':'name','дљПжИґеІУеРН':'name','е±ЛдЄї':'name',
        'йЫїи©±':'tel','иБѓзµ°йЫїи©±':'tel','жЙЛж©Я':'tel','йЫїи©±иЩЯзҐЉ':'tel',
        'й°ЮеЮЛ':'type','жИґеИ•й°ЮеЮЛ':'type','иЇЂдїљ':'type',
        'иїКдљН':'parking','иїКдљНзЈ®иЩЯ':'parking','еБЬиїКдљН':'parking',
        'еВЩи®ї':'note','ж≥®жДПдЇЛй†Е':'note','и™™жШО':'note',
      };
      let added=0,updated=0;
      raw.forEach(row=>{
        const m={};
        Object.entries(row).forEach(([k,v])=>{
          const fk=CMAP[k.trim()];if(!fk)return;
          m[fk]=String(v||'').trim();
        });
        if(!m.unit)return;
        // еШЧи©¶еМєйЕН unitKey вАФ еЕИзЫіжО•жѓФе∞НпЉМеЖНи©¶ G95 ж†ЉеЉП
        const key=m.unit;
        const existed=!!S.clientData[key];
        if(!S.clientData[key])S.clientData[key]={name:'',tel:'',type:'иЗ™и≥ЉжИґ',parkings:[],note:''};
        if(m.name)S.clientData[key].name=m.name;
        if(m.tel)S.clientData[key].tel=m.tel;
        if(m.type)S.clientData[key].type=m.type;
        if(m.note)S.clientData[key].note=m.note;
        if(m.parking){
          const parks=m.parking.split(/[,пЉМгАБ\s]+/).map(p=>p.trim()).filter(Boolean);
          if(!S.clientData[key].parkings)S.clientData[key].parkings=[];
          parks.forEach(p=>{if(!S.clientData[key].parkings.includes(p))S.clientData[key].parkings.push(p);});
        }
        existed?updated++:added++;
      });
      logChange('рЯУВ еЃҐжИґжЄЕеЦЃеМѓеЕ•',`ж™Фж°ИпЉЪ${file.name}пЉМжЦ∞еҐЮ ${added} з≠ЖпЉМжЫіжЦ∞ ${updated} з≠Ж`);
      save();renderClients();
      toast(`еЃҐжИґжЄЕеЦЃеМѓеЕ•еЃМжИРпЉЪжЦ∞еҐЮ ${added} з≠ЖпЉМжЫіжЦ∞ ${updated} з≠Ж`,'вЬЕ');
    }catch(ex){toast('еМѓеЕ•е§±жХЧпЉЪ'+ex.message,'вЭМ');}
  };
  rd.readAsArrayBuffer(file);
}
function downloadClientTemplate(){

  try{

    const ws=XLSX.utils.aoa_to_sheet([
      ['жИґеИ•','еІУеРН','йЫїи©±','й°ЮеЮЛ','иїКдљН','еВЩи®ї'],
      ['еЬ∞A1-27','еЉµвЧЛвЧЛ','0912-000-001','еЬ∞дЄїжИґ','B2-333гАБB2-334','еВЩж≥®1'],

        'A3-18,жЭОвЧЛвЧЛ,0912-000-002,иЗ™и≥ЉжИґ,,',
        'ж•≠A5-1,зОЛвЧЛвЧЛ,0912-000-003,ж•≠дЄїжИґ,B1-100,еЇЧйЛ™ж•≠дЄї',
      ].join('\n');
      const bom='\uFEFF'; // UTF-8 BOM иЃУ Excel ж≠£зҐЇй°ѓз§ЇдЄ≠жЦЗ
      const blob=new Blob([bom+rows],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='еЃҐжИґжЄЕеЦЃеМѓеЕ•зѓДжЬђ.csv';
      document.body.appendChild(a);a.click();

  }
}

    const k=`${u}|||${f}|||${is}`;

    </div>`;
    return;
  }
  const totalRows=dupGroups.reduce((s,g)=>s+g.rows.length,0);

    const allChecked=groupIds.every(id=>_sel.has(id));

      const isB=/^B\d/i.test(r.unit||'');
      const isShop=G95_SHOP_KEYS&&G95_SHOP_KEYS.has(r.unit||'');
      const tagBg=isShop?'#FFF3CD':isB?'#E1F5EE':'#EBF4FF';
      const tagColor=isShop?'#6B4D00':isB?'#085041':'#0A3D6E';
      const tagLbl=isShop?'еЇЧ':isB?'B':'A';
      const dateStr=r.createdAt?(new Date(r.createdAt)).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}):'вАФ';
      const chk=_sel.has(r.id);
      return`<div style="display:grid;grid-template-columns:32px 90px 55px 1fr 100px 70px;gap:6px;padding:6px 12px;font-size:11px;align-items:center;border-bottom:0.5px solid var(--border2);cursor:pointer;background:${chk?'#EEEDFE':'transparent'}" onclick="dupeToggleRow(${r.id})">

        <span style="display:inline-flex;align-items:center;gap:4px"><span style="font-size:9px;padding:1px 4px;border-radius:3px;background:${tagBg};color:${tagColor}">${tagLbl}</span>${esc(r.unit||'вАФ')}</span>
        <span>${esc(r.floor||'вАФ')}</span>
        <span>${esc(r.issue||'вАФ')}</span>
        <span style="color:var(--text2)">${esc(r.vendor||'вАФ')}</span>
        <span style="color:var(--text3)">${dateStr}</span>
      </div>`;
    }).join('');
    return`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden">

        <span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#F5C842;color:#5A3E00;font-weight:600">${g.rows.length} з≠ЖйЗНи§З</span>

      ${selCount>0?`<span style="font-size:11px;color:var(--purple);font-weight:500;background:#EEEDFE;padding:2px 8px;border-radius:20px">еЈ≤йБЄ ${selCount} з≠Ж</span>`:''}

    </div>
    ${groupsHtml}
  </div>`;
}

function dupeToggleRow(id){
  if(!window._dupeSel)window._dupeSel=new Set();
