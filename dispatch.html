<style>
:root{--blue:#2563eb;--blueL:#dbeafe;--purple:#7c3aed;--purpleL:#ede9fe;--ok:#16a34a;--warn:#f59e0b;--red:#ef4444;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#f3f4f6;--nav:62px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px));}
/* app bar */

.appbar .sub button{background:rgba(255,255,255,.18);border:0;color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;}

.navitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;color:#94a3b8;cursor:pointer;}
.navitem.on{color:var(--blue);}
.navitem svg{width:24px;height:24px;}
.wrap{padding:12px;max-width:1320px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;}
.btn{border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:9px 14px;font-size:14px;color:#374151;min-height:40px;}
.btn:active{background:#f1f5f9;}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.green{background:#f0fdf4;color:#15803d;border-color:#86efac;}
.btn.sm{padding:6px 11px;font-size:13px;min-height:34px;}
.btn.danger{color:#b91c1c;border-color:#fca5a5;background:#fff5f5;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.spacer{flex:1;}
.muted{color:var(--mut);}
input,select,textarea{font-family:inherit;font-size:16px;padding:9px 10px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;}
input[type=checkbox]{width:20px;height:20px;}
.seg{display:inline-flex;background:#eef1f5;border-radius:10px;padding:3px;}
.seg button{border:0;background:transparent;padding:8px 16px;border-radius:8px;font-weight:600;color:#64748b;min-height:36px;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.note{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 11px;font-size:13px;color:#78350f;margin-bottom:10px;}
/* people */
.grid-people{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.pcard .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#eef2f6;border:1px dashed #cbd5e1;display:inline-flex;align-items:center;justify-content:center;color:#9ca3af;font-size:11px;}
.pcard .ph-head{display:flex;gap:10px;align-items:flex-start;}
.pcard .nm{font-weight:700;font-size:16px;}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:9px;background:#e0f2fe;color:#0369a1;margin-left:4px;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-right:5px;}
.star{color:var(--warn);}
.pexp{margin-top:9px;border-top:1px solid var(--line);padding-top:9px;font-size:14px;display:none;}
.pcard.open .pexp{display:block;}
.kv{margin:4px 0;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:4px 11px;border-radius:12px;background:#e2e8f0;color:#334155;margin:3px 4px 3px 0;}
.chip.lead{background:#fef3c7;color:#92400e;}
.chip.mac{background:#ecfeff;color:#155e75;}
.chip.over{background:#fee2e2;color:#b91c1c;}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:10px;overflow:hidden;}
th,td{border:1px solid var(--line);padding:8px;text-align:left;font-size:14px;}
th{background:#e2e8f0;}

.stg-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.stg{min-width:240px;max-width:240px;background:#fff;border:1px solid #fecaca;border-radius:12px;padding:10px;font-size:13px;}
.stg.soon{border-color:#fde68a;}
.board{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:820px){.board{grid-template-columns:1fr;}}
.col h2{font-size:16px;margin:0 0 10px;padding:10px 14px;border-radius:12px;}

.seq{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

.cross{font-size:12px;padding:3px 10px;border-radius:12px;background:#ddd6fe;color:#5b21b6;}

.drop.dragover{outline:2px dashed var(--blue);background:#f0f7ff;}

.pchip{background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:7px 12px;font-size:13px;cursor:grab;}
/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.mask.on{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;max-width:600px;width:100%;max-height:92vh;overflow:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom,0px));}

.fld{margin-bottom:11px;display:flex;flex-direction:column;gap:5px;}
.fld label{font-size:13px;color:#374151;font-weight:600;}
.fld input,.fld select,.fld textarea{width:100%;}
.flex2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pick-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;}
/* V0.3 */
.pill{border:1px solid #cbd5e1;background:#fff;border-radius:17px;padding:7px 13px;font-size:13.5px;color:#64748b;font-weight:600;min-height:34px;}
.pill.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.dnum{font-size:12px;padding:2px 8px;border-radius:6px;background:#f1f5f9;border:1px solid #cbd5e1;color:#334155;font-weight:600;white-space:nowrap;}
.samebadge{font-size:11px;padding:2px 8px;border-radius:10px;background:#fce7f3;color:#9d174d;white-space:nowrap;}
.srcbadge{font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer;border:0;white-space:nowrap;}
.srcbadge.chg{background:#fef3c7;color:#92400e;}
.srcbadge.done{background:#dcfce7;color:#166534;}
.prow{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:10px;display:flex;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.prow .pinfo{width:160px;flex:none;display:flex;gap:9px;align-items:flex-start;}
.prow .pitems{flex:1;min-width:0;}
.pitem{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;cursor:pointer;}
.slotpill{font-size:12px;padding:2px 9px;border-radius:11px;flex:none;white-space:nowrap;}
.slotpill.am{background:#dcfce7;color:#166534;}.slotpill.pm{background:#fee2e2;color:#991b1b;}.slotpill.full{background:#dbeafe;color:#1e40af;}.slotpill.cus{background:#e0e7ff;color:#3730a3;}
.avat{width:42px;height:42px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:none;}
.unassigned{background:#fff7ed;border:1px solid #fdba74;border-radius:14px;padding:11px;margin-bottom:10px;}
.dayhdr{font-size:16px;margin:0 0 10px;padding:10px 14px;border-radius:12px;background:var(--blueL);color:#1e40af;font-weight:700;display:flex;align-items:center;gap:8px;}
.dayhdr .spacer{flex:1;}
.stg-sec{margin-top:6px;}
.stg-sec .sechdr{font-weight:700;font-size:13px;cursor:pointer;padding:5px 0;user-select:none;}
@media(max-width:560px){.prow{flex-direction:column;gap:8px}.prow .pinfo{width:auto;}}
#loginMask{background:#1e293b;align-items:center;}
#loginMask .modal{max-width:360px;text-align:center;border-radius:16px;margin:14px;}

<script>
"use strict";
var LS_KEY='g95dispatch_v1';
var DS=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayISO(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseISO(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(s,n){var d=parseISO(s);d.setDate(d.getDate()+n);return todayISO(d);}
function wd(s){return '日一二三四五六'[parseISO(s).getDay()];}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(DS));}catch(e){console.warn(e);}}
function load(){try{var r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}

function seed(){
  var t=todayISO();
  return {user:null,view:'card',viewMode:'work',selDays:[0,1],candDays:3,serial:2,
    people:[

      {id:'p3',name:'王大明',migrant:false,gender:'男',birth:'1979-11-02',company:'大同',skill:'水電',foreman:false,laborIns:true,healthIns:false,safety:'2026-06-15',photo:'',note:''},
      {id:'p4',name:'阮氏蘭',migrant:true,gender:'女',birth:'1992-06-30',company:'金藏',skill:'油漆',foreman:false,laborIns:true,healthIns:true,safety:'2026-12-01',photo:'',note:''},
      {id:'p5',name:'林建宏',migrant:false,gender:'男',birth:'1983-01-22',company:'金藏',skill:'操作手',foreman:true,laborIns:true,healthIns:true,safety:'2026-08-01',photo:'',note:''},
      {id:'p6',name:'蘇文清',migrant:true,gender:'男',birth:'1990-09-09',company:'永豐',skill:'拆除',foreman:false,laborIns:false,healthIns:true,safety:'2026-07-05',photo:'',note:''}
    ],
    machines:[{id:'m1',serial:'M001',name:'打石機',qty:2,note:''},{id:'m2',serial:'M002',name:'吸塵器',qty:3,note:''},{id:'m3',serial:'M003',name:'吊車',qty:2,note:'需證照'}],
    vendors:['001(業)群豐(水電)','002(業)裝修(草層)','A300金藏(工務所判定)','A301金藏(點工)','A088宏泰(點工)','A590-1清潔(能杰)','B205大同(泥作)','C110永豐(防水)'],
    candidates:[
      {refId:'1310',round:'初驗',unit:'A10 · 28F',content:'天花板批土',note:'',vendor:'A301金藏(點工)',due:addDays(t,-1)},
      {refId:'1339',round:'初驗',unit:'A8 · 31F',content:'浴室門框收邊',note:'含矽利康',vendor:'A301金藏(點工)',due:t},
      {refId:'1402',round:'初驗',unit:'B2 · 店面',content:'拆除清運',note:'垃圾車需預約',vendor:'A088宏泰(點工)',due:addDays(t,2)},
      {refId:'1455',round:'複驗',unit:'A12 · 15F',content:'門框矽利康',note:'',vendor:'A301金藏(點工)',due:addDays(t,3)},
      {refId:'1460',round:'複驗',unit:'B6 · 12F',content:'地板刮傷修補',note:'複驗未過重做',vendor:'A088宏泰(點工)',due:addDays(t,1)},
      {refId:'1470',round:'初驗',unit:'A3 · 8F',content:'牆面修補油漆',note:'',vendor:'A301金藏(點工)',due:addDays(t,4)},
      {refId:'1481',round:'複驗',unit:'A6 · 22F',content:'天花板收邊條更換',note:'',vendor:'A301金藏(點工)',due:addDays(t,6)}

function ageOf(birth){if(!birth)return'';var b=parseISO(birth),n=new Date();var a=n.getFullYear()-b.getFullYear();var m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a;}
function safetyStatus(s){if(!s)return'';var diff=(parseISO(s)-new Date())/86400000;if(diff<0)return'over';if(diff<=30)return'soon';return'ok';}
function safetyColor(st){return st==='over'?'var(--red)':st==='soon'?'var(--warn)':st==='ok'?'var(--ok)':'#cbd5e1';}
function personById(id){return DS.people.filter(function(p){return p.id===id;})[0];}
function machineById(id){return DS.machines.filter(function(m){return m.id===id;})[0];}
function mgrCode(name){return name?name.slice(-1):'?';}
function mgrColor(name){var pal=['#16a34a','#7c3aed','#0891b2','#db2777','#ea580c','#0d9488'];var s=0;for(var i=0;i<(name||'').length;i++)s+=name.charCodeAt(i);return pal[s%pal.length];}
function slotRange(it){if(it.slotType==='custom'&&it.start&&it.end){var a=it.start.split(':'),b=it.end.split(':');return[(+a[0])*60+(+a[1]),(+b[0])*60+(+b[1])];}if(it.slot==='am')return[480,720];if(it.slot==='pm')return[780,1020];return[480,1020];}
function overlap(a,b){var ra=slotRange(a),rb=slotRange(b);return ra[0]<rb[1]&&rb[0]<ra[1];}
function slotLabel(it){if(it.slotType==='custom')return (it.start||'')+'–'+(it.end||'');return it.slot==='am'?'上午':it.slot==='pm'?'下午':'全天';}
function parseUnit(s){s=String(s||'');var fm=s.match(/(\d+)\s*[Ff]/);var floor=fm?+fm[1]:null;var bm=s.match(/([A-Za-z]+)\s*(\d+)/);var bldg=bm?bm[1].toUpperCase():'';var num=bm?+bm[2]:0;return{floor:floor,bldg:bldg,num:num};}
function unitCompare(a,b){var pa=parseUnit(a),pb=parseUnit(b);var fa=pa.floor==null?-Infinity:pa.floor,fb=pb.floor==null?-Infinity:pb.floor;if(fa!==fb)return fb-fa;if(pa.bldg!==pb.bldg)return pa.bldg<pb.bldg?-1:1;return pa.num-pb.num;}
function conflictsFor(day){
  var items=DS.items.filter(function(it){return it.day===day;});var pConf={},mOver={};
  for(var i=0;i<items.length;i++)for(var j=i+1;j<items.length;j++){if(!overlap(items[i],items[j]))continue;
    (items[i].assignees||[]).forEach(function(a){if((items[j].assignees||[]).some(function(b){return b.personId===a.personId;})){pConf[items[i].id+'|'+a.personId]=1;pConf[items[j].id+'|'+a.personId]=1;}});}
  DS.machines.forEach(function(m){items.forEach(function(it){var here=(it.machines||[]).filter(function(x){return x.machineId===m.id;})[0];if(!here)return;var sum=0;items.forEach(function(o){if(overlap(it,o)){var h=(o.machines||[]).filter(function(x){return x.machineId===m.id;})[0];if(h)sum+=(+h.qty||0);}});if(sum>m.qty)mOver[it.id+'|'+m.id]=1;});});
  return {p:pConf,m:mOver};
}

function switchTab(name){
  document.querySelectorAll('.navitem').forEach(function(t){t.classList.toggle('on',t.dataset.tab===name);});
  ['board','people','machine'].forEach(function(n){document.getElementById('pane-'+n).style.display=(n===name?'':'none');});
  document.getElementById('appTitle').textContent=name==='people'?'人員清單':name==='machine'?'機具清單':'點工派遣';
  if(name==='people')renderPeople();if(name==='machine')renderMachine();if(name==='board')renderBoard();
}

/* board */
var DAY_NAMES=['今天','明天','後天'];
var _stgColl={},_stgLimit={};
function dayOf(off){return addDays(todayISO(),off);}
function itemsOn(day){return DS.items.filter(function(i){return i.day===day;});}
function selOffs(){var s=(DS.selDays&&DS.selDays.length?DS.selDays:[0,1]).slice();s.sort(function(a,b){return a-b;});return s;}
function dnumLabel(it){return it.dnum?('D-'+String(it.dnum).padStart(4,'0')):'';}
function hoursOf(it){if(it.slotType==='custom'){var r=slotRange(it);return Math.max(0,Math.round((r[1]-r[0])/6)/10);}return it.slot==='full'?8:4;}
function slotSortKey(it){if(it.slotType!=='custom'&&it.slot==='full')return -1;return slotRange(it)[0];}
function slotPillCls(it){if(it.slotType==='custom')return 'cus';return it.slot==='am'?'am':it.slot==='pm'?'pm':'full';}
function bySlot(a,b){var d=slotSortKey(a)-slotSortKey(b);return d||((a.dnum||0)-(b.dnum||0));}
function importedRefs(){return DS.items.filter(function(i){return i.refId;}).map(function(i){return i.refId;});}
function renderBoard(){
  renderPills();renderCapScope();
  document.getElementById('viewToggle').textContent=DS.view==='card'?'條列式':'卡片';
  document.querySelectorAll('#vmSeg button').forEach(function(b){b.classList.toggle('on',b.dataset.vm===(DS.viewMode||'work'));});
  renderStaging();
  var area=document.getElementById('capArea');area.innerHTML='';
  if((DS.viewMode||'work')==='person'){renderPersonView(area);}
  else if(DS.view==='card'){renderWorkCards(area);}
  else{renderWorkList(area);}
}
function renderPills(){
  var host=document.getElementById('dayPills');host.innerHTML='';
  for(var off=0;off<3;off++){(function(off){
    var b=document.createElement('button');b.className='pill'+(selOffs().indexOf(off)>=0?' on':'');
    b.textContent=DAY_NAMES[off].charAt(0)+' '+dayOf(off).slice(5).replace('-','/')+'('+wd(dayOf(off))+')';
    b.onclick=function(){togglePill(off);};host.appendChild(b);})(off);}
}
function togglePill(off){
  var s=(DS.selDays&&DS.selDays.length?DS.selDays:[0,1]).slice();
  var i=s.indexOf(off);
  if(i>=0){if(s.length>1)s.splice(i,1);}
  else{s.push(off);if(s.length>2)s.shift();}
  DS.selDays=s;save();renderBoard();
}
function renderCapScope(){
  var sel=document.getElementById('capScope');var v=sel.value;
  sel.innerHTML='<option value="all">全選</option>'+selOffs().map(function(o){return '<option value="'+o+'">'+DAY_NAMES[o]+'</option>';}).join('');
  var ok=false;for(var i=0;i<sel.options.length;i++)if(sel.options[i].value===v)ok=true;
  if(ok)sel.value=v;
}
function renderWorkCards(area){
  var offs=selOffs();
  var board=document.createElement('div');board.className='board';
  if(offs.length===1)board.style.gridTemplateColumns='1fr';
  offs.forEach(function(off){
    var day=dayOf(off);
    var col=document.createElement('div');col.className='col '+(off===0?'today':'tom');col.id='day_'+off;
    col.innerHTML='<h2>'+DAY_NAMES[off]+'　'+day+' ('+wd(day)+')</h2><div class="people-strip"></div><div class="ilist"></div>'+
      '<div class="row"><button class="btn sm" data-imp="1">＋ 從追蹤總表帶入</button><button class="btn sm green" data-man="'+off+'">＋ 手動新增</button></div>';
    var strip=col.querySelector('.people-strip');strip.innerHTML='<span class="muted" style="font-size:12px">拖人員到工項卡 →</span> ';
    DS.people.forEach(function(p){var c=document.createElement('span');c.className='pchip';c.draggable=true;c.textContent=(p.foreman?'★':'')+p.name;
      c.ondragstart=function(e){e.dataTransfer.setData('text/plain',JSON.stringify({personId:p.id}));};strip.appendChild(c);});
    var conf=conflictsFor(day);var list=col.querySelector('.ilist');
    itemsOn(day).forEach(function(it){list.appendChild(itemCard(it,conf));});
    col.querySelector('[data-imp]').onclick=function(){document.getElementById('staging').scrollIntoView({behavior:'smooth'});};
    col.querySelector('[data-man]').onclick=function(){addManual(off);};
    board.appendChild(col);
  });
  area.appendChild(board);
}
function renderPersonView(area){
  selOffs().forEach(function(off){
    var day=dayOf(off);var items=itemsOn(day);
    var ppl=0;items.forEach(function(it){ppl+=(it.assignees||[]).length;});
    var sec=document.createElement('div');sec.id='day_'+off;sec.style.marginBottom='16px';
    var hd=document.createElement('div');hd.className='dayhdr';
    hd.innerHTML='<span>'+DAY_NAMES[off]+' '+day.slice(5).replace('-','/')+'('+wd(day)+') — 共 '+items.length+' 件 · '+ppl+' 人次</span><span class="spacer"></span><button class="btn sm green" data-man="'+off+'">＋ 手動新增</button>';
    hd.querySelector('[data-man]').onclick=function(){addManual(off);};
    sec.appendChild(hd);
    var by={};items.forEach(function(it){(it.assignees||[]).forEach(function(a){(by[a.personId]=by[a.personId]||[]).push(it);});});
    var pids=Object.keys(by);
    pids.sort(function(a,b){
      var ea=Math.min.apply(null,by[a].map(slotSortKey)),eb=Math.min.apply(null,by[b].map(slotSortKey));
      if(ea!==eb)return ea-eb;
      var pa=personById(a),pb=personById(b);
      var fa=pa&&pa.foreman?1:0,fb=pb&&pb.foreman?1:0;
      if(fa!==fb)return fb-fa;
      return DS.people.indexOf(pa)-DS.people.indexOf(pb);
    });
    if(DS.view==='list'){sec.appendChild(personTable(day,pids,by));}
    else{
      if(!pids.length){var e=document.createElement('div');e.className='muted';e.style.cssText='padding:6px 4px 10px';e.textContent='（尚無指派）';sec.appendChild(e);}
      pids.forEach(function(pid){sec.appendChild(personRow(pid,by[pid]));});
      var un=items.filter(function(it){return !(it.assignees||[]).length;}).sort(bySlot);
      if(un.length){var ub=document.createElement('div');ub.className='unassigned';ub.innerHTML='<div style="font-weight:700;color:#9a3412;margin-bottom:6px">⚠ 未指派（'+un.length+'）</div>';un.forEach(function(it){ub.appendChild(pitemChip(it));});sec.appendChild(ub);}
    }
    area.appendChild(sec);
  });
}
function personRow(pid,items){
  var p=personById(pid);items=items.slice().sort(bySlot);
  var hrs=0;items.forEach(function(it){hrs+=hoursOf(it);});
  hrs=Math.round(hrs*10)/10;
  var d=document.createElement('div');d.className='prow';
  d.innerHTML='<div class="pinfo"><span class="avat">'+esc((p?p.name:'?').slice(0,2))+'</span><div>'+
    '<div style="font-weight:700">'+esc(p?p.name:'(已刪除)')+(p&&p.foreman?' <span class="star">★</span>':'')+(p&&p.migrant?' <span class="badge">移工</span>':'')+'</div>'+
    (p?'<div class="muted" style="font-size:12px">'+esc(p.company)+' · '+esc(p.skill)+'</div>':'')+
    '<div style="margin-top:4px"><span class="chip"'+(hrs>8?' style="background:#fee2e2;color:#b91c1c"':'')+'>'+items.length+' 件 · '+hrs+'h'+(hrs>8?' ⚠':'')+'</span></div>'+
    '</div></div><div class="pitems"></div>';
  var host=d.querySelector('.pitems');
  items.forEach(function(it){host.appendChild(pitemChip(it));});
  return d;
}
function pitemChip(it){
  var el=document.createElement('div');el.className='pitem';
  var n=(it.assignees||[]).length;
  var mtxt=(it.machines||[]).map(function(m){var mc=machineById(m.machineId);return mc?mc.name+'×'+m.qty:'';}).join('、');
  el.innerHTML='<span class="slotpill '+slotPillCls(it)+'">'+esc(slotLabel(it))+'</span><span class="dnum">'+dnumLabel(it)+'</span>'+
    '<span style="flex:1;min-width:120px">'+(it.refId?'#'+esc(it.refId)+' ':'(手動) ')+esc(it.unit||'')+(it.unit?' ':'')+esc(it.content||'(未填內容)')+(mtxt?'｜'+esc(mtxt):'')+'</span>'+
    (n>1?'<span class="samebadge">同單·共'+n+'人</span>':'')+
    (it.crossId?'<span class="cross">跨兩天</span>':'')+
    (it.srcChanged?'<button class="srcbadge chg">⟳來源已變更</button>':'')+
    (it.srcDone?'<button class="srcbadge done">✅來源已完成</button>':'');
  el.onclick=function(e){if(e.target.classList&&e.target.classList.contains('srcbadge')){srcInfo(it);return;}editItem(it.id);};
  return el;
}
function trCells(it){
  var ml=(it.machines||[]).map(function(m){var mc=machineById(m.machineId);return mc?mc.name+'×'+m.qty:'';}).join('、');
  return '<td>'+esc(slotLabel(it))+'</td><td>'+dnumLabel(it)+'</td><td>'+(it.refId?'#'+esc(it.refId):'(手動)')+'</td><td><b>'+esc(it.unit||'')+'</b></td><td>'+esc(it.content||'')+'</td><td>'+esc(it.respVendor||'')+'</td><td>'+(it.mgr?'<span class="mgr" style="background:'+mgrColor(it.mgr)+'">'+esc(mgrCode(it.mgr))+'</span>':'')+'</td><td>'+esc(ml||'—')+'</td>';
}
function personTable(day,pids,by){
  var rows='';
  pids.forEach(function(pid){var p=personById(pid);var its=by[pid].slice().sort(bySlot);
    its.forEach(function(it,ix){rows+='<tr data-id="'+it.id+'"><td>'+(ix===0?('<b>'+esc(p?p.name:'?')+'</b>'+(p&&p.foreman?'★':'')):'')+'</td>'+trCells(it)+'</tr>';});});
  var un=itemsOn(day).filter(function(it){return !(it.assignees||[]).length;}).sort(bySlot);
  un.forEach(function(it){rows+='<tr data-id="'+it.id+'" style="background:#fff7ed"><td class="warn-txt">未指派</td>'+trCells(it)+'</tr>';});
  var w=document.createElement('div');w.style.overflowX='auto';
  w.innerHTML='<table><thead><tr><th>人員</th><th>時段</th><th>流水號</th><th>#G95</th><th>戶別</th><th>工作內容</th><th>責任廠商</th><th>管理</th><th>機具</th></tr></thead><tbody>'+(rows||'<tr><td colspan="9" class="muted">尚無工作事項</td></tr>')+'</tbody></table>';
  w.querySelectorAll('tr[data-id]').forEach(function(r){r.style.cursor='pointer';r.onclick=function(){editItem(r.dataset.id);};});
  return w;
}
function srcInfo(it){
  var box=document.getElementById('modalBox');var s=it.src||{};

function dueDiff(due){return Math.round((parseISO(due)-parseISO(todayISO()))/86400000);}
function renderStaging(){
  var body=document.getElementById('stgBody');body.innerHTML='';
  document.getElementById('stgDays').value=String(DS.candDays||3);
  var q=(document.getElementById('stgSearch').value||'').trim();var sort=document.getElementById('stgSort').value;var imp=importedRefs();
  var N=+(DS.candDays||3);
  var list=DS.candidates.filter(function(c){return imp.indexOf(c.refId)<0&&dueDiff(c.due)<=N;});
  if(q)list=list.filter(function(c){return (c.unit+c.vendor+c.content+(c.note||'')+c.refId).indexOf(q)>=0;});
  list.sort(function(a,b){if(sort==='unit')return unitCompare(a.unit,b.unit);if(sort==='vendor')return a.vendor.localeCompare(b.vendor);return a.due.localeCompare(b.due);});
  document.getElementById('stgTitle').textContent='待帶入工作（'+list.length+' 筆）';
  if(!list.length){body.innerHTML='<span class="muted">（目前範圍內無待帶入工作）</span>';return;}
  [['初驗','🔵 初驗區'],['複驗','🟣 複驗區']].forEach(function(pair){
    var sub=list.filter(function(c){return (c.round||'初驗')===pair[0];});
    if(!sub.length)return;
    var open=!_stgColl[pair[0]];
    var sec=document.createElement('div');sec.className='stg-sec';
    sec.innerHTML='<div class="sechdr">'+(open?'▾ ':'▸ ')+pair[1]+'（'+sub.length+' 筆）</div><div class="stg-cards"'+(open?'':' style="display:none"')+'></div>';
    sec.querySelector('.sechdr').onclick=function(){_stgColl[pair[0]]=open;renderStaging();};
    var host=sec.querySelector('.stg-cards');
    var lim=_stgLimit[pair[0]]||50;
    sub.slice(0,lim).forEach(function(c){host.appendChild(stgCard(c));});
    if(sub.length>lim){var mb=document.createElement('button');mb.className='btn sm';mb.style.minWidth='120px';mb.textContent='載入更多（餘 '+(sub.length-lim)+'）';mb.onclick=function(){_stgLimit[pair[0]]=lim+50;renderStaging();};host.appendChild(mb);}
    body.appendChild(sec);
  });
}

  d.innerHTML='<div class="row"><b style="color:'+(diff<0?'#b91c1c':'#92400e')+'">'+lbl+'</b><span class="badge">'+esc(c.round||'初驗')+'</span><span class="idtag">#'+esc(c.refId)+'</span></div>'+

function migrate(){
  if(!DS.selDays||!DS.selDays.length)DS.selDays=[0,1];
  if(!DS.viewMode)DS.viewMode='work';
  if(!DS.candDays)DS.candDays=3;
  if(DS.vendors&&DS.vendors.length&&typeof DS.vendors[0]==='object'){DS.vendors=DS.vendors.map(function(v){return (v.code||'')+(v.name||'')+'('+(v.type||'')+')';});}
  if(!DS.candidates||!DS.candidates.length||!DS.candidates[0].round){DS.candidates=seed().candidates;}
  if(!DS.serial){DS.serial=1;var seen={};(DS.items||[]).forEach(function(it){if(it.dnum){if(it.dnum>=DS.serial)DS.serial=it.dnum+1;return;}if(it.crossId&&seen[it.crossId]){it.dnum=seen[it.crossId];return;}it.dnum=DS.serial++;if(it.crossId)seen[it.crossId]=it.dnum;});}
  delete DS.boardDay;delete DS.baseDate;
}

  document.addEventListener('visibilitychange',function(){if(!document.hidden&&_curDay!==todayISO()){_curDay=todayISO();renderBoard();}});
  window.addEventListener('focus',function(){if(_curDay!==todayISO()){_curDay=todayISO();renderBoard();}});
  renderBoard();
}
boot();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
