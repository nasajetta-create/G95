function renderPubArea(){
  if(!S.handoverUnits)S.handoverUnits={};
  if(!S.publicAreaList)S.publicAreaList={A:[],B:[]};
  const today=new Date();today.setHours(0,0,0,0);

  function classifyRow(r){
    const unit=String(r.unit||'');const floor=String(r.floor||'').toUpperCase();
    const zoneLabel=S.zones.find(z=>z.id===r.zone);const zoneName=zoneLabel?zoneLabel.label:'';
    if(/店鋪|shop/i.test(unit)||/地A\d+$|業A\d+$|地C\d/i.test(unit))return null;
    const isPublicZone=zoneName.includes('公設');
    const isStairA=/甲梯|乙梯|A棟梯廳|A梯廳/.test(unit);
    const isStairB=/丙梯|丁梯|B棟梯廳|B梯廳/.test(unit);
    const isStairCommon=/梯廳|樓梯間/.test(unit)&&!isStairA&&!isStairB;
    const isBasementFloor=/^B[1-5]F?$|^B[1-5]$|車道|機車道/.test(floor)||/車道|機車道/.test(unit);
    if(!isPublicZone&&!isStairA&&!isStairB&&!isStairCommon&&!isBasementFloor)return null;
    if(isBasementFloor)return'basement';
    if(isStairA||(isPublicZone&&/A棟|A梯/.test(zoneName)))return'pubA';
    if(isStairB||(isPublicZone&&/B棟|B梯/.test(zoneName)))return'pubB';
    if(isPublicZone)return'pubA';
    return null;
  }

  const pubAUnits=new Set(),pubBUnits=new Set(),basementUnitsSet=new Set();
  S.rows.forEach(r=>{if(!r.unit)return;const cls=classifyRow(r);if(cls==='pubA')pubAUnits.add(r.unit);else if(cls==='pubB')pubBUnits.add(r.unit);else if(cls==='basement')basementUnitsSet.add(r.unit);});

  function makeCard(u,label){
    const displayKey=label||u;
    const hu=S.handoverUnits[u]||{};
    const pct=hoUnitPct(u)||0;
    const grade=hoGrade(pct);
    const daysLeft=hu.planDate?Math.ceil((new Date(hu.planDate)-today)/86400000):null;
    const overdue=hu.planDate&&daysLeft<0&&!hu.delivered;
    const urgent=hu.planDate&&daysLeft!=null&&daysLeft>=0&&daysLeft<=3&&!hu.delivered;
    const isExp=_hovExpanded===u;
    let warnTag='';
    if(overdue)warnTag=`<span style="font-size:10px;color:#791F1F;background:#FCEBEB;border-radius:20px;padding:1px 6px">⚠ 逾期${Math.abs(daysLeft)}天</span>`;
    else if(urgent)warnTag=`<span style="font-size:10px;color:#633806;background:#FAEEDA;border-radius:20px;padding:1px 6px">⏰${daysLeft}天後</span>`;
    let expandHtml='';
    if(isExp){
      const insps=hu.inspections||[];
      const inspCols=insps.map((ins,i)=>{const isDone=!!ins.date;return`<div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:10px;color:var(--text2)">${esc(ins.label)}</span><div style="display:flex;align-items:center;gap:3px"><input type="date" value="${esc(ins.date||'')}" onchange="setHuFieldH('${esc(u)}',${i},this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);${isDone?'color:var(--green);border-color:var(--green)':''}"><button class="btn btn-sm btn-d" onclick="event.stopPropagation();delHuInspH2('${esc(u)}',${i})" style="padding:1px 4px;font-size:9px">—</button></div></div>`;}).join('');
      expandHtml=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)"><div style="display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap"><div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:10px;color:var(--text2)">預定驗收</span><input type="date" value="${esc(hu.planDate||'')}" onchange="setHuField('${esc(u)}','planDate',this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font)"></div>${inspCols}<button class="btn btn-sm" onclick="event.stopPropagation();addHuInspH2('${esc(u)}')" style="padding:2px 6px;align-self:flex-end;font-size:10px">＋</button><button class="btn btn-sm btn-g" onclick="event.stopPropagation();toggleDeliveredH('${esc(u)}')" style="align-self:flex-end;padding:2px 8px;font-size:10px">${hu.delivered?'取消':'🏠 已交屋'}</button></div></div>`;
    }
    const border=isExp?'border:2px solid var(--purple);':'border:1px solid var(--border);';
    return`<div style="background:var(--card);${border}border-radius:var(--r);padding:8px 10px;margin-bottom:4px" onclick="if(event.target.closest('input,button,select'))return;_hovExpanded=(_hovExpanded==='${esc(u)}')?null:'${esc(u)}';renderPubArea()">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:500;flex:1">${esc(displayKey)}</span>
        ${hu.delivered?`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:#EAF3DE;color:#3B6D11">✓ 已交屋</span>`:''}
        ${warnTag}
        <div style="width:60px;height:5px;background:#E7E7E7;border-radius:3px;overflow:hidden"><div style="height:5px;width:${pct}%;background:${grade.color};border-radius:3px"></div></div>
        <span style="font-size:10px;color:${grade.color};font-weight:600">${pct}%</span>
      </div>
      ${expandHtml}
    </div>`;
  }

  function sectionHdr(label,bg,color){return`<div style="font-size:11px;font-weight:600;color:${color};background:${bg};border-radius:var(--rs);padding:3px 8px;margin:8px 0 4px">${label}</div>`;}

  const paEditorOpen=window._paEditOpen||false;
  const paEditorBtn=`<button class="btn btn-sm no-print" onclick="window._paEditOpen=!window._paEditOpen;renderPubArea()" style="font-size:10px;padding:2px 8px">${paEditorOpen?'✕ 關閉':'✏️ 編輯清單'}</button>`;
  function buildPaEditor(zone){const items=(S.publicAreaList[zone]||[]);const rows=items.map((item,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px"><input value="${esc(item.label)}" style="flex:1;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font)" onchange="updPaItem('${zone}',${i},'label',this.value)"><input value="${esc(item.floor)}" style="width:48px;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font)" placeholder="樓層" onchange="updPaItem('${zone}',${i},'floor',this.value)"><button class="btn btn-sm btn-d" onclick="delPaItem('${zone}',${i})" style="padding:2px 5px;font-size:10px">✕</button></div>`).join('');return`<div style="margin-bottom:8px"><div style="font-size:10px;color:var(--text2);margin-bottom:4px">${zone==='A'?'A棟':'B棟'}公設固定清單</div>${rows}<button class="btn btn-sm" onclick="addPaItem('${zone}')" style="font-size:10px;padding:2px 8px;margin-top:2px">＋ 新增</button></div>`;}
  const paEditor=paEditorOpen?`<div style="background:var(--card);border:1.5px solid var(--purple);border-radius:var(--r);padding:10px 12px;margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:var(--purple);margin-bottom:8px">⚙️ 公設固定清單編輯</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${buildPaEditor('A')}${buildPaEditor('B')}</div></div>`:'';

  const paA=S.publicAreaList.A||[];const paB=S.publicAreaList.B||[];
  const colA=`<div>
    ${sectionHdr('🏢 A 棟公設','#EEEDFE','#3C3489')}
    ${paA.filter(x=>/^R/i.test(x.floor)).map(x=>makeCard(x.id,x.label)).join('')||''}
    ${[...pubAUnits].map(u=>makeCard(u)).join('')}
    ${!paA.length&&!pubAUnits.size?`<div style="font-size:11px;color:var(--text3);padding:8px">尚無 A 棟公設資料</div>`:''}
  </div>`;
  const colB=`<div>
    ${sectionHdr('🏢 B 棟公設','#E1F5EE','#085041')}
    ${paB.filter(x=>/^R/i.test(x.floor)).map(x=>makeCard(x.id,x.label)).join('')||''}
    ${[...pubBUnits].map(u=>makeCard(u)).join('')}
    ${!paB.length&&!pubBUnits.size?`<div style="font-size:11px;color:var(--text3);padding:8px">尚無 B 棟公設資料</div>`:''}
  </div>`;
  const basementCards=[...basementUnitsSet].map(u=>makeCard(u)).join('');

  document.getElementById('pane-pubarea').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:13px;font-weight:700">🏛 公設狀態表</span>
      ${paEditorBtn}
      <button class="btn btn-pdf btn-sm no-print" onclick="printSection('公設狀態表',document.getElementById('pane-pubarea').innerHTML)" style="margin-left:auto">🖨 PDF</button>
    </div>
    ${paEditor}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      ${colA}${colB}
    </div>
    <div>
      ${sectionHdr('🅿 地下室（B1F–B5F・車道・機車道・樓梯間）','#F1EFE8','#5F5E5A')}
      ${basementCards||`<div style="font-size:11px;color:var(--text3);padding:8px">尚無地下室資料</div>`}
    </div>`;
}


function printSummaryTablePdf(){
  // Rebuild the table data independently for PDF
  if(!S.handoverUnits)S.handoverUnits={};
  const isOwnerK=k=>k&&k.startsWith('地');
  const isBizK=k=>k&&k.startsWith('業');
  const isNormalK=k=>k&&!k.startsWith('地')&&!k.startsWith('業');
  function countU(rawData,fn){let t=0,d=0;Object.values(rawData).forEach(col=>Object.values(col).forEach(k=>{if(!k||!fn(k))return;t++;if(S.handoverUnits[k]&&S.handoverUnits[k].delivered)d++;}));return{t,d,r:t-d};}
  const shopKeys=['地A1-1','A2-1','A3-1','業A5-1','地A6-1','地A7-1','地A8-1','地A9-1','地A10-1','地A11-1','地A12-1','地A15-1','地A16-1','地A17-1','地A18-1','地A19-1','地A20-1','地A21-1','地A22-1','地A23-1','地A25-1','地A26-1','地A27-1','業A28-1','地A29-1','業A30-1','業C2-1','地C1-2'];
  function countS(fn){let t=0,d=0;shopKeys.forEach(k=>{if(!fn(k))return;t++;if(S.handoverUnits[k]&&S.handoverUnits[k].delivered)d++;});return{t,d,r:t-d};}
  const rows=[['','A棟 地主','A棟 自購','A棟 業主','B棟 地主','B棟 自購','B棟 業主','店鋪 地主','店鋪 自購','店鋪 業主','全案 地主','全案 自購','全案 業主']];
  ['總戶數','交屋完成','剩餘戶數'].forEach((label,ri)=>{
    const v=(obj)=>ri===0?obj.t:ri===1?obj.d:obj.r;
    const a=[isOwnerK,isNormalK,isBizK].map(fn=>v(countU(G95_RAW_A,fn)));
    const b=[isOwnerK,isNormalK,isBizK].map(fn=>v(countU(G95_RAW_B,fn)));
    const s=[isOwnerK,isNormalK,isBizK].map(fn=>v(countS(fn)));
    const tot=[0,1,2].map(i=>a[i]+b[i]+s[i]);
    rows.push([label,...a,...b,...s,...tot]);
  });
  const thead=`<tr>${rows[0].map((h,i)=>
    `<th style="padding:5px 6px;text-align:center;border:1px solid #ccc;font-size:10px;font-weight:600;background:#E9E9E9;${i>=10?'color:#3C3489':''}">${h}</th>`).join('')}</tr>`;
  const tbodyRows=rows.slice(1).map((row,ri)=>{
    const color=ri===1?'color:#2E6B26':ri===2?'color:#A32D2D':'';
    return`<tr style="${color}">${row.map((v,ci)=>`<td style="padding:5px 6px;text-align:${ci===0?'left':'center'};border:1px solid #ccc;font-size:11px;${ci>=10?'font-weight:600;color:inherit':''}">${v}</td>`).join('')}</tr>`;
  }).join('');
  printSection('交屋狀態統計表',`<table style="width:100%;border-collapse:collapse"><thead>${thead}</thead><tbody>${tbodyRows}</tbody></table>`);
}


// ══════════════════════════════════════════════════════════════════════════
//  CLIENT LIST  ── 客戶清單
// ══════════════════════════════════════════════════════════════════════════
// ── 客戶清單：暫存編輯緩衝區（確認前不寫入 S.clientData）────────────────
let _clientExpanded=null;
let _clEditBuf={};        // {key: {name,tel,type,note,parkings}}
let _clSelected=new Set(); // 多選 keys

function renderClients(){
  if(!S.clientData)S.clientData={};
  // 記錄目前焦點與游標位置，避免重繪後輸入框失焦造成無法連續輸入
  const _activeEl=document.activeElement;
  const _activeId=_activeEl&&_activeEl.id;
  const _selStart=(_activeId==='cl-search')?_activeEl.selectionStart:null;
  const _selEnd=(_activeId==='cl-search')?_activeEl.selectionEnd:null;
  // ── 頂部統計卡片：以 S.clientData[key].type 為準，未設定才用 key 前綴推斷 ──
  function getUnitType(k){
    const cd=S.clientData&&S.clientData[k];
    if(cd&&cd.type)return cd.type;
    if(k&&k.startsWith('地'))return'地主戶';
    if(k&&k.startsWith('業'))return'業主戶';
    return'自購戶';
  }
  function countBlockByType(rawData,typeName){
    return Object.values(rawData).reduce((s,col)=>s+Object.values(col).filter(k=>k&&getUnitType(k)===typeName).length,0);
  }
  const shopKeys=['地A1-1','A2-1','A3-1','業A5-1','地A6-1','地A7-1','地A8-1','地A9-1','地A10-1','地A11-1','地A12-1','地A15-1','地A16-1','地A17-1','地A18-1','地A19-1','地A20-1','地A21-1','地A22-1','地A23-1','地A25-1','地A26-1','地A27-1','業A28-1','地A29-1','業A30-1','業C2-1','地C1-2'];
  const cntAOwner=countBlockByType(G95_RAW_A,'地主戶'),cntABiz=countBlockByType(G95_RAW_A,'業主戶'),cntANorm=countBlockByType(G95_RAW_A,'自購戶');
  const cntBOwner=countBlockByType(G95_RAW_B,'地主戶'),cntBBiz=countBlockByType(G95_RAW_B,'業主戶'),cntBNorm=countBlockByType(G95_RAW_B,'自購戶');
  const cntShopOwner=shopKeys.filter(k=>getUnitType(k)==='地主戶').length;
  const cntShopBiz=shopKeys.filter(k=>getUnitType(k)==='業主戶').length;
  const cntShopNorm=shopKeys.filter(k=>getUnitType(k)==='自購戶').length;
  const totalA=cntAOwner+cntANorm+cntABiz,totalB=cntBOwner+cntBNorm+cntBBiz,totalShop=cntShopOwner+cntShopNorm+cntShopBiz;
  const total=totalA+totalB+totalShop;
  const statCard=(label,bg,color,detail)=>`<div style="background:${bg};border-radius:var(--r);padding:8px 12px;flex:1;min-width:140px"><div style="font-size:11px;font-weight:600;color:${color};margin-bottom:4px">${label}</div><div style="font-size:18px;font-weight:700;color:${color}">${detail.total}</div><div style="font-size:10px;color:${color};opacity:.75;margin-top:2px">A棟 ${detail.a} ／ B棟 ${detail.b} ／ 店鋪 ${detail.s}</div></div>`;
  const statsBar=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <div style="background:var(--surface);border-radius:var(--r);padding:8px 12px;flex:1;min-width:100px;text-align:center"><div style="font-size:11px;color:var(--text2)">總戶數</div><div style="font-size:22px;font-weight:700;color:var(--text)">${total}</div><div style="font-size:10px;color:var(--text3)">A棟 ${totalA} ／ B棟 ${totalB} ／ 店鋪 ${totalShop}</div></div>
    ${statCard('🏛 地主戶','#EEEDFE','#3C3489',{total:cntAOwner+cntBOwner+cntShopOwner,a:cntAOwner,b:cntBOwner,s:cntShopOwner})}
    ${statCard('🏠 自購戶','var(--surface)','var(--text2)',{total:cntANorm+cntBNorm+cntShopNorm,a:cntANorm,b:cntBNorm,s:cntShopNorm})}
    ${statCard('🏢 業主戶','#E1F5EE','#085041',{total:cntABiz+cntBBiz+cntShopBiz,a:cntABiz,b:cntBBiz,s:cntShopBiz})}
  </div>`;

  const search=((document.getElementById('cl-search')||{}).value||'').trim().toLowerCase();
  const fType=(document.getElementById('cl-type')||{}).value||'';
  const fBlock=(document.getElementById('cl-block')||{}).value||'';

  // 批次操作列
  const batchBar=_clSelected.size>0?`<div style="background:#EEEDFE;border:1px solid #AFA9EC;border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#3C3489;flex-wrap:wrap">
    <strong>已選 ${_clSelected.size} 戶</strong>
    <button class="btn btn-p btn-sm" onclick="showBatchClientEdit()">✏️ 批次修改</button>
    <button class="btn btn-sm" onclick="_clSelected.clear();renderClients()">✕ 取消</button>
  </div>`:'';

  // 格子建構（含就地展開）
  function makeCell(key){
    if(!key)return`<span style="background:transparent;display:block;padding:3px 2px"></span>`;
    const cl=S.clientData[key]||{};
    const nameMatch=search&&cl.name&&cl.name.toLowerCase().includes(search);
    const keyMatch=search&&key.toLowerCase().includes(search);
    const parkMatch=search&&(cl.parkings||[]).some(p=>p.toLowerCase().includes(search));
    const hidden=search&&!nameMatch&&!keyMatch&&!parkMatch;
    if(hidden)return`<span style="background:transparent;display:block;padding:3px 2px"></span>`;
    const typeMatch=fType&&(getUnitType(key))!==fType;
    if(typeMatch)return`<span style="background:transparent;display:block;padding:3px 2px"></span>`;
    const blockId=key.match(/^(地|業)?([AB])/)?.[2];
    const blockMatch=fBlock&&blockId!==fBlock;
    if(blockMatch)return`<span style="background:transparent;display:block;padding:3px 2px"></span>`;
    const isExp=_clientExpanded===key;
    const isSel=_clSelected.has(key);
    const pct=hoUnitPct(key)||hoUnitPct(unitDisplayName(key));
    const pctBar=pct!=null?`<div style="margin-top:2px;height:3px;background:rgba(0,0,0,.1);border-radius:2px"><div style="height:3px;width:${pct}%;background:${pct===100?'#3B6D11':pct>=80?'#EF9F27':'#A32D2D'};border-radius:2px"></div></div>`:'';
    const selRing=isSel?'outline:2px solid #185FA5;':'';
    const expRing=isExp?'outline:2.5px solid var(--purple);':'';
    const allPark=[...new Set([...(G95_PARKING[key]||[]),...(cl.parkings||[])])];
    const parkLabel=`<div style="font-size:8px;color:#0C447C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.8;min-height:11px;display:flex;align-items:center;gap:2px">${allPark.length?`🚗 ${esc(allPark[0])}`+(allPark.length>1?` <span onclick="event.stopPropagation();showParkList('${esc(key)}')" style="font-size:7px;cursor:pointer">▼</span>`:''):''}</div>`;
    return`<span onclick="clientCellClick('${esc(key)}',event)" title="${esc(key)}${cl.name?' - '+esc(cl.name):''}${allPark.length?' - 🚗'+esc(allPark.join('、')):''}" style="display:block;padding:5px 3px;border-radius:4px;cursor:pointer;border:0.5px solid transparent;${cellBg(key)};${selRing||expRing}font-size:11px;text-align:center;line-height:1.3;position:relative">
      ${isSel?`<span style="position:absolute;top:0;left:0;font-size:8px;color:#185FA5">✓</span>`:''}
      <div style="font-size:11px;font-weight:500">${unitDisplayName(key)}${((S.handoverUnits[key]||{}).inspTypes||[]).includes('委外代驗')?'<span style="color:#D4A900;font-size:10px"> ★</span>':''}${_cleanDots(key,_cellAccent(key))}</div>
      ${inspIconBadges(key)}
      ${cl.name?`<div style="font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.75">${esc(cl.name)}</div>`:''}
      ${parkLabel}
      ${pctBar}
    </span>`;
  }

  function buildClientCol(rawData,cols,title){
    const header=`<div style="font-size:12px;font-weight:600;color:var(--text2);padding:5px 8px;background:var(--surface);border-radius:var(--rs);margin-bottom:5px">${title}</div>`;
    const rows=G95_FLOORS.map(fl=>{
      // 若此行有展開的格子，在行下方插入展開卡片
      const cells=cols.map(col=>{
        const raw=rawData[col];
        return makeCell(raw?raw[fl]:null);
      });
      const expandKey=cols.map(col=>{const raw=rawData[col];return raw?raw[fl]:null;}).find(k=>k&&_clientExpanded===k);
      const expandDiv=expandKey?`<div style="display:grid;grid-column:1/-1"><div id="cl-detail-${esc(expandKey)}">${buildClientDetailInline(expandKey)}</div></div>`:'';
      return`<div style="display:grid;grid-template-columns:26px repeat(${cols.length},1fr);gap:2px;align-items:start;margin-bottom:2px">
        <span style="font-size:10px;color:var(--text3);text-align:right;padding-right:3px;padding-top:6px">${fl}</span>${cells.join('')}
      </div>${expandDiv}`;
    }).join('');
    return`<div style="flex:1;min-width:0">${header}<div style="display:grid;grid-template-columns:26px repeat(${cols.length},1fr);gap:2px;margin-bottom:4px"><span></span>${cols.map(c=>`<span style="font-size:11px;text-align:center;color:var(--text2);font-weight:500">${c}</span>`).join('')}</div>${rows}</div>`;
  }

  document.getElementById('pane-clients').innerHTML=`
    ${statsBar}
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <input id="cl-search" type="text" placeholder="搜尋戶別 / 姓名 / 車位…" value="${esc(search)}" onkeydown="if(event.key==='Enter')renderClients()" style="font-size:12px;padding:5px 9px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);width:200px">
      <button class="btn btn-sm" onclick="renderClients()">確認</button>
      <select id="cl-type" onchange="renderClients()" style="font-size:12px;padding:5px 9px;border:1px solid var(--pborder);border-radius:var(--rs);background:var(--card);color:var(--text);font-family:var(--font)">
        <option value="">全部類型</option><option value="地主戶">地主戶</option><option value="業主戶">業主戶</option><option value="自購戶">自購戶</option>
      </select>
      <select id="cl-block" onchange="renderClients()" style="font-size:12px;padding:5px 9px;border:1px solid var(--pborder);border-radius:var(--rs);background:var(--card);color:var(--text);font-family:var(--font)">
        <option value="">全部棟別</option><option value="A">A棟</option><option value="B">B棟</option>
      </select>
      <button class="btn btn-sm no-print" onclick="document.getElementById('cl-import-inp').click()" style="background:#E8E0F8;color:#3C3489;border-color:#C4B8F0">📂 匯入 Excel</button>
      <input type="file" id="cl-import-inp" accept=".xlsx,.xls,.csv" style="display:none" onchange="importClientExcel(this.files[0]);this.value=''">
      <button class="btn btn-sm no-print" onclick="downloadClientTemplate()" style="background:#E8F0FE;color:#185FA5;border-color:#B5D4F4">⬇ 範本</button>
      <div style="display:flex;gap:5px;font-size:11px;flex-wrap:wrap;margin-left:4px">
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#EEEDFE;border:0.5px solid #AFA9EC;display:inline-block"></span>地主戶</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#E1F5EE;border:0.5px solid #9FE1CB;display:inline-block"></span>業主戶</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--surface);display:inline-block"></span>自購戶</span>
      </div>
      <button class="btn btn-pdf btn-sm no-print" onclick="printClients()" style="margin-left:auto">🖨 PDF</button>
    </div>
    ${batchBar}
    <div style="display:flex;gap:10px">
      ${buildClientCol(G95_RAW_A,G95_A_COLS,'A 棟')}
      ${buildClientCol(G95_RAW_B,G95_B_COLS,'B 棟')}
    </div>
    ${buildClientShop()}`;
  setTimeout(()=>{
    const s=document.getElementById('cl-search');
    if(s){
      s.value=search;
      if(_activeId==='cl-search'){
        s.focus();
        if(_selStart!=null)s.setSelectionRange(_selStart,_selEnd);
      }
    }
    const t=document.getElementById('cl-type');if(t)t.value=fType;
    const b=document.getElementById('cl-block');if(b)b.value=fBlock;
  },0);
}

// ── 顯示某戶的全部車位（卡片僅顯示第一筆） ────────────────────────────
function showParkList(key){
  const cl=S.clientData[key]||{};
  const allPark=[...new Set([...(G95_PARKING[key]||[]),...(cl.parkings||[])])];
  alert(unitDisplayName(key)+' 車位：\n'+allPark.join('\n'));
}

// ── 同姓名戶別：跳轉到指定戶別的展開卡片 ──────────────────────────────
function jumpToClient(key){
  _clSelected.clear();
  _clientExpanded=key;
  const cl=S.clientData[key]||{};
  _clEditBuf[key]={
    name:cl.name||'',tel:cl.tel||'',
    type:cl.type||(isOwnerUnit(key)?'地主戶':isBizUnit(key)?'業主戶':'自購戶'),
    note:cl.note||'',parkings:[...(cl.parkings||[])]
  };
  renderClients();
  requestAnimationFrame(()=>{
    const el=document.getElementById('cl-detail-'+key);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

// ── 格子點擊：長按或 Ctrl 多選，單擊展開 ──────────────────────────────
function clientCellClick(key,e){
  if(e.ctrlKey||e.metaKey||e.shiftKey||_clSelected.size>0){
    // 多選模式
    _clSelected.has(key)?_clSelected.delete(key):_clSelected.add(key);
    renderClients();return;
  }
  // 單選展開
  _clientExpanded=(_clientExpanded===key)?null:key;
  if(_clientExpanded){
    // 初始化編輯緩衝區
    const cl=S.clientData[key]||{};
    _clEditBuf[key]={
      name:cl.name||'',tel:cl.tel||'',
      type:cl.type||(isOwnerUnit(key)?'地主戶':isBizUnit(key)?'業主戶':'自購戶'),
      note:cl.note||'',parkings:[...(cl.parkings||[])]
    };
  }
  renderClients();
  // 滾動到展開位置（不跳回頂部）
  requestAnimationFrame(()=>{
    const el=document.getElementById('cl-detail-'+key);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

// ── 就地展開的編輯卡片（使用緩衝區，不即時寫入）─────────────────────
function buildClientDetailInline(key){
  const buf=_clEditBuf[key]||{};
  const cl=S.clientData[key]||{};
  const hu=S.handoverUnits&&S.handoverUnits[key]||{};
  const name=buf.name!=null?buf.name:(cl.name||'');
  const tel=buf.tel!=null?buf.tel:(cl.tel||'');
  const type=buf.type||cl.type||(isOwnerUnit(key)?'地主戶':isBizUnit(key)?'業主戶':'自購戶');
  const note=buf.note!=null?buf.note:(cl.note||'');
  const staticPark=G95_PARKING[key]||[];
  const savedPark=cl.parkings||[];
  const allPark=[...new Set([...staticPark,...savedPark])];
  const parkChips=allPark.map(p=>{
    const chk=hu.parkChecked&&hu.parkChecked[p];
    return`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#E6F1FB;color:#0C447C;border-radius:20px;font-size:11px">🚗 ${esc(p)} <input type="checkbox" title="已驗收" ${chk?'checked':''} onchange="setHuParkCheck('${esc(key)}','${esc(p)}',this.checked)" style="accent-color:var(--green);cursor:pointer"></span>`;
  }).join('');
  const pct=hoUnitPct(key)||hoUnitPct(unitDisplayName(key));
  const grade=hoGrade(pct);
  // 即時欄位：驗屋方式（inspTypes）
  const itSelf=(hu.inspTypes||[]).includes('自驗');
  const itOut=(hu.inspTypes||[]).includes('委外代驗');
  // 即時欄位：預定驗收 / 時段 / 已交屋
  const planDate=hu.planDate||'';
  const slot=hu.slot||'';
  const delivered=!!hu.delivered;
  const delBtn = window._VIEW_ONLY ? '' : '<button class="btn btn-sm" onclick="clientDelUnit(\''+esc(key)+'\')" style="background:#F8E3E3;color:#A32D2D;border-color:#E5B5B5;margin-left:auto">🗑 刪除此戶</button>';
  return`<div data-cl-key="${esc(key)}" style="background:#F7F5FF;border:2px solid var(--purple);border-radius:var(--r);padding:12px 14px;margin:4px 0 6px;animation:tIn .15s ease">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">${esc(key)}</span>
      <span id="cl-type-badge-${key}" style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:${type==='地主戶'?'#EEEDFE':type==='業主戶'?'#E1F5EE':'var(--surface)'};color:${type==='地主戶'?'#3C3489':type==='業主戶'?'#085041':'var(--text2)'}">${type==='地主戶'?'🏛 地主戶':type==='業主戶'?'🏢 業主':'🏠 自購'}</span>
      ${pct!=null?`<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:${grade.bg};color:${grade.color}">${pct}% ${grade.label}</span>`:''}
      ${delivered?'<span style="padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:#EAF3DE;color:#3B6D11">🏠 已交屋</span>':''}
      <button class="btn btn-sm" onclick="_clientExpanded=null;renderClients()">✕ 關閉</button>
      <button class="btn btn-p btn-sm" onclick="confirmClientEdit('${key}')">✓ 確認儲存</button>
      ${delBtn}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      <div><span style="font-size:10px;color:var(--text2)">客戶姓名</span><br>
        <input class="cl-inp-name" value="${esc(name)}" placeholder="姓名" oninput="setCl('${esc(key)}','name',this.value)" style="width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);margin-top:3px">
        ${(()=>{
          const sameKeys=(cl.name||'')?Object.keys(S.clientData).filter(k=>k!==key&&(S.clientData[k].name||'')===cl.name):[];
          if(!sameKeys.length)return'';
          const groups={};
          sameKeys.forEach(k=>{const b=k.match(/^(地|業)?([AB])/)?.[2]||'其他';(groups[b]=groups[b]||[]).push(k);});
          const order=['A','B','其他'];
          const blocks=order.filter(b=>groups[b]&&groups[b].length).map(b=>{
            const chips=groups[b].map(k=>`<span onclick="event.stopPropagation();jumpToClient('${esc(k)}')" style="padding:2px 8px;background:#EEF2FF;color:#3C3489;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid #C7D2FE;text-align:center;white-space:nowrap">${esc(unitDisplayName(k))}</span>`).join('');
            return`<div style="margin-top:4px"><span style="font-size:9px;color:var(--text3)">${b==='其他'?'其他':b+'棟'}</span><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:3px">${chips}</div></div>`;
          }).join('');
          return`<div style="margin-top:4px"><span style="font-size:9px;color:var(--text3)">同姓名其他戶別：</span>${blocks}</div>`;
        })()}
      </div>
      <div><span style="font-size:10px;color:var(--text2)">聯絡電話</span><br>
        <input class="cl-inp-tel" value="${esc(tel)}" placeholder="電話" oninput="setCl('${esc(key)}','tel',this.value)" style="width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);margin-top:3px"></div>
      <div><span style="font-size:10px;color:var(--text2)">戶別類型</span><br>
        <select class="cl-inp-type" onchange="setCl('${esc(key)}','type',this.value);clUpdateTypeBadge('${key}',this.value)" style="width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);margin-top:3px">
          <option value="地主戶" ${type==='地主戶'?'selected':''}>地主戶</option>
          <option value="業主戶" ${type==='業主戶'?'selected':''}>業主戶</option>
          <option value="自購戶" ${type==='自購戶'?'selected':''}>自購戶</option>
        </select></div>
    </div>
    <div style="margin-bottom:10px">
      <span style="font-size:10px;color:var(--text2)">持有車位（✓ = 已驗收）</span>

// ── 客戶清單 Excel 匯入 ──────────────────────────────────────────────────
function importClientExcel(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      // 自動選最相關的分頁
      const wsName=wb.SheetNames.find(n=>n.includes('客戶')||n.includes('名單')||n.includes('住戶'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('Excel 無有效資料','⚠️');return;}
      if(!S.clientData)S.clientData={};
      const CMAP={
        '戶別':'unit','戶號':'unit','房號':'unit',
        '姓名':'name','客戶姓名':'name','住戶姓名':'name','屋主':'name',
        '電話':'tel','聯絡電話':'tel','手機':'tel','電話號碼':'tel',
        '類型':'type','戶別類型':'type','身份':'type',
        '車位':'parking','車位編號':'parking','停車位':'parking',
        '備註':'note','注意事項':'note','說明':'note',
      };
      // 建立 G95 戶別反查表：將不帶前綴的戶別名對應到完整 key（含地/業前綴）
      const _g95Lookup={};
      [G95_RAW_A,G95_RAW_B].forEach(raw2=>{
        Object.values(raw2).forEach(col=>{
          Object.values(col).forEach(k=>{
            if(!k)return;
            _g95Lookup[k]=k; // 完整 key 對應自己
            const stripped=k.replace(/^(地|業)/,'');
            if(stripped!==k)_g95Lookup[stripped]=k; // 去前綴版對應完整 key
          });
        });
      });
      let added=0,updated=0;
      raw.forEach(row=>{
        const m={};
        Object.entries(row).forEach(([k,v])=>{
          const fk=CMAP[k.trim()];if(!fk)return;
          m[fk]=String(v||'').trim();
        });
        if(!m.unit)return;
        // 匹配 unitKey：先直接比對，再透過 G95 反查表補上地/業前綴
        const key=_g95Lookup[m.unit]||m.unit;
        const existed=!!S.clientData[key];
        if(!S.clientData[key])S.clientData[key]={name:'',tel:'',type:'自購戶',parkings:[],note:''};
        if(m.name)S.clientData[key].name=m.name;
        if(m.tel)S.clientData[key].tel=m.tel;
        if(m.type)S.clientData[key].type=m.type;
        if(m.note)S.clientData[key].note=m.note;
        if(m.parking){
          const parks=m.parking.split(/[,，、\s]+/).map(p=>p.trim()).filter(Boolean);
          if(!S.clientData[key].parkings)S.clientData[key].parkings=[];
          parks.forEach(p=>{if(!S.clientData[key].parkings.includes(p))S.clientData[key].parkings.push(p);});
        }
        existed?updated++:added++;
      });
      logChange('📂 客戶清單匯入',`檔案：${file.name}，新增 ${added} 筆，更新 ${updated} 筆`);
      save();renderClients();
      toast(`客戶清單匯入完成：新增 ${added} 筆，更新 ${updated} 筆`,'✅');
    }catch(ex){toast('匯入失敗：'+ex.message,'❌');}
  };
  rd.readAsArrayBuffer(file);
}
function downloadClientTemplate(){
  // 先嘗試 XLSX，失敗則 fallback 到 CSV
  try{
    if(typeof XLSX==='undefined'||!XLSX.utils)throw new Error('XLSX 未載入');
    const ws=XLSX.utils.aoa_to_sheet([
      ['戶別','姓名','電話','類型','車位','備註'],
      ['地A1-27','張○○','0912-000-001','地主戶','B2-333、B2-334','備注1'],
      ['A3-18','李○○','0912-000-002','自購戶','',''],
      ['業A5-1','王○○','0912-000-003','業主戶','B1-100','店鋪業主'],
    ]);
    ws['!cols']=[{wch:14},{wch:10},{wch:16},{wch:10},{wch:24},{wch:20}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'客戶清單',ws);
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='客戶清單匯入範本.xlsx';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
    toast('範本已下載（xlsx）','⬇');
  }catch(ex){
    // Fallback：改用 CSV 下載
    try{
      const rows=[
        '戶別,姓名,電話,類型,車位,備註',
        '地A1-27,張○○,0912-000-001,地主戶,B2-333,備注1',
        'A3-18,李○○,0912-000-002,自購戶,,',
        '業A5-1,王○○,0912-000-003,業主戶,B1-100,店鋪業主',
      ].join('\n');
      const bom='\uFEFF'; // UTF-8 BOM 讓 Excel 正確顯示中文
      const blob=new Blob([bom+rows],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='客戶清單匯入範本.csv';
      document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
      toast('範本已下載（csv）','⬇');
    }catch(ex2){toast('下載失敗，請檢查瀏覽器設定','❌');}
  }
}

function renderChangelog(){
  const log=S.changelog||[];
  const fmtTs=iso=>{
    if(!iso)return'—';
    const d=new Date(iso);
    const pad=n=>String(n).padStart(2,'0');
    return`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  };
  const typeColor={
    '➕ 新增項目':'var(--green)','🗑 刪除項目':'var(--red)','🗑 批次刪除':'var(--red)',
    '📂 Excel 匯入':'var(--purple)','📄 PDF 匯入':'var(--purple)',
    '📂 提示事項匯入':'#0F6E56','✏️ 欄位更新':'var(--text2)',
    '🔢 重新編號':'var(--blue)','✅ 移至完成':'var(--green)'
  };
  const rows=log.map((c,i)=>{
    const col=typeColor[c.type]||'var(--text2)';
    const hasUnits=Array.isArray(c.units)&&c.units.length>0;
    const hasChanges=Array.isArray(c.changes)&&c.changes.length>0;
    const hasDetail=hasUnits||hasChanges||c.oldValue;
    const arrow=hasDetail?`<span class="no-print" style="cursor:pointer;display:inline-block;width:14px;color:var(--text2)" onclick="toggleChangelogDetail(${i})" id="cl-arrow-${i}">▸</span>`:`<span style="display:inline-block;width:14px"></span>`;
    let detailContent='';
    if(c.oldValue!==undefined){detailContent+=`<div style="margin-bottom:4px"><span style="background:#FEE2E2;color:#991B1B;padding:1px 5px;border-radius:3px;font-size:10px">修改前</span> ${esc(String(c.oldValue))} → <span style="background:#DCFCE7;color:#166534;padding:1px 5px;border-radius:3px;font-size:10px">修改後</span> ${esc(String(c.newValue||''))}</div>`;}
    if(hasChanges){const shown=c.changes.slice(0,20);detailContent+=`<div>影響項目：${shown.map(esc).join('、')}${c.changes.length>20?`…等共 ${c.changes.length} 筆`:''}</div>`;}
    if(hasUnits){detailContent+=`<div>明細：${c.units.map(esc).join('、')}</div>`;}
    const detailRow=hasDetail?`<tr id="cl-d-${i}" style="display:none"><td></td><td colspan="3" style="font-size:11px;color:var(--text2);background:var(--bg2,rgba(0,0,0,.03));padding:6px 10px">${detailContent}</td></tr>`:'';

function confirmClearChangelog(){

// ── 🧹 清潔追蹤（V0701-20）：單週網格，日期×時段排戶卡，對照清潔狀態，方便提前派清潔 ──
let _cleanOnlyPending=false;
let _cleanWeekOffset=0;
function _cleanTrackStatus(key){
  var n=_cleanCount(key),cd=_cleanDates(key),cp=_cleanPlanned(key);
  var done=[],wait=[],anyPlan=false;
  for(var i=1;i<=n;i++){ if(cp[i])anyPlan=true; if(cd[i])done.push(i); else if(cp[i])wait.push(i); }
  var state=(!anyPlan&&done.length===0)?'need':(wait.length>0?'wait':'done');
  return {state:state,done:done,wait:wait};
}
function cleanTrackToggle(v){_cleanOnlyPending=!!v;renderCleanTrack();}
function cleanWeekNav(delta){_cleanWeekOffset=(delta===0)?0:(_cleanWeekOffset+delta);renderCleanTrack();}
function _cleanTrackPrint(){var el=document.getElementById('cleantrack-cap');if(!el)return;printSection('清潔追蹤',el.innerHTML,'清潔追蹤_'+todayISO());}
function _cleanIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// ── 清潔日批次修正（安全版：查某日→逐戶勾選→整批 +1 天 或 指定日期；有復原）──
function _datePlus1(iso){var p=String(iso).split('-');if(p.length!==3)return iso;var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+1);return _isoL(d);}
function toggleCleanFix(k){if(!window._cleanFixUnsel)window._cleanFixUnsel=new Set();if(window._cleanFixUnsel.has(k))window._cleanFixUnsel.delete(k);else window._cleanFixUnsel.add(k);renderCleanTrack();}
function cleanFixSelAll(all){window._cleanFixUnsel=all?new Set():new Set(window._cleanFixHits||[]);renderCleanTrack();}
function applyCleanFix(mode){
  var qd=window._cleanQueryDate||'';if(!qd)return;
  var hu=S.handoverUnits||{};var unsel=window._cleanFixUnsel||new Set();
  var targets=[];
  Object.keys(hu).forEach(function(k){if(unsel.has(k))return;var cd=(hu[k]&&hu[k].cleanDates)||{};for(var t=1;t<=4;t++){if(cd[t]===qd)targets.push({k:k,t:t});}});
  if(!targets.length){toast('沒有勾選到可修正的戶別','⚠️');return;}
  var nd='';
  if(mode==='clear'){
    if(!confirm('清除 '+targets.length+' 筆「'+qd+'」的清潔日（該次改回「未清」）？\n（可按「↩ 復原上一次」還原）'))return;
  }else{
    nd=(mode==='set')?((document.getElementById('clean-fix-date')||{}).value||''):_datePlus1(qd);
    if(!nd){toast('請先選「指定日期」','⚠️');return;}
    if(nd===qd){toast('目標日期與原日期相同','⚠️');return;}
    if(!confirm('把 '+targets.length+' 筆「'+qd+'」的清潔日改成「'+nd+'」？\n（可按「↩ 復原上一次」還原）'))return;
  }
  try{window._cleanFixUndo=JSON.parse(JSON.stringify(S.handoverUnits||{}));}catch(e){window._cleanFixUndo=null;}
  targets.forEach(function(o){var cd=S.handoverUnits[o.k]&&S.handoverUnits[o.k].cleanDates;if(!cd)return;if(mode==='clear')cd[o.t]='';else cd[o.t]=nd;});
  save();toast(mode==='clear'?('已清除 '+targets.length+' 筆清潔日'):('已修正 '+targets.length+' 筆清潔日 → '+nd),mode==='clear'?'🗑':'✅');renderCleanTrack();
}
function undoCleanFix(){if(!window._cleanFixUndo){toast('沒有可復原的批次','⚠️');return;}S.handoverUnits=window._cleanFixUndo;window._cleanFixUndo=null;save();toast('已復原上一次清潔日修正','↩');renderCleanTrack();}
function renderCleanTrack(){

  var days=[];for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);if(_cleanIso(dd)>=todayStr)days.push(dd);}  // 今天之前(已發生)不顯示

  function unitsFor(ds,slot){var out=[];Object.keys(hu).forEach(function(k){var h=hu[k];if(!h||h.cleanPlanDate!==ds||h.cancelled||h.noShow)return;var m=(slot==='__none__')?(HCAL_SLOTS.indexOf(h.cleanSlot||'')<0):(h.cleanSlot===slot);if(m)out.push(k);});out.sort(function(a,b){return String(a).localeCompare(String(b),'zh-TW',{numeric:true});});return out;}
  var _hasNone=days.some(function(dd){return unitsFor(_cleanIso(dd),'__none__').length>0;});

  var dhdr=days.map(function(dd){

  var body=slotList.map(function(slot){

      }).join('');
      return '<td style="border:1px solid var(--border);padding:3px;vertical-align:top;'+(isToday?'border-left:2px dashed var(--purple);':'')+(isPast?'background:#EFEDE9;':'')+'">'+(cards||'<span style="color:var(--text3);font-size:11px">—</span>')+'</td>';
    }).join('');
    return '<tr><td style="border:1px solid var(--border);padding:4px 3px;text-align:center;font-size:11px;color:var(--text2);background:var(--surface);white-space:nowrap">'+(slot==='__none__'?'未分時段':esc(slot))+'</td>'+tds+'</tr>';
  }).join('');
  var wtag=days.length?((days[0].getMonth()+1)+'/'+days[0].getDate()+'–'+(days[days.length-1].getMonth()+1)+'/'+days[days.length-1].getDate()):'—';
  // ── 查某日「已清潔」的戶別（掃全部戶別的 cleanDates，不受本週視窗限制）──

          +'<button class="btn btn-sm btn-d" onclick="applyCleanFix(\'clear\')" style="font-size:12px">🗑 清除日期（改回未清）</button>'
          +'<button class="btn btn-sm" onclick="undoCleanFix()" style="font-size:12px;color:var(--text2)">↩ 復原上一次</button>'
        +'</div>'
      ):'<span style="font-size:12px;color:var(--text3)">這一天沒有標記為「已清潔」的戶別。</span>')

function renderTabBar(){
  let cells;
  if(_tabEditMode){
    // 保留使用者排的版面（含中間空格）；空格＝可放分頁的落點，關閉後版面照舊不會跑掉
    if(!_editSlots)_editSlots=(S.tabOrder||[]).map(id=>(id&&TAB_DEFS[id])?id:null);
    while(_editSlots.length&&_editSlots[_editSlots.length-1]==null)_editSlots.pop(); // 去尾端空格，稍後量欄數補一整列
    cells=_editSlots;
  }else{
    cells=(S.tabOrder||[]).map(id=>(id&&TAB_DEFS[id])?id:null);  // 正常模式也保留中間空格（隱形佔位）＝維持排好的版面
    while(cells.length&&cells[cells.length-1]==null)cells.pop();
  }
  const grip=_tabEditMode?'<span class="tab-grip">⠿</span>':'';
  const penHTML=_tabEditMode?(id)=>' <span onclick="event.stopPropagation();renameTab(\''+id+'\')" title="改看板名稱" style="margin-left:6px;cursor:pointer;opacity:.55;font-size:11px">✏️</span>':()=>'';
  const makeTab=id=>`<button class="tab${id===activeTab?' active':''}" data-id="${id}"
    draggable="${_tabEditMode?'true':'false'}"
    ondragstart="tabDragStart(event,'${id}')"
    ondragover="tabDragOver(event,'${id}')"
    ondrop="tabDrop(event,'${id}')"
    ondragleave="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('tab-drag-over'))"
    onclick="switchTab('${id}')">${grip}${tabLabel(id)}${penHTML(id)}</button>`;
  const makeFiller=i=>`<div class="tab-filler" ondragover="tabDragOver(event,${-1-i})" ondrop="tabDrop(event,${-1-i})"></div>`;
  const buildHtml=()=>cells.map((id,i)=>(id&&TAB_DEFS[id])?makeTab(id):makeFiller(i)).join('');
  document.getElementById('tab-bar').innerHTML=`<div class="tab-grid">${buildHtml()}</div>`;
  if(_tabEditMode){
    // 量測實際欄數，把空位補到「湊滿目前這一列 ＋ 再加一整列」，讓最後一定有完整一排空格可放分頁
    try{
      const grid=document.querySelector('#tab-bar .tab-grid');
      const cols=(grid?getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length:0)||8;
      const need=Math.ceil((_editSlots.length+1)/cols)*cols+cols;
      if(_editSlots.length<need){
        while(_editSlots.length<need)_editSlots.push(null);  // cells===_editSlots，push 後 buildHtml 立即反映
        document.getElementById('tab-bar').innerHTML=`<div class="tab-grid">${buildHtml()}</div>`;
      }
    }catch(e){}
  }
  const wrap=document.getElementById('tab-bar-wrap');
  const btn=document.getElementById('tab-edit-btn');
  const cancelBtn=document.getElementById('tab-cancel-btn');
  if(wrap)wrap.classList.toggle('edit-mode',_tabEditMode);
  if(btn){
    btn.classList.toggle('active',_tabEditMode);
    btn.innerHTML=_tabEditMode?'🔒 完成排序':'🔓 編輯排序';
  }
  if(cancelBtn)cancelBtn.style.display=_tabEditMode?'':'none';
  try{var _at=document.getElementById('app-title');if(_at&&S.appTitle)_at.textContent=S.appTitle;}catch(e){}
}

    const arr=_editSlots.slice();
    while(arr.length&&arr[arr.length-1]==null)arr.pop();

// ── 垃圾桶 ──────────────────────────────────────────────────────────
function cleanTrash(){
  if(!S.trash||!S.trash.length)return;
  const cutoff=Date.now()-30*24*60*60*1000;
  const before=S.trash.length;
  S.trash=S.trash.filter(r=>{
    const t=r._deletedAt?new Date(r._deletedAt).getTime():0;
    return t>cutoff;
  });
  if(S.trash.length<before)save();
}
function restoreTrashItem(i){
  if(!S.trash||!S.trash[i])return;
  const r=S.trash.splice(i,1)[0];
  const wasCompleted=r._fromCompleted;
  delete r._deletedAt;delete r._fromCompleted;
  if(wasCompleted){
    if(!S.completed)S.completed=[];
    S.completed.push(r);
    toast(`已還原至「已完成工作」：${r.unit||''} ${r.issue||''}`,'↩️');
  } else {
    S.rows.push(r);
    toast(`已還原至追蹤總表：${r.unit||''} ${r.issue||''}`,'↩️');
  }
  logChange('↩️ 從垃圾桶還原',`${r.unit||''} ${r.issue||''}`);
  save();renderAll();
}
function permDeleteTrash(i){
  if(!confirm('確定永久刪除？此操作無法復原。'))return;
  const r=S.trash.splice(i,1)[0];
  logChange('🗑 永久刪除',`${r.unit||''} ${r.issue||''}`);
  save();renderTrash();toast('已永久刪除','🗑');
}
function emptyTrash(){
  if(!S.trash||!S.trash.length)return;
  if(!confirm(`確定清空垃圾桶（${S.trash.length} 筆）？此操作無法復原。`))return;
  logChange('🗑 清空垃圾桶',`永久刪除 ${S.trash.length} 筆`);
  S.trash=[];save();renderTrash();toast('垃圾桶已清空','🗑');
}
function renderTrash(){
  cleanTrash();
  const el=document.getElementById('pane-trash');if(!el)return;
  const items=S.trash||[];
  if(!items.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text3)">

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

    <button class="btn btn-sm btn-d" onclick="emptyTrash()" style="font-size:11px">🗑 清空垃圾桶</button>
  </div>`;
  html+=`<table class="tbl" style="font-size:11px"><thead><tr>
    <th style="width:30px">#</th><th>戶別</th><th>樓層</th><th>廠商</th><th>缺失說明</th><th>刪除時間</th><th style="width:110px">操作</th>
  </tr></thead><tbody>`;
  items.forEach((r,i)=>{
    const delDate=r._deletedAt?new Date(r._deletedAt).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    const daysLeft=r._deletedAt?Math.max(0,Math.ceil((new Date(r._deletedAt).getTime()+30*24*3600000-Date.now())/(24*3600000))):'—';
    const src=r._fromCompleted?'<span style="font-size:9px;background:#d1fae5;color:#065f46;padding:1px 4px;border-radius:3px;margin-left:3px">完成區</span>':'';
    html+=`<tr style="opacity:0.85">
      <td style="text-align:center;color:var(--text3)">${r.id||'—'}</td>
      <td>${esc(r.unit||'—')}${src}</td>
      <td style="text-align:center">${esc(r.floor||'—')}</td>
      <td>${esc(r.vendor||'—')}</td>
      <td>${esc(r.issue||'—')}</td>
      <td style="font-size:10px;color:var(--text3)">${delDate}<br><span style="font-size:9px">剩 ${daysLeft} 天</span></td>
      <td>
        <button class="btn btn-sm" onclick="restoreTrashItem(${i})" style="font-size:10px;padding:2px 6px">↩️ 還原</button>
        <button class="btn btn-sm btn-d" onclick="permDeleteTrash(${i})" style="font-size:10px;padding:2px 6px">✕</button>
      </td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  el.innerHTML=html;

function renderDupes(){
  const el=document.getElementById('pane-dupes');
  if(!el)return;
  const isDoneDup=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  const groups={};
  S.rows.forEach(r=>{
    if(isDoneDup(r.id))return;
    const u=(r.unit||'').trim(),f=(r.floor||'').trim(),is=(r.issue||'').trim();
    if(!u&&!f&&!is)return;
    const k=`${u}|||${f}|||${is}`;
    if(!groups[k])groups[k]={unit:u,floor:f,issue:is,rows:[]};
    groups[k].rows.push(r);
  });
  const dupGroups=Object.values(groups).filter(g=>g.rows.length>=2)
    .sort((a,b)=>b.rows.length-a.rows.length);

  if(!dupGroups.length){
    el.innerHTML=`<div style="padding:18px 20px">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px">🔁 重複作業</div>

    </div>`;
    return;
  }

  const _sel=window._dupeSel||(window._dupeSel=new Set());

  const groupsHtml=dupGroups.map((g,gi)=>{
    const groupKey=`${g.unit}|||${g.floor}|||${g.issue}`;

      return`<div style="display:grid;grid-template-columns:32px 90px 55px 1fr 100px 70px 70px;gap:6px;padding:6px 12px;font-size:11px;align-items:center;border-bottom:0.5px solid var(--border2);cursor:pointer;background:${chk?'#EEEDFE':'transparent'}" onclick="dupeToggleRow(${r.id})">

      <button class="btn btn-sm btn-g" onclick="applyDupeKeep()" style="padding:4px 12px;font-size:11px">✅ 套用保留（各組保留所選，其餘移回收桶）</button>
      ${selCount>0?`<span style="font-size:11px;color:var(--purple);font-weight:500;background:#EEEDFE;padding:2px 8px;border-radius:20px">已選 ${selCount} 筆</span>`:''}
      <span style="font-size:11px;color:var(--text2);margin-left:auto">共 ${dupGroups.length} 組，${totalRows} 筆</span>
    </div>
    ${groupsHtml}
  </div>`;
}

function dupeToggleRow(id){
  if(!window._dupeSel)window._dupeSel=new Set();
  if(_dupeSel.has(id))_dupeSel.delete(id);else _dupeSel.add(id);
  renderDupes();
}

function dupeToggleGroup(groupKey){
  if(!window._dupeSel)window._dupeSel=new Set();
  const isDoneDup=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  const [u,f,is]=groupKey.split('|||');
  const ids=S.rows.filter(r=>!isDoneDup(r.id)&&(r.unit||'').trim()===u&&(r.floor||'').trim()===f&&(r.issue||'').trim()===is).map(r=>r.id);
  const allChk=ids.every(id=>_dupeSel.has(id));
  ids.forEach(id=>allChk?_dupeSel.delete(id):_dupeSel.add(id));
  renderDupes();
}

function dupeToggleAll(){
  if(!window._dupeSel)window._dupeSel=new Set();
  const isDoneDup=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  const allIds=S.rows.filter(r=>{
    if(isDoneDup(r.id))return false;
    const u=(r.unit||'').trim(),f=(r.floor||'').trim(),is=(r.issue||'').trim();
    if(!u&&!f&&!is)return false;
    return true;
  }).map(r=>r.id);
  // only toggle ids that are in dup groups
  const groups={};
  S.rows.forEach(r=>{
    if(isDoneDup(r.id))return;
    const u=(r.unit||'').trim(),f=(r.floor||'').trim(),is=(r.issue||'').trim();
    if(!u&&!f&&!is)return;
    const k=`${u}|||${f}|||${is}`;
    if(!groups[k])groups[k]=[];
    groups[k].push(r.id);
  });
  const dupIds=Object.values(groups).filter(arr=>arr.length>=2).flatMap(arr=>arr);
  const allChk=dupIds.every(id=>_dupeSel.has(id));
  dupIds.forEach(id=>allChk?_dupeSel.delete(id):_dupeSel.add(id));
  renderDupes();
}

function mergeDupes(){
  if(!window._dupeSel||_dupeSel.size<2){toast('請先勾選要合併的筆數（至少2筆）','⚠️');return;}
  const isDoneDup=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  // 按組分類勾選的 ids
  const byGroup={};
  S.rows.forEach(r=>{
    if(!_dupeSel.has(r.id))return;
    const k=`${(r.unit||'').trim()}|||${(r.floor||'').trim()}|||${(r.issue||'').trim()}`;
    if(!byGroup[k])byGroup[k]=[];
    byGroup[k].push(r);
  });
  const groups=Object.values(byGroup);
  // 每組至少要有2筆才合併
  const mergeGroups=groups.filter(g=>g.length>=2);
  if(!mergeGroups.length){toast('勾選的筆屬於不同組且各組不足2筆，無法合併','⚠️');return;}
  // 統計要刪除的筆數
  let delCount=0;
  mergeGroups.forEach(g=>delCount+=g.length-1);
  const msg=`合併確認\n\n共 ${mergeGroups.length} 組，每組保留最早一筆，刪除 ${delCount} 筆重複記錄。\n\n確定執行？`;
  if(!confirm(msg))return;
  // 執行合併：每組按 createdAt 排序，保留最早，刪除其餘
  const toDelete=new Set();
  mergeGroups.forEach(g=>{
    const sorted=g.slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    sorted.slice(1).forEach(r=>toDelete.add(r.id));
  });
  S.rows=S.rows.filter(r=>!toDelete.has(r.id));
  logChange('🔀 合併重複',`刪除 ${toDelete.size} 筆重複記錄，共 ${mergeGroups.length} 組`);
  window._dupeSel=new Set();
  save();renderAll();
  toast(`已合併，刪除 ${toDelete.size} 筆重複記錄 ✓`,'🔀');
}

function unitAddCol(block,colName){
  colName=colName.trim().toUpperCase();
  if(!colName){toast('請輸入棟號名稱','⚠️');return;}
  if(block==='A'){
    if(G95_A_COLS.includes(colName)){toast('棟號已存在','⚠️');return;}
    G95_A_COLS.push(colName);
    G95_RAW_A[colName]={};
    G95_FLOORS.forEach(fl=>{G95_RAW_A[colName][fl]=null;});
  } else {
    if(G95_B_COLS.includes(colName)){toast('棟號已存在','⚠️');return;}
    G95_B_COLS.push(colName);
    G95_RAW_B[colName]={};
    G95_FLOORS.forEach(fl=>{G95_RAW_B[colName][fl]=null;});
  }
  _saveUnitConfig();renderAll();toast('棟號 '+colName+' 已新增 ✅');
}
function unitDelCol(block,col){
  const raw=block==='A'?G95_RAW_A:G95_RAW_B;
  const hasData=Object.values(raw[col]||{}).some(k=>k&&(S.handoverUnits[k]||S.clientData[k]));
  if(!confirm((hasData?'此棟號有交屋或客戶資料，':'')+'確定刪除整欄 '+col+'？'))return;
  if(block==='A'){G95_A_COLS=G95_A_COLS.filter(c=>c!==col);delete G95_RAW_A[col];}
  else{G95_B_COLS=G95_B_COLS.filter(c=>c!==col);delete G95_RAW_B[col];}
  _saveUnitConfig();renderAll();toast('棟號 '+col+' 已刪除');
}
function unitSetCell(block,col,floor,newKey,prefix){
  newKey=(newKey||'').trim();
  const raw=block==='A'?G95_RAW_A:G95_RAW_B;
  if(!raw[col])raw[col]={};
  const oldKey=raw[col][floor];
  const fullKey=prefix?prefix+newKey:newKey;
  if(oldKey&&oldKey!==fullKey){
    if(S.handoverUnits[oldKey]){S.handoverUnits[fullKey||undefined]=S.handoverUnits[oldKey];delete S.handoverUnits[oldKey];}
    if(S.clientData[oldKey]){S.clientData[fullKey||undefined]=S.clientData[oldKey];delete S.clientData[oldKey];}
  }
  raw[col][floor]=fullKey||null;
  if(fullKey&&prefix==='地')G95_SHOP_KEYS.add(fullKey);
  _saveUnitConfig();_buildDefectCache();renderAll();toast(fullKey?'戶別 '+fullKey+' 已儲存':'已清空此格');
}
function unitDelCell(block,col,floor){
  const raw=block==='A'?G95_RAW_A:G95_RAW_B;
  const key=raw[col]?raw[col][floor]:null;
  if(!key){raw[col][floor]=null;_saveUnitConfig();renderAll();return;}
  const hasData=S.handoverUnits[key]||S.clientData[key];
  if(!confirm((hasData?'此戶有交屋/客戶資料，':'')+'確定刪除戶別 '+key+'？'))return;
  delete S.handoverUnits[key];delete S.clientData[key];
  raw[col][floor]=null;
  _saveUnitConfig();_buildDefectCache();renderAll();toast('戶別 '+key+' 已刪除');
}
// ── V0624-35 客戶清單刪除此戶（MONGA 上鎖；缺失移垃圾桶可還原）──────────
function _findUnitCell(key){
  var res=null;
  [['A',G95_RAW_A],['B',G95_RAW_B]].forEach(function(bp){
    var raw=bp[1];
    Object.keys(raw).forEach(function(col){
      Object.keys(raw[col]||{}).forEach(function(fl){
        if(raw[col][fl]===key)res={block:bp[0],col:col,floor:Number(fl)};
      });
    });
  });
  return res;
}
function clientDelUnit(key){
  if(window._VIEW_ONLY)return;
  if(!window._clDelUnlocked){
    var c=prompt('刪除戶別需輸入認證碼：');
    if(c===null)return;
    if(c!=='MONGA'){try{toast('認證碼錯誤','⚠️');}catch(e){}return;}
    window._clDelUnlocked=true;
  }
  if(!_pwoKeyMap)_pwoBuildKeyMap();
  var defRows=(S.rows||[]).filter(function(r){return _pwoUnitKey(r)===key;});
  var defComp=(S.completed||[]).filter(function(r){return _pwoUnitKey(r)===key;});
  var nDef=defRows.length+defComp.length;
  if(!confirm('確定刪除戶別 '+key+'？\n會一併移除交屋／客戶資料'+(nDef?('，並把 '+nDef+' 筆缺失移到垃圾桶（可還原）'):'')+'。\n總戶數會少 1。'))return;
  var now=new Date().toISOString();
  if(!S.trash)S.trash=[];
  defRows.forEach(function(r){r._deletedAt=now;S.trash.unshift(r);});
  defComp.forEach(function(r){r._deletedAt=now;r._fromCompleted=true;S.trash.unshift(r);});
  if(nDef){
    S.rows=(S.rows||[]).filter(function(r){return _pwoUnitKey(r)!==key;});
    S.completed=(S.completed||[]).filter(function(r){return _pwoUnitKey(r)!==key;});
  }
  if(S.handoverUnits)delete S.handoverUnits[key];
  if(S.clientData)delete S.clientData[key];
  var loc=_findUnitCell(key);
  if(loc){var raw=loc.block==='A'?G95_RAW_A:G95_RAW_B;if(raw[loc.col])raw[loc.col][loc.floor]=null;}
  try{G95_SHOP_KEYS.delete(key);}catch(e){}
  _clientExpanded=null;
  _pwoBuildKeyMap();
  _saveUnitConfig();_buildDefectCache();renderAll();
  try{toast('戶別 '+key+' 已刪除'+(nDef?'，缺失移至垃圾桶':''),'🗑');}catch(e){}
}
function unitAddFloor(floorNum){
  floorNum=Number(floorNum);
  if(isNaN(floorNum)||floorNum<1||floorNum>99){toast('請輸入有效樓層（1–99）','⚠️');return;}
  if(G95_FLOORS.includes(floorNum)){toast('樓層已存在','⚠️');return;}
  G95_FLOORS.push(floorNum);
  G95_FLOORS.sort((a,b)=>b-a);
  G95_A_COLS.forEach(c=>{if(!G95_RAW_A[c])G95_RAW_A[c]={};if(!(floorNum in G95_RAW_A[c]))G95_RAW_A[c][floorNum]=null;});
  G95_B_COLS.forEach(c=>{if(!G95_RAW_B[c])G95_RAW_B[c]={};if(!(floorNum in G95_RAW_B[c]))G95_RAW_B[c][floorNum]=null;});
  _saveUnitConfig();renderAll();toast('樓層 '+floorNum+'F 已新增 ✅');
}
function unitDelFloor(floorNum){
  floorNum=Number(floorNum);
  const hasData=[...G95_A_COLS,...G95_B_COLS].some(c=>{
    const raw=G95_A_COLS.includes(c)?G95_RAW_A:G95_RAW_B;
    const key=raw[c]?raw[c][floorNum]:null;
    return key&&(S.handoverUnits[key]||S.clientData[key]);
  });
  if(!confirm((hasData?'此樓層有交屋/客戶資料，':'')+'確定刪除整層 '+floorNum+'F？'))return;
  G95_FLOORS=G95_FLOORS.filter(f=>f!==floorNum);
  [...G95_A_COLS,...G95_B_COLS].forEach(c=>{
    const raw=G95_A_COLS.includes(c)?G95_RAW_A:G95_RAW_B;
    if(raw[c])delete raw[c][floorNum];
  });
  _saveUnitConfig();renderAll();toast('樓層 '+floorNum+'F 已刪除');
}

function runUnitMigration(){
  const MAP={'甲梯':'甲梯A','乙梯':'乙梯A','丙梯':'丙梯B','丁梯':'丁梯B'};
  const OLD_KEYS=new Set([...Object.keys(MAP),'梯廳']);
  const allRows=[...S.rows,...(S.completed||[])];
  const affected=allRows.filter(r=>OLD_KEYS.has(r.unit));
  if(!affected.length){toast('沒有需要遷移的舊戶別紀錄','ℹ️');return;}
  // preview
  const zoneLbl=id=>(S.zones.find(z=>z.id===id)||{label:''}).label;
  let previewLines=[];
  const counts={};
  affected.forEach(r=>{
    let newU=MAP[r.unit];
    if(!newU&&r.unit==='梯廳'){
      const l=zoneLbl(r.zone);
      if(l.includes('A'))newU='梯廳A';
      else if(l.includes('B'))newU='梯廳B';
    }
    const key=(newU||'(跳過)');
    counts[r.unit+' → '+key]=(counts[r.unit+' → '+key]||0)+1;
  });
  const preview=Object.entries(counts).map(([k,v])=>`  ${k}：${v}筆`).join('\n');
  if(!confirm(`即將遷移以下戶別名稱：\n${preview}\n\n確定執行？`))return;
  let done=0,skip=0;
  function migrate(r){
    const newU=MAP[r.unit]||(r.unit==='梯廳'?(()=>{const l=zoneLbl(r.zone);return l.includes('A')?'梯廳A':l.includes('B')?'梯廳B':null;})():null);
    if(newU){r.unit=newU;done++;}else skip++;
  }
  S.rows.forEach(migrate);(S.completed||[]).forEach(migrate);
  save();renderAll();
  toast(`已遷移 ${done} 筆${skip?'，跳過 '+skip+' 筆':''}，請至戶別管理更新戶別清單`,'✅');
}

// ── 使用人數偵測（BroadcastChannel 補強本地分頁；Firebase presence 優先）────
(function(){
  const CH='tracker_presence';
  const ID=Math.random().toString(36).slice(2);
  let peers={};
  peers[ID]=Date.now();

  function updateCount(){
    // 若 Firebase presence 已有值，優先使用
    if(typeof window._onlineCount==='number'){
      const el=document.getElementById('user-count');
      if(el){el.style.display='';el.textContent='👤 '+window._onlineCount+' 人';}
      return;
    }
    // fallback：BroadcastChannel 本地計數
    const now=Date.now();
    Object.keys(peers).forEach(k=>{if(now-peers[k]>12000)delete peers[k];});
    const n=Object.keys(peers).length;
    const el=document.getElementById('user-count');
    if(el){el.style.display='';el.textContent='👤 '+n+' 人';}
  }

  let bc=null;
  try{
    bc=new BroadcastChannel(CH);
    bc.onmessage=e=>{
      if(e.data&&e.data.id&&!e.data.leave){peers[e.data.id]=Date.now();updateCount();}
      if(e.data&&e.data.leave&&e.data.id){delete peers[e.data.id];updateCount();}
    };
  }catch(ex){}

  setInterval(()=>{
    peers[ID]=Date.now();
    if(bc)bc.postMessage({id:ID});
    updateCount();
  },5000);

  window.addEventListener('beforeunload',()=>{
    if(bc)bc.postMessage({id:ID,leave:true});
  });

  setTimeout(()=>{if(bc)bc.postMessage({id:ID});updateCount();},800);
})();

const INSP_ORDER={'初驗':0,'複驗1':1,'複驗2':2,'複驗3':3,'複驗4':4,'複驗5':5,'複驗6':6};
function inspTypeOf(ins){
  if(ins&&ins.type)return ins.type;
  const l=String((ins&&ins.label)||'');
  if(/初驗/.test(l))return '初驗';
  const m=l.match(/複驗\s*(\d+)/);
  if(m)return '複驗'+m[1];
  if(/複驗/.test(l))return '複驗1';
  return l||'驗收';
}
function inspOrderVal(t){
  if(t in INSP_ORDER)return INSP_ORDER[t];
  const m=String(t).match(/複驗\s*(\d+)/);
  if(m)return parseInt(m[1],10);
  if(/初驗/.test(t))return 0;
  return 99;
}

function dupeSetKeep(id){
  const r=S.rows.find(x=>x.id===id); if(!r)return;
  const gk=`${(r.unit||'').trim()}|||${(r.floor||'').trim()}|||${(r.issue||'').trim()}`;
  if(!window._dupeKeep)window._dupeKeep={};
  if(window._dupeKeep[gk]===id)delete window._dupeKeep[gk]; else window._dupeKeep[gk]=id;
  renderDupes();
}
function applyDupeKeep(){
  if(!window._dupeKeep||!Object.keys(window._dupeKeep).length){toast('請先在各組點「保留」選定要留下的那一筆','⚠️');return;}
  const isDoneDup=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  const groups={};
  S.rows.forEach(r=>{if(isDoneDup(r.id))return;const u=(r.unit||'').trim(),f=(r.floor||'').trim(),is=(r.issue||'').trim();if(!u&&!f&&!is)return;const k=`${u}|||${f}|||${is}`;(groups[k]=groups[k]||[]).push(r);});
  const toTrash=[]; let affected=0;
  Object.keys(window._dupeKeep).forEach(gk=>{
    const keepId=window._dupeKeep[gk]; const grp=groups[gk];
    if(!grp||grp.length<2)return;
    if(!grp.some(r=>r.id===keepId))return;
    grp.forEach(r=>{if(r.id!==keepId)toTrash.push(r);});
    affected++;
  });
  if(!toTrash.length){toast('沒有可移除的重複（請確認每組已選保留且仍有多筆）','⚠️');return;}
  if(!confirm('將保留你選取的 '+affected+' 組各 1 筆，其餘 '+toTrash.length+' 筆移到回收桶（可復原）。\n\n確定執行？'))return;
  if(!S.trash)S.trash=[];
  const ids=new Set(toTrash.map(r=>r.id));
  toTrash.forEach(r=>{r._deletedAt=new Date().toISOString();S.trash.unshift(r);});
  S.rows=S.rows.filter(r=>!ids.has(r.id));
  logChange('🔁 重複保留處理','保留 '+affected+' 組，移除 '+toTrash.length+' 筆到回收桶');
  window._dupeKeep={}; window._dupeSel=new Set();
  save(); renderAll();
  toast('已保留所選，'+toTrash.length+' 筆移到回收桶 ✓','🔁');
}

  const cnt=raw=>{try{return Object.values(raw).reduce((s,col)=>s+Object.values(col).filter(Boolean).length,0);}catch(e){return 0;}};

}
function _hrptTotal(){
  if(S.totalUnitsOverride&&Number(S.totalUnitsOverride)>0)return Number(S.totalUnitsOverride);
  return _clientBoardTotal();
}
function _hrptUnitDates(){
  const hu=S.handoverUnits||{};
  const keys=new Set([..._allTrackedUnits(),...Object.keys(hu)]);
  const out=[];
  keys.forEach(u=>{
    const h=hu[u]||{}; const insps=h.inspections||[];
    const initDs=insps.filter(i=>i.date&&inspTypeOf(i)==='初驗').map(i=>i.date).sort();
    const reDs=insps.filter(i=>i.date&&/^複驗/.test(inspTypeOf(i))).map(i=>i.date).sort();
    out.push({unit:u,initD:initDs[0]||'',reD:reDs[0]||'',delivD:h.delivered?(h.deliveredDate||'__nd__'):''});
  });
  return out;
}
function hrptCounts(upto){
  const arr=_hrptUnitDates();
  let init=0,re=0,deliv=0,initT=0,reT=0,delivT=0;
  arr.forEach(o=>{
    if(o.initD&&o.initD<=upto){init++;if(o.initD===upto)initT++;}
    if(o.reD&&o.reD<=upto){re++;if(o.reD===upto)reT++;}
    if(o.delivD){if(o.delivD==='__nd__'){deliv++;}else if(o.delivD<=upto){deliv++;if(o.delivD===upto)delivT++;}}
  });
  return {init,re,deliv,initT,reT,delivT};
}
function _hrptSeries(upto){
  const arr=_hrptUnitDates();
  const ds=new Set();
  arr.forEach(o=>{[o.initD,o.reD,(o.delivD&&o.delivD!=='__nd__')?o.delivD:''].forEach(d=>{if(d&&d<=upto)ds.add(d);});});
  ds.add(upto);
  let days=[...ds].filter(d=>d<=upto).sort();
  if(days.length>8)days=days.slice(days.length-8);
  if(!days.length)days=[upto];
  return days.map(d=>{const c=hrptCounts(d);return {d:d,init:c.init,re:c.re,deliv:c.deliv};});
}
function _hrptTrendSVG(upto,total){

  const x=i=>padL+(series.length<=1?0:i*(W-padL-padR)/(series.length-1));

let _rptDate='';
function _rptDOW(dateStr){const w=['日','一','二','三','四','五','六'];return '週'+w[new Date(dateStr).getDay()];}
function _rptMMDD(dateStr){return dateStr.slice(5).replace('-','/');}
// 用與行事曆徽章相同邏輯判定某戶當前階段（初/複/交），讓日報數字與行事曆一致
function _rptCalStage(key){
  const hu=(S.handoverUnits||{})[key]||{};const insps=hu.inspections||[];
  const reHas=insps.some(i=>/^複驗/.test(inspTypeOf(i)));
  const reCount=insps.filter(i=>i.date&&/^複驗/.test(inspTypeOf(i))).length;
  if(hu.delivered)return '交';
  if(reCount>0)return '交';
  if(reHas)return '複';
  return '初';
}
// 今日：依預定驗收日落在該日的戶別，分階段算 預計／取消／未到（預計含取消與未到）
function _rptTodayDetail(date){
  const hu=S.handoverUnits||{};const mk=()=>({plan:0,cancel:0,noshow:0});
  const out={'初':mk(),'複':mk(),'交':mk()};
  Object.keys(hu).forEach(u=>{const h=hu[u];if(!h||h.planDate!==date)return;const st=_rptCalStage(u);out[st].plan++;if(h.cancelled)out[st].cancel++;if(h.noShow)out[st].noshow++;});
  return out;
}
// 區間內預定驗收（含取消/未到），分階段
function _rptPlanRange(from,to){
  const hu=S.handoverUnits||{};const out={'初':0,'複':0,'交':0};
  Object.keys(hu).forEach(u=>{const h=hu[u];if(!h||!h.planDate)return;if(h.planDate>=from&&h.planDate<=to)out[_rptCalStage(u)]++;});
  return out;
}
// 區間內實際完成（依完成日），分類型
function _rptDoneRange(from,to){
  const arr=_hrptUnitDates();let init=0,re=0,deliv=0;
  arr.forEach(o=>{
    if(o.initD&&o.initD>=from&&o.initD<=to)init++;
    if(o.reD&&o.reD>=from&&o.reD<=to)re++;
    if(o.delivD&&o.delivD!=='__nd__'&&o.delivD>=from&&o.delivD<=to)deliv++;
  });
  return {init:init,re:re,deliv:deliv};
}

function saveDailyReport(){

  if(!S.rptSaved)S.rptSaved={};

  var _sk=Object.keys(S.rptSaved).sort();while(_sk.length>60)delete S.rptSaved[_sk.shift()];  // 只留最近60天，避免無上限累積

function rptFont(d){

function _rptCopyFallback(txt,done){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.top='-9999px';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');done();}catch(e){toast('複製失敗，請手動長按選取','⚠️');}
  ta.remove();
}
function copyDailyReport(){
  const card=document.getElementById('rpt-card');

  }else _rptCopyFallback(txt,done);
}

function _roundAbbr(rd){
  if(!rd)return'自';

  const m=String(rd).match(/複驗(\d+)/);
  if(m)return'複'+m[1];

  r.round=seq[i];save();

  let shop=0;try{shop=(typeof G95_SHOP_KEYS!=='undefined'&&G95_SHOP_KEYS)?G95_SHOP_KEYS.size:0;}catch(e){}

function hrptBlockStats(upto){
  const arr=_hrptUnitDates();
  const mk=()=>({A:{cum:0,today:0},B:{cum:0,today:0},shop:{cum:0,today:0}});
  const out={init:mk(),re:mk(),deliv:mk()};
  arr.forEach(o=>{
    const b=_unitBlock(o.unit);
    if(o.initD&&o.initD<=upto){out.init[b].cum++;if(o.initD===upto)out.init[b].today++;}
    if(o.reD&&o.reD<=upto){out.re[b].cum++;if(o.reD===upto)out.re[b].today++;}
    if(o.delivD){if(o.delivD==='__nd__'){out.deliv[b].cum++;}else if(o.delivD<=upto){out.deliv[b].cum++;if(o.delivD===upto)out.deliv[b].today++;}}
  });

function hrptUpcoming(refDate){
  const hu=S.handoverUnits||{};
  const ref=new Date(refDate);
  const tmr=new Date(ref);tmr.setDate(ref.getDate()+1);const tmrS=tmr.toISOString().slice(0,10);
  const dow=ref.getDay();const toSun=dow===0?0:(7-dow);const sun=new Date(ref);sun.setDate(ref.getDate()+toSun);const sunS=sun.toISOString().slice(0,10);
  let tomorrow=0, week=0;
  Object.keys(hu).forEach(u=>{const pd=hu[u]&&hu[u].planDate;if(!pd)return;if(pd===tmrS)tomorrow++;if(pd>=refDate&&pd<=sunS)week++;});
  return {tomorrow:tomorrow,week:week,sunS:sunS};
}
function _hrptDailyBarsSVG(upto){
  const arr=_hrptUnitDates();
  const days=[];const d0=new Date(upto);for(let k=6;k>=0;k--){const d=new Date(d0);d.setDate(d0.getDate()-k);days.push(d.toISOString().slice(0,10));}
  const data=days.map(d=>{let init=0,re=0,deliv=0;arr.forEach(o=>{if(o.initD===d)init++;if(o.reD===d)re++;if(o.delivD&&o.delivD!=='__nd__'&&o.delivD===d)deliv++;});return {d:d,init:init,re:re,deliv:deliv};});
  const maxY=Math.max(1,...data.map(x=>Math.max(x.init,x.re,x.deliv)));
  const W=620,H=180,padL=26,padR=10,padT=12,padB=30;
  const gW=(W-padL-padR)/days.length;
  const bw=Math.max(6,Math.min(13,(gW-10)/3));
  const base=H-padB;
  const y=v=>padT+(1-v/maxY)*(H-padT-padB);
  const bar=(cx,v,color)=>{const hh=base-y(v);return '<rect x="'+cx.toFixed(1)+'" y="'+y(v).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,hh).toFixed(1)+'" fill="'+color+'" rx="1"/>'+(v>0?'<text x="'+(cx+bw/2).toFixed(1)+'" y="'+(y(v)-2).toFixed(1)+'" text-anchor="middle" font-size="8" fill="#5F5E5A">'+v+'</text>':'');};
  let g='';
  data.forEach((x,i)=>{const gx=padL+i*gW;const c0=gx+(gW-bw*3-6)/2;g+=bar(c0,x.init,'#185FA5')+bar(c0+bw+3,x.re,'#854F0B')+bar(c0+2*(bw+3),x.deliv,'#3B6D11');g+='<text x="'+(gx+gW/2).toFixed(1)+'" y="'+(H-10)+'" text-anchor="middle" font-size="9" fill="#9A9896">'+x.d.slice(5)+'</text>';});
  const yl=[0,Math.round(maxY/2),maxY].map(v=>'<text x="'+(padL-5)+'" y="'+(y(v)+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="#9A9896">'+v+'</text>').join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:660px" role="img" aria-label="近7日每日完成柱狀"><line x1="'+padL+'" y1="'+base+'" x2="'+(W-padR)+'" y2="'+base+'" stroke="#D6D6D6" stroke-width="1"/>'+yl+g+'</svg>';
}

    button[onclick*="emptyTrash"],
    button[onclick*="showInlineAdd"],
    .row-action-btn,
    #inline-add-area,
    #modalBg,
    #tab-edit-btn { display:none!important; }

    /* 讓 input/select/textarea 看起來是純文字 */
    input:not([type="checkbox"]):not(.view-allow),
    select:not(.view-allow),
    textarea:not(.view-allow) {
      pointer-events:none!important;
      opacity:0.85;
      background:transparent!important;
      border-color:transparent!important;
    }
  `;
  document.head.appendChild(style);

  // 3) 等 DOM ready 後處理
  function applyReadonly(){
    // 設定所有 input/textarea 為 readonly
    document.querySelectorAll('input,textarea').forEach(el=>{
      el.setAttribute('readonly','');
      el.removeAttribute('contenteditable');
    });
    // 停用所有 select
    document.querySelectorAll('select').forEach(el=>el.setAttribute('disabled',''));
    // 停用所有 checkbox
    document.querySelectorAll('input[type="checkbox"]').forEach(el=>{
      el.setAttribute('disabled','');
      el.style.pointerEvents='none';
    });

    // 移除行的右鍵選單 / 點擊編輯
    document.querySelectorAll('[oncontextmenu]').forEach(el=>el.removeAttribute('oncontextmenu'));

    // 頂部顯示唯讀提示條
    const bar = document.createElement('div');
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#FEF3C7;color:#92400E;text-align:center;padding:6px 12px;font-size:13px;font-weight:600;border-bottom:1px solid #F59E0B;';
    bar.textContent = '🔒 唯讀模式 — 僅供檢視，無法編輯或修改';
    document.body.prepend(bar);
    document.body.style.paddingTop = '34px';
  }

  // 4) 攔截動態渲染後新出現的元素
  const _origRenderAll = window.renderAll;
  if(_origRenderAll){
    window.renderAll = function(){
      _origRenderAll.apply(this, arguments);
      setTimeout(applyReadonly, 50);
    };
  }

  // 5) 攔截可能的 prompt / confirm 呼叫（防止新增戶別等操作）
  window.prompt = function(){ return null; };
  window.confirm = function(){ return false; };
  // 6) 強化唯讀：全域攜截編輯互動 + 動態元素停用（修補切分頁/展開後的新元素與新功能按鈕）
  (function(){
    const editRe=/\b(upd|addRow|delRow|deleteRow|confirmInlineAdd|toggleInlineAdd|showInlineAdd|editVendorModal|editManagerModal|addVendor|addZoneUnit|addZone|quickInspToggle|quickInspDate|addReinspect|toggleDeliveredQuick|toggleDeliveredH|toggleDeliveredCl|toggleDelivered|setDeliveredDateQuick|vstatEditDate|vstatRemove|roundCycle|dupeSetKeep|applyDupeKeep|mergeDupes|addHuInspH2|addHuInsp|delHuInspH2|delHuInsp|setHuFieldH|setHuField|setHuInspType|setHuParkCheck|setHu|setCl|quickCompleteDefect|completeRow|toggleCheck|batchMarkDelivered|batchFillInspDate|batchComplete|importClientExcel|importClient|emptyTrash|permDeleteTrash|permDelete|restoreTrashItem|restoreTrash|restoreRow|delEvent|addEvent|addHuParking|removeHandover|renumberAlerts|renumberEvents|renumber|clearAllData|confirmClientEdit|showBatchClientEdit|saveNote|_undoDelete|toggleNoShow|toggleCancel|clearSchedule|pwoMarkDone|batchSchedByList|bslApplyChecked|bslExpandOwners|toggleHost|setHostBadgeMode|setMgrCode|hrptUnlockTotal|cwGenerate|cwUndo|cwMarkDone|cwDoneUndo)\b/;
    let _nt=0; function notify(){const n=Date.now(); if(n-_nt<1500)return; _nt=n; try{ if(typeof toast==='function')toast('唯讀模式，無法編輯','🔒'); }catch(_){}}
    function block(e){ try{
      const t=e.target;
      if(t&&t.matches&&t.matches('input[type=checkbox],input[type=radio]')){ e.preventDefault(); e.stopImmediatePropagation(); notify(); return; }
      const el=t&&t.closest?t.closest('[onclick],[onchange]'):null;
      if(el){ const oc=(el.getAttribute('onclick')||'')+';'+(el.getAttribute('onchange')||''); if(editRe.test(oc)){ e.preventDefault(); e.stopImmediatePropagation(); notify(); } }
    }catch(_){} }
    ['click','change','input'].forEach(function(ev){document.addEventListener(ev,block,true);});
    function disableEl(el){ try{ el.setAttribute('disabled',''); el.style.pointerEvents='none'; }catch(_){} }
    try{ const mo=new MutationObserver(function(ms){ ms.forEach(function(m){ (m.addedNodes||[]).forEach(function(n){ if(n&&n.nodeType===1){ if(n.matches&&n.matches('input[type=checkbox],select'))disableEl(n); if(n.querySelectorAll)n.querySelectorAll('input[type=checkbox],select').forEach(disableEl); } }); }); }); mo.observe(document.body,{childList:true,subtree:true}); }catch(_){}
  })();

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', ()=>setTimeout(applyReadonly,100));
  } else {
    setTimeout(applyReadonly,100);
  }
})();
</script>
<script>
// ── V0701-46：派工回報確認（點工派遣勾完成 → 這裡一鍵銷項，走 pwoMarkDone 正常完成流程）──
(function(){
  function ensureBtn(){
    var si=document.getElementById('sync-indicator');
    if(!si)return null;
    var b=document.getElementById('dispFbBtn');
    if(b)return b;
    b=document.createElement('span');
    b.id='dispFbBtn';
    b.style.cssText='display:none;font-size:11px;padding:3px 10px;border-radius:20px;background:#f59e0b;color:#fff;margin-left:8px;cursor:pointer;font-weight:700';
    b.onclick=openDispFb;
    si.parentNode.insertBefore(b,si.nextSibling);
    return b;
  }
  function fillList(box){
    var list=window._dispatchFb||[];
    if(!list.length){box.innerHTML='<div style="color:#888;padding:14px">（沒有待確認的回報）</div>';return;}
    box.innerHTML=list.map(function(f){
      var r=(typeof S!=='undefined'&&S&&Array.isArray(S.rows))?S.rows.filter(function(x){return String(x.id)===String(f.refId);})[0]:null; // V0701-47:S 是 let 宣告,不能用 window.S 判斷
      var miss=!r;
      var okBtn=miss
        ?'<span style="font-size:12px;color:#9a3412">⚠ 總表找不到此列（可能已完成或刪除），只能刪回報</span> '
        :'<button class="fbOk" data-id="'+f.refId+'" style="padding:6px 14px;border-radius:8px;border:0;background:#16a34a;color:#fff;cursor:pointer;font-size:13px">✔ 確認完成</button> ';
      return '<div style="border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin-bottom:8px;background:'+(miss?'#fff7ed':'#fff')+'">'+
        '<div style="font-weight:700;font-size:14px">#'+f.refId+'　'+(f.unit||'')+'　'+(f.content||'')+'</div>'+
        '<div style="font-size:12px;color:#6b7280;margin:4px 0 8px">'+(f.dnum?('派工單 G95-'+String(f.dnum).padStart(4,'0')+'｜'):'')+(f.day||'')+'｜回報：'+(f.by||'')+'</div>'+
        okBtn+
        '<button class="fbNo" data-id="'+f.refId+'" style="padding:6px 14px;border-radius:8px;border:1px solid #fca5a5;background:#fff;color:#b91c1c;cursor:pointer;font-size:13px">忽略（刪回報）</button>'+
      '</div>';
    }).join('');
    box.querySelectorAll('.fbOk').forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id;
        var r=S.rows.filter(function(x){return String(x.id)===String(id);})[0];
        if(!r){alert('總表找不到 #'+id);return;}
        if(!confirm('確認 #'+id+'「'+(r.issue||'')+'」完成？（會移至已完成工作，可還原）'))return;
        pwoMarkDone(r.id);
        if(window._dispatchFbDelete)window._dispatchFbDelete(id);
      };
    });
    box.querySelectorAll('.fbNo').forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id;
        if(!confirm('刪除 #'+id+' 的回報？（總表這筆不會被改動）'))return;
        if(window._dispatchFbDelete)window._dispatchFbDelete(id);
      };
    });
  }
  function openDispFb(){
    var mask=document.getElementById('dispFbMask');
    if(!mask){
      mask=document.createElement('div');
      mask.id='dispFbMask';
      mask.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:14px';
      mask.innerHTML='<div style="background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:86vh;overflow:auto;padding:16px">'+
        '<div style="display:flex;align-items:center;margin-bottom:10px"><b style="font-size:16px">📥 派工回報（點工派遣）</b><span style="flex:1"></span>'+
        '<button id="dispFbClose" style="padding:6px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;cursor:pointer">關閉</button></div>'+
        '<div style="font-size:12px;color:#6b7280;margin-bottom:10px">派遣看板勾了完成的工作。「確認完成」＝走追蹤總表正常銷項（移至已完成、可還原）。</div>'+
        '<div id="dispFbList"></div></div>';
      document.body.appendChild(mask);
      mask.onclick=function(e){if(e.target===mask)mask.style.display='none';};
      mask.querySelector('#dispFbClose').onclick=function(){mask.style.display='none';};
    }
    mask.style.display='flex';
    fillList(document.getElementById('dispFbList'));
  }
  window._renderDispatchFb=function(){
    var b=ensureBtn();if(!b)return;
    var n=(window._dispatchFb||[]).length;
    b.textContent='📥 派工回報 '+n;
    b.style.display=n?'':'none';
    var box=document.getElementById('dispFbList');
    var mask=document.getElementById('dispFbMask');
    if(box&&mask&&mask.style.display!=='none')fillList(box);
  };
  if(document.readyState!=='loading'){ensureBtn();}
  else{document.addEventListener('DOMContentLoaded',ensureBtn);}
})();
</script>
<script>
// ── V0701-45：清除舊「點工派遣」Service Worker ──
// dispatch 已搬家至獨立 repo（/dispatch/），本 repo 的 sw.js/manifest.json 已刪除。
// 但已安裝在使用者裝置上的舊 SW（scope 蓋整個 /G95/）不會自己消失，這裡主動解除註冊＋清快取，根治健檢列管地雷。
(function(){
  try{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ r.unregister(); });
      }).catch(function(){});
    }
    if(window.caches && caches.keys){
      caches.keys().then(function(ks){
        ks.forEach(function(k){ if(k.indexOf('dispatch')===0) caches.delete(k); });
      }).catch(function(){});
    }
  }catch(e){}
})();
</script>
