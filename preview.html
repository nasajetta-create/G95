  const totalFiltered=data.length;
  const totalPages=Math.max(1,Math.ceil(totalFiltered/PAGE_SIZE));
  if(_gotoRowId!=null){

    mainPage=ti>=0?Math.floor(ti/PAGE_SIZE):0;

  if(mainPage>=totalPages)mainPage=0;
  const pageData=data.slice(mainPage*PAGE_SIZE,(mainPage+1)*PAGE_SIZE);

      <select id="fZone" onchange="mainPage=0;renderMain()"><option value="">全部區域</option>${zOp}</select>
      <select id="fRound" onchange="mainPage=0;renderMain()" title="只看某輪次"><option value="">全部輪次</option>${(()=>{const rs=[...new Set(['初驗','複驗1','複驗2','複驗3',...S.rows.map(r=>r.round).filter(Boolean)])].sort((a,b)=>inspOrderVal(a)-inspOrderVal(b));return rs.map(x=>'<option value="'+esc(x)+'" '+(x===fRound?'selected':'')+'>'+esc(x)+'</option>').join('')+'<option value="自檢" '+(fRound==='自檢'?'selected':'')+'>自檢</option>';})()}</select>

        <option value="pending"${fStatus==='pending'?' selected':''}>未開始</option>
        <option value="ongoing"${fStatus==='ongoing'?' selected':''}>進行中</option>
        <option value="done"${fStatus==='done'?' selected':''}>已完成</option>

  const prev=selMgr;

  // 若 pane 已存在，只更新卡片選中樣式 + detail/editor 區塊，避免重建整個 pane
  const pane=document.getElementById('pane-mgr');
  if(!pane||!pane.innerHTML){renderMgr();return;}
  // 1. 更新所有卡片的選中樣式（只改 class，不重建）
  const vcards=document.getElementById('mgr-vcards');
  if(vcards){
    vcards.querySelectorAll('.vc').forEach(el=>{
      const isSel=el.id==='mcard-'+selMgr;
      el.classList.toggle('sel',isSel);
    });
  }
  // 2. 更新右側清單 pill 選中狀態
  const side=document.getElementById('mgr-side-editor');
  if(side&&_mgrEditorOpen){
    side.querySelectorAll('[data-mgr-pill]').forEach(el=>{
      const m=el.getAttribute('data-mgr-pill');
      const isSel=m===selMgr;
      el.style.background=isSel?'#F0EEFF':'#fff';
      el.style.borderColor=isSel?'var(--purple)':'var(--border)';
      const nameEl=el.querySelector('[data-pill-name]');
      if(nameEl)nameEl.style.fontWeight=isSel?'600':'400';
    });

  setTimeout(()=>_patchMgrDetail(_buildMgrStats()),0);
}
let _mgrDetailCache={mgr:null,zone:null};
function _patchMgrDetail(statsMap){
  const pane=document.getElementById('pane-mgr');
  if(!pane)return;
  const mZoneFilter=window._mgrZone||'all';
  let detail='';
  if(selMgr){
    // ── Fix 1: selMgr 與 zone 都沒變時，跳過 tblHTML 重建 ──
    const cacheHit=_mgrDetailCache.mgr===selMgr&&_mgrDetailCache.zone===mZoneFilter;
    _mgrDetailCache.mgr=selMgr;
    _mgrDetailCache.zone=mZoneFilter;
    const mRowsAll=S.rows.filter(r=>{
      if(r.manager!==selMgr)return false;
      if(mZoneFilter!=='all'&&r.zone!==mZoneFilter)return false;
      return true;
    });
    const statusOrder={overdue:0,ongoing:1,pending:1,done:2};
    const mItems=mRowsAll.slice().sort((a,b)=>{
      const sa=statusOrder[getStatus(a)]??1,sb=statusOrder[getStatus(b)]??1;
      if(sa!==sb)return sa-sb;
      const da=a.planDone||'9999',db=b.planDone||'9999';
      return da<db?-1:da>db?1:0;
    });
    const totalAll=(statsMap||{})[selMgr]?statsMap[selMgr].total:mItems.length;

let _vendorEditorOpen=false;

function renderVendor(){
  const map={};
  const isComp=r=>r.compId!=null;
  // S.completed 優先（有 compId），S.rows 補充未完成項
  const allVendorRows=[...(S.completed||[]),...S.rows];
  const seenV=new Set();
  const uniqVendorRows=allVendorRows.filter(r=>{if(seenV.has(r.id))return false;seenV.add(r.id);return true;});
  uniqVendorRows.forEach(r=>{
    const v=r.vendor||'（未指定）';
    if(!map[v])map[v]={total:0,done:0,overdue:0,ongoing:0,pending:0};
    map[v].total++;
    if(isComp(r))map[v].done=(map[v].done||0)+1;
    else{const st=getStatus(r);map[v][st]=(map[v][st]||0)+1;}
  });
  const orderedVendors=[...S.vendors.filter(v=>map[v]),...Object.keys(map).filter(v=>!S.vendors.includes(v))];
  const sortSel=_vendorSort;
  const sortFn=sortSel==='az'?(a,b)=>a.localeCompare(b,'zh-TW'):
    sortSel==='za'?(a,b)=>b.localeCompare(a,'zh-TW'):null;
  const notDone100=orderedVendors.filter(v=>!(map[v].total&&(map[v].done||0)===map[v].total));
  const done100=orderedVendors.filter(v=>map[v].total&&(map[v].done||0)===map[v].total).sort((a,b)=>a.localeCompare(b,'zh-TW'));
  const sortedVendors=[...(sortFn?[...notDone100].sort(sortFn):notDone100),...done100];
  const cards=sortedVendors.map(name=>{
    const d=map[name];if(!d)return'';
    const col=vColor(name),sel=selVendor===name;
    const pct=d.total?Math.round((d.done||0)/d.total*100):0;
    const isDone100=d.total>0&&pct===100;
    const hasOverdue=(d.overdue||0)>0;
    const cls='vc2'+(sel?' sel':'')+(isDone100?' vc-done100':'')+(hasOverdue?' vc-overdue':'');
    return`<div class="${cls}" onclick="toggleSelVendor('${esc(name)}')" title="總項目${d.total}・已完成${d.done||0}・逾期${d.overdue||0}・進行中${d.ongoing||0}">
      <div class="vc2-name"><span style="width:9px;height:9px;border-radius:2px;background:${col};display:inline-block;flex-shrink:0"></span>${esc(name)}</div>
      <div class="vc2-stat">${d.total}項${isDone100?'・<span style="color:var(--green)">全數完成 ✓</span>':`・<span style="color:var(--green)">${d.done||0}完成</span>`}</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${isDone100?'var(--green)':col}"></div></div>
      <div class="prog-lbl">${pct}%</div>
    </div>`;
  }).join('');
  let detail='';
  if(selVendor){
    const sv=selVendor;
    const vBlockFilter=window._vendorBlock||'all';
    const rawItems=S.rows.filter(r=>{
      if(r.vendor!==sv)return false;
      if(vBlockFilter==='A'){const u=String(r.unit||'');return/^(地|業)?A\d/i.test(u)||u.startsWith('A');}
      if(vBlockFilter==='B'){const u=String(r.unit||'');return/^(地|業)?B\d/i.test(u)||u.startsWith('B');}
      return true;
    });
    const statusOrder={overdue:0,ongoing:1,pending:1,done:2};
    const items=rawItems.slice().sort((a,b)=>{
      const sa=statusOrder[getStatus(a)]??1,sb=statusOrder[getStatus(b)]??1;
      if(sa!==sb)return sa-sb;
      const da=a.planDone||'9999',db=b.planDone||'9999';
      return da<db?-1:da>db?1:0;
    });
    const totalAll=S.rows.filter(r=>r.vendor===sv).length;
    const blkBtns=['all','A','B'].map(b=>{
      const active=vBlockFilter===b;
      const lbl={all:`全部（${totalAll}）`,A:'A棟',B:'B棟'}[b];
      return`<button onclick="window._vendorBlock='${b}';renderVendor()" style="font-size:11px;padding:2px 8px;border:1px solid ${active?'var(--purple)':'var(--border)'};background:${active?'#F0EEFF':'var(--card)'};color:${active?'var(--purple)':'var(--text2)'};border-radius:3px;cursor:pointer;margin-right:3px">${lbl}</button>`;
    }).join('');
    detail=`<div class="sec" style="margin-top:12px">
      <div class="sec-hdr" style="background:#E9E9E9">
        <div class="sec-hdr-l">📋 ${esc(sv)} — ${items.length} 筆 &nbsp; ${blkBtns}</div>
        <button class="btn btn-pdf no-print" onclick="printVendorPDF('${esc(sv)}')">🖨 PDF</button>
      </div>${tblHTML(items,true)}</div>`;
  }
  document.getElementById('pane-vendor').innerHTML=`
    <!-- 廠商清單管理：可收展標題列 -->
    <div style="border:1.5px solid ${_vendorEditorOpen?'var(--purple)':'var(--border)'};border-radius:var(--r);margin-bottom:12px;overflow:hidden">
      <div onclick="toggleVendorEditor()" style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:${_vendorEditorOpen?'#EEEDFE':'var(--surface)'};cursor:pointer;user-select:none">
        <span style="font-size:13px;font-weight:600;color:${_vendorEditorOpen?'var(--purple)':'var(--text)'}">✏️ 廠商清單管理</span>
        <span style="font-size:16px;color:var(--text3);transform:rotate(${_vendorEditorOpen?'180':'0'}deg);transition:transform .2s">▼</span>
      </div>
      ${_vendorEditorOpen?`<div style="padding:12px 14px;border-top:1px solid var(--border2)">
        ${vendorEditorHTML()}
      </div>`:''}
    </div>
    <!-- 廠商卡片區（全寬，一列5個） -->

function renderCal(){
  const base=new Date(TODAY);

  const lbl=`${cells[0].getFullYear()}年 ${fmtMD(_isoL(cells[0]))} — ${fmtMD(_isoL(cells[13]))}`;
  const dateMap={};
  const addEv=(ds,type,r)=>{if(!ds)return;const k=ds.slice(0,10);if(!dateMap[k])dateMap[k]=[];dateMap[k].push({type,r});};
  S.rows.forEach(r=>{addEv(r.planIn,'in',r);addEv(r.planDone,'done',r);addEv(r.actualDone,'ad',r);});
  const ovRows=S.rows.filter(r=>getStatus(r)==='overdue');

      <span><span class="ldot" style="background:#CECBF6"></span>實際完成</span>

  ['一','二','三','四','五','六','日'].forEach((h,i)=>cal+=`<div class="cal-dow${i>=5?' wknd':''}">${h}</div>`);
  cells.forEach((cd,i)=>{

      }

        const gid=`cg_${iso.replace(/-/g,'')}_${gi++}`;
        evH+=`<div class="cal-ev" onclick="const d=document.getElementById('${gid}');const a=this.querySelector('.cal-arrow');if(d.style.display==='none'){d.style.display='';a.style.transform='rotate(90deg)'}else{d.style.display='none';a.style.transform='rotate(0deg)'}" style="background:${vc}22;color:${vc};cursor:pointer;display:flex;align-items:center;gap:3px"><span class="cal-arrow" style="font-size:8px;display:inline-block;transition:transform .15s">▶</span>${esc(ev.r.vendor)}</div><div id="${gid}" style="display:none">`;

      const sumUnit=esc(ev.r.unit).slice(0,6);
      const sumIssue=esc(ev.r.issue).slice(0,5);

        <button class="btn btn-pdf no-print" onclick="printSection('已逾期',pdfTable(S.rows.filter(r=>getStatus(r)==='overdue'),true))">🖨 PDF</button>
      </div>
      ${Object.entries(ovByV).map(([vn,vr])=>`
        <div style="margin:6px 8px;border:1px solid var(--border2);border-radius:7px;overflow:hidden">
          <div style="background:#FFF4F4;padding:5px 10px;font-size:11px;font-weight:600;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:6px">

            ${['管理人','戶別','樓層','缺失','預計完成','區域'].map(h=>`<th style="padding:4px 7px;font-size:10px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border2)">${h}</th>`).join('')}

            <td style="padding:4px 7px;color:var(--text2)">${esc(r.manager)||'—'}</td>

            <td style="padding:4px 7px;text-align:center">${esc(r.floor)}</td>
            <td style="padding:4px 7px">${esc(r.issue)}</td>
            <td style="padding:4px 7px;text-align:center;color:var(--red);font-weight:600">${fmtMD(r.planDone)}</td>
            <td style="padding:4px 7px"><span style="font-size:10px;padding:2px 5px;border-radius:8px;background:${zColor(r.zone)}22;color:${zColor(r.zone)}">${esc(zLabel(r.zone))}</span></td>
          </tr>`).join('')}</tbody></table>
        </div>`).join('')}
    </div>`;
  }
  document.getElementById('pane-cal').innerHTML=`

let _zoneEditorOpen=false;
function toggleZoneEditor(){_zoneEditorOpen=!_zoneEditorOpen;renderZones();}
function renderZones(){
  const zone=S.zones.find(z=>z.id===activeZone)||S.zones[0];if(!zone)return;
  const selV=zoneSelVendor[activeZone]||null;
  const zoneRows=S.rows.filter(r=>r.zone===activeZone);
  const zoneSort=window._zoneSort||'manual';
  let sortedZoneCards=[...S.zones];
  if(zoneSort==='az')sortedZoneCards=[...S.zones].sort((a,b)=>a.label.localeCompare(b.label,'zh-TW'));
  const zoneStats=sortedZoneCards.map(z=>{
    const _isC=r=>r.compId!=null;const _seenZC=new Set();const zd=[...(S.completed||[]),...S.rows].filter(r=>r.zone===z.id).filter(r=>{if(_seenZC.has(r.id))return false;_seenZC.add(r.id);return true;}),zt=zd.length,zdn=zd.filter(r=>_isC(r)).length,zo=zd.filter(r=>!_isC(r)&&getStatus(r)==='overdue').length;
    return{z,zt,zdn,zo};
  });
  const zNotDone100=zoneStats.filter(s=>!(s.zt&&s.zdn===s.zt));
  const zDone100=zoneStats.filter(s=>s.zt&&s.zdn===s.zt).sort((a,b)=>a.z.label.localeCompare(b.z.label,'zh-TW'));
  const summCards=[...zNotDone100,...zDone100].map(({z,zt,zdn,zo})=>{
    const pct=zt?Math.round(zdn/zt*100):0;
    const isDone100=zt>0&&pct===100;
    const cls='zs2-card'+(activeZone===z.id?' sel':'')+(isDone100?' zs2-done100':'');
    return`<div class="${cls}" style="border-left-color:${z.color}" onclick="activeZone='${z.id}';zoneSelVendor={};renderZones()">
      <div class="zs2-title" style="color:${z.color}">${esc(z.label)}</div>
      <div class="zs2-stat">${zt}項・<span style="color:var(--green)">已完成${zdn}</span></div>
      <div class="zs2-stat">${isDone100?'<span style="color:var(--green)">全數完成 ✓</span>':`<span style="color:var(--red)">逾期${zo}</span>`}</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${isDone100?'var(--green)':z.color}"></div></div>
      <div class="prog-lbl">${pct}%</div>
    </div>`;
  }).join('');
  const isCompZ=r=>r.compId!=null;
  const allZoneRows=[...(S.completed||[]),...S.rows].filter(r=>r.zone===activeZone);
  const seenZ=new Set();
  const uniqZoneRows=allZoneRows.filter(r=>{if(seenZ.has(r.id))return false;seenZ.add(r.id);return true;});
  const vmap={};
  uniqZoneRows.forEach(r=>{
    const v=r.vendor||'（未指定）';
    if(!vmap[v])vmap[v]={total:0,done:0,overdue:0,ongoing:0};
    vmap[v].total++;
    if(isCompZ(r))vmap[v].done=(vmap[v].done||0)+1;
    else{const st=getStatus(r);if(vmap[v][st]!=null)vmap[v][st]++;}
  });
  const vEntriesAll=Object.entries(vmap);
  const vcards=vEntriesAll.slice().sort((a,b)=>a[0].localeCompare(b[0],'zh-TW',{numeric:true})).map(([vn,d])=>{
    const col=vColor(vn),sel=selV===vn;
    const pct=d.total?Math.round((d.done||0)/d.total*100):0;
    const isDone100=d.total>0&&pct===100;
    const hasOverdue=(d.overdue||0)>0;
    const cls='vc2'+(sel?' sel':'')+(isDone100?' vc-done100':'')+(hasOverdue?' vc-overdue':'');
    return`<div class="${cls}" onclick="zoneSelVendor[activeZone]=zoneSelVendor[activeZone]==='${esc(vn)}'?null:'${esc(vn)}';renderZones()" title="總項目${d.total}・已完成${d.done||0}・逾期${d.overdue||0}・進行中${d.ongoing||0}">

      <div class="vc2-stat">${d.total}項${isDone100?'・<span style="color:var(--green)">全數完成 ✓</span>':`・<span style="color:var(--green)">${d.done||0}完成</span>`}</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${isDone100?'var(--green)':col}"></div></div>
      <div class="prog-lbl">${pct}%</div>
    </div>`;
  }).join('');
  let detail='';
  if(selV){
    const items=zoneRows.filter(r=>r.vendor===selV);
    detail=`<div class="sec" style="margin-top:12px">
      <div class="sec-hdr" style="background:#E9E9E9">
        <div class="sec-hdr-l">📋 ${esc(zone.label)} ／ ${esc(selV)} — ${items.length} 筆</div>
        <button class="btn btn-pdf no-print" onclick="printZoneVendorPDF('${esc(zone.label)}','${esc(selV)}')">🖨 PDF</button>
      </div>${tblHTML(items,false)}</div>`;
  }
  document.getElementById('pane-zones').innerHTML=`
    <!-- 分區清單管理：可收展標題列 -->
    <div style="border:1.5px solid ${_zoneEditorOpen?'var(--purple)':'var(--border)'};border-radius:var(--r);margin-bottom:12px;overflow:hidden">
      <div onclick="toggleZoneEditor()" style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:${_zoneEditorOpen?'#EEEDFE':'var(--surface)'};cursor:pointer;user-select:none">
        <span style="font-size:13px;font-weight:600;color:${_zoneEditorOpen?'var(--purple)':'var(--text)'}">📁 分區清單管理</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${_zoneEditorOpen?`<button onclick="event.stopPropagation();window._zoneSort='manual';renderZones()" style="font-size:11px;padding:1px 7px;border:1px solid ${zoneSort==='manual'?'var(--purple)':'var(--border)'};background:${zoneSort==='manual'?'#F0EEFF':'var(--card)'};color:${zoneSort==='manual'?'var(--purple)':'var(--text2)'};border-radius:3px;cursor:pointer">手動</button>
          <button onclick="event.stopPropagation();window._zoneSort='az';renderZones()" style="font-size:11px;padding:1px 7px;border:1px solid ${zoneSort==='az'?'var(--purple)':'var(--border)'};background:${zoneSort==='az'?'#F0EEFF':'var(--card)'};color:${zoneSort==='az'?'var(--purple)':'var(--text2)'};border-radius:3px;cursor:pointer">筆劃 A→Z</button>`:''}
          <span style="font-size:16px;color:var(--text3);transform:rotate(${_zoneEditorOpen?'180':'0'}deg);transition:transform .2s">▼</span>
        </div>
      </div>
      ${_zoneEditorOpen?`<div style="padding:12px 14px;border-top:1px solid var(--border2)">
        ${zoneEditorHTML()}
      </div>`:''}
    </div>
    <!-- 分區卡片（全寬一列4個）-->
    <div class="share-bar no-print">🔗 點選右上角「產生分享連結」可將資料分享給同事編輯。</div>
    <div class="bar no-print">
      <button class="btn btn-p" onclick="addRow(activeZone)">＋ 新增項目</button>
      <button class="btn btn-pdf" onclick="printSection('分區：'+zLabel(activeZone),pdfTable(S.rows.filter(r=>r.zone===activeZone),false))">🖨 PDF</button>
      <button class="btn no-print" onclick="zoneSelVendor={};renderZones()" style="font-size:11px;padding:4px 9px">🔄 刷新</button>
    </div>
    <div class="zs-grid2">${summCards}</div>
    ${(()=>{
      const validZoneIds=new Set(S.zones.map(z=>z.id));
      const seenO=new Set();
      const orphans=[...(S.completed||[]),...S.rows].filter(r=>{
        if(seenO.has(r.id))return false;seenO.add(r.id);
        return r.compId!=null&&!validZoneIds.has(r.zone);

      return orphans.length?`<div style="font-size:11px;color:var(--text2);padding:6px 10px;background:#FFF8E6;border:0.5px solid #D4A900;border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;gap:8px">

      </div>`:''
    })()}
    <div style="font-size:12px;font-weight:600;margin-bottom:8px;margin-top:4px">${esc(zone.label)} — 廠商分類（點選展開明細）</div>
    <div class="vcards2" style="grid-template-columns:repeat(5,minmax(0,1fr))">${vcards||'<div class="empty">此分區尚無項目</div>'}</div>
    ${detail?`<div style="margin-top:12px">${detail}</div>`:''}`;
}

function updMgrDetail(name,field,val){
  if(!S.managerDetails[name])S.managerDetails[name]={title:'',duty:''};
  S.managerDetails[name][field]=val;save();
}
function _buildMgrStats(){
  // 一次掃全表，建立各管理人的統計 Map
  const map={};
  S.managers.forEach(m=>{map[m]={total:0,done:0,overdue:0};});
  S.rows.forEach(r=>{
    const m=r.manager;
    if(!m||!map[m])return;
    map[m].total++;
    if(r.actualDone){map[m].done++;}
    else{const d=r.planDone?((new Date(r.planDone)-new Date(new Date().toDateString()))/86400000|0):null;
      if(d!==null&&d<0)map[m].overdue++;}
  });
  return map;
}

    var blob=new Blob([JSON.stringify(payload)],{type:'application/json'});

  const _vcfgHTML = window._VIEW_ONLY ? '' : _viewCfgCardHTML();
  document.getElementById('pane-mgr').innerHTML=`

function _evStatusBadge(diff,inProg){
  let label,bg,col;
  if(diff==null){label='—';bg='var(--surface)';col='var(--text3)';}
  else if(diff>0){label=inProg?'超時中':'超時';bg='#FCEBEB';col='#A32D2D';}
  else if(diff<0){label='提前';bg='#EAF6E7';col='#2E6B26';}
  else{label='準時';bg='#EAF6E7';col='#2E6B26';}
  return '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+bg+';color:'+col+'">'+label+'</span>';
}
function toggleEvSched(){window._evSchedOpen=!window._evSchedOpen;renderEvents();}
function _evScheduleHtml(){
  if(window._evSchedOpen===undefined)window._evSchedOpen=false;
  const evs=S.events||[];const today=todayISO();
  const dd=(a,b)=>{if(!a||!b)return null;const t1=new Date(a),t2=new Date(b);if(isNaN(t1)||isNaN(t2))return null;return Math.round((t2-t1)/86400000);};
  const sign=n=>n>0?('+'+n):(''+n);
  const c=n=>n==null?'var(--text3)':(n>0?'#A32D2D':n<0?'#2E6B26':'var(--text2)');
  let sumPlan=0,sumAct=0,sumDiff=0;
  const rows=evs.map(function(ev){
    const plan=dd(ev.contractStart,ev.contractEnd);
    const inProg=!ev.actualEnd;
    const act=ev.actualStart?dd(ev.actualStart,ev.actualEnd||today):null;
    const diff=(plan!=null&&act!=null)?(act-plan):null;
    const diffPct=(diff!=null&&plan)?Math.round(diff/plan*100):null;
    const delay=ev.contractEnd?(ev.actualEnd?dd(ev.contractEnd,ev.actualEnd):(ev.contractEnd<today?dd(ev.contractEnd,today):null)):null;
    if(plan!=null)sumPlan+=plan;if(act!=null)sumAct+=act;if(diff!=null)sumDiff+=diff;
    const nm=esc(ev.content||ev.unit||'（未命名）');
    const sub=esc([ev.unit,ev.manager].filter(Boolean).join('｜'));
    return '<tr style="border-bottom:0.5px solid var(--border2)">'
      +'<td style="padding:4px 8px"><div style="font-size:12px;font-weight:500">'+nm+'</div>'+(sub?'<div style="font-size:10px;color:var(--text3)">'+sub+'</div>':'')+'</td>'
      +'<td style="text-align:center;padding:4px 8px;font-size:12px">'+(plan!=null?plan+'天':'—')+'</td>'
      +'<td style="text-align:center;padding:4px 8px;font-size:12px">'+(act!=null?(act+'天'+(inProg?' <span style="font-size:9px;color:var(--blue)">進行中</span>':'')):'—')+'</td>'
      +'<td style="text-align:center;padding:4px 8px;font-size:12px;font-weight:600;color:'+c(diff)+'">'+(diff!=null?sign(diff)+'天':'—')+'</td>'
      +'<td style="text-align:center;padding:4px 8px;font-size:12px;font-weight:600;color:'+c(diffPct)+'">'+(diffPct!=null?sign(diffPct)+'%':'—')+'</td>'
      +'<td style="text-align:center;padding:4px 8px;font-size:12px;font-weight:600;color:'+c(delay)+'">'+(delay!=null?sign(delay)+'天':'—')+'</td>'
      +'<td style="text-align:center;padding:4px 8px">'+_evStatusBadge(diff,inProg)+'</td>'
      +'</tr>';
  }).join('');
  const avgPct=sumPlan?Math.round(sumDiff/sumPlan*100):0;
  const head='<tr style="background:var(--surface);color:var(--text2);font-size:11px"><th style="text-align:left;padding:6px 8px">事件</th><th style="padding:6px 8px">預計工期</th><th style="padding:6px 8px">實際工期</th><th style="padding:6px 8px">工期差異</th><th style="padding:6px 8px">差異%</th><th style="padding:6px 8px">完工延誤</th><th style="padding:6px 8px">狀態</th></tr>';
  const foot='<tr style="background:var(--surface);font-weight:700;font-size:12px"><td style="padding:6px 8px">總計／平均</td><td style="text-align:center;padding:6px 8px">'+sumPlan+'天</td><td style="text-align:center;padding:6px 8px">'+sumAct+'天</td><td style="text-align:center;padding:6px 8px;color:'+c(sumDiff)+'">'+sign(sumDiff)+'天</td><td style="text-align:center;padding:6px 8px;color:'+c(avgPct)+'">'+sign(avgPct)+'%</td><td colspan="2"></td></tr>';
  const open=window._evSchedOpen;
  return '<div class="no-print" style="border:1px solid var(--pborder);border-radius:var(--r);margin-top:14px;overflow:hidden">'
    +'<div onclick="toggleEvSched()" style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface);cursor:pointer;user-select:none"><span style="font-size:14px;font-weight:600">⏱ 時程分析（點到點工期 vs 預計）</span><span style="font-size:13px;color:var(--text2)">'+(open?'▾ 收合':'▸ 展開')+'</span></div>'
    +(open?('<div style="overflow-x:auto;padding:4px 8px 10px"><table style="width:100%;border-collapse:collapse;min-width:560px"><thead>'+head+'</thead><tbody>'+(rows||'<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--text3)">尚無事件</td></tr>')+'</tbody><tfoot>'+foot+'</tfoot></table><div style="font-size:10px;color:var(--text3);margin-top:6px">工期＝完成−開始；差異＝實際−預計（＋超時/紅、−提前/綠）；未完成以今天計並標「進行中」。</div></div>'):'')
    +'</div>';
}

function restoreRow(compId){
  const c=S.completed.find(x=>x.compId===compId);
  if(!c)return;
  if(!confirm('確定將此項目移回追蹤總表？'))return;
  const {compId:_c,completedAt:_a,...row}=c;
  S.rows.push(row);
  S.completed=S.completed.filter(x=>x.compId!==compId);
  save();renderAll();toast('已移回追蹤總表');
}
function delCompleted(compId){
  if(!confirm('確定刪除此完成記錄？（可從垃圾桶還原）'))return;
  if(!S.trash)S.trash=[];
  const r=S.completed.find(x=>x.compId===compId);
  if(r){r._deletedAt=new Date().toISOString();r._fromCompleted=true;S.trash.unshift(r);}
  S.completed=S.completed.filter(x=>x.compId!==compId);

}

//  HANDOVER ANALYSIS  ── 交屋狀態表 (Image-1 style)

function hoUnitPct(unit){
  // 確保 cache 包含 completed rows
  if(!_defectCache)_buildDefectCache();
  const rows=getDefectRows(unit);
  if(!rows.length)return null;
  // 完成定義：已移入完成看板(compId存在) OR 明確填入實際完成日期(actualDone)
  const completedCnt=rows.filter(r=>r.compId!=null).length;
  return Math.round(completedCnt/rows.length*100);
}
function hoGrade(pct){
  if(pct===null)return{label:'無資料',color:'#B4B2A9',bg:'#F1EFE8'};
  if(pct===100)return{label:'✅ 可交屋',color:'#3B6D11',bg:'#EAF3DE'};
  if(pct>=90) return{label:'🔵 接近完成',color:'#185FA5',bg:'#E6F1FB'};
  if(pct>=80) return{label:'🟡 進行中',color:'#854F0B',bg:'#FAEEDA'};
  if(pct>=60) return{label:'🟠 待加強',color:'#BA7517',bg:'#FDF3DC'};
  return{label:'🔴 未完成',color:'#A32D2D',bg:'#FCEBEB'};
}
let _hovExpanded=null;
function renderHandover(){
  if(!S.handoverUnits)S.handoverUnits={};
  if(!S.clientData)S.clientData={};
  _buildDefectCache();
  const today=new Date();today.setHours(0,0,0,0);
  const allUnits=[...new Set(S.rows.map(r=>r.unit).filter(Boolean))];
  const cntDelivered=allUnits.filter(u=>S.handoverUnits[u]&&S.handoverUnits[u].delivered).length;
  const cnt100=allUnits.filter(u=>hoUnitPct(u)===100).length;
  const totalUnits=allUnits.length;
  const delivPct=totalUnits?Math.round(cntDelivered/totalUnits*100):0;

  // ── 顯示控制 ──
  if(!window._hovShow)window._hovShow='all'; // 'all'|'A'|'B'|'shop'
  // showA/showB/showShop 在篩選區後面依 _hovFilter.block 計算

  const batchBar=_hstatsSelected.size>0?`<div style="background:#EEEDFE;border:1px solid #AFA9EC;border-radius:var(--rs);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#3C3489;flex-wrap:wrap">
    <strong>已勾選 ${_hstatsSelected.size} 戶</strong>
    <button class="btn btn-p btn-sm" onclick="batchFillInspDate()">批次填寫驗收日</button>
    <button class="btn btn-sm btn-g" onclick="batchMarkDelivered()">批次標記已交屋</button>
    <button class="btn btn-sm" onclick="_hstatsSelected.clear();renderHandover()">✕ 取消</button>
  </div>`:'';

  // ── 分析表等級計算（共用定義）──
  const tiers=[
    {label:'已修繕完畢',pctMin:100,pctMax:100,desc:'可交屋',flexDays:null},
    {label:'缺失項目少且預定完成日期7天內可完成',pctMin:90,pctMax:99,desc:'可排定7天後交屋',flexDays:7},
    {label:'缺失預定完成日期14天內可完成',pctMin:80,pctMax:89,desc:'安排2週後交屋',flexDays:14},
    {label:'追蹤主辦，確認時間工期',pctMin:60,pctMax:79,desc:'追蹤',flexDays:30},
    {label:'檢討時間',pctMin:0,pctMax:59,desc:'無法交屋',flexDays:null},
  ];
  const allPendingWithinDays=(key,days)=>{
    if(!days)return false;
    const dr=getDefectRows(key);
    const pending=dr.filter(r=>r.compId==null);
    if(!pending.length)return false;
    const todayD=new Date();todayD.setHours(0,0,0,0);
    return pending.every(r=>{
      if(!r.planDone)return false;
      const diff=Math.round((new Date(r.planDone)-todayD)/(1000*60*60*24));
      return diff<=days;
    });
  };
  // 只有在需要時（分析表或完成度篩選）才計算 allKeys/unitTierMap
  const _needTierCalc=!!(window._hovFilter&&window._hovFilter.tier);
  const allKeys=[];
  G95_FLOORS.forEach(fl=>{G95_A_COLS.forEach(col=>{const k=G95_RAW_A[col]?G95_RAW_A[col][fl]:null;if(k)allKeys.push({key:k,block:'A'});});});
  G95_FLOORS.forEach(fl=>{G95_B_COLS.forEach(col=>{const k=G95_RAW_B[col]?G95_RAW_B[col][fl]:null;if(k)allKeys.push({key:k,block:'B'});});});
  const unitTierMap=new Map();
  if(_needTierCalc){
    allKeys.forEach(({key})=>{
      const rawPct=hoUnitPct(key)??hoUnitPct(unitDisplayName(key));
      const pct=rawPct===null?0:rawPct;
      let tierIdx=tiers.findIndex(t=>pct>=t.pctMin&&pct<=t.pctMax);
      if(tierIdx<0)tierIdx=tiers.length-1;
      for(let i=0;i<tierIdx;i++){
        const t=tiers[i];
        if(t.pctMin===100)continue;
        if(t.flexDays&&allPendingWithinDays(key,t.flexDays)){tierIdx=i;break;}
      }
      unitTierMap.set(key,tierIdx);
    });
  }
  // ── 格狀單元格 ──
  const MILESTONE_FLOORS=[1,5,10,15,20,25,31];
  // 完成度篩選
  const _hovTierSet=(()=>{
    if(!_needTierCalc)return null;
    const ti=parseInt(window._hovFilter.tier);
    const s=new Set();
    allKeys.forEach(({key})=>{if(unitTierMap.get(key)===ti)s.add(key);});
    return s.size>0?s:null;
  })();
  function cellHTML(key,floor,col){
    if(!key)return`<div style="background:transparent;min-height:64px"></div>`;
    // ── 篩選 ──
    const hf2=window._hovFilter||{};
    const huF=S.handoverUnits[key]||{};
    const todayMs=today.getTime();
    if(hf2.planDate==='has'&&!huF.planDate)return`<div style="background:transparent;min-height:64px"></div>`;
    if(hf2.planDate==='none'&&huF.planDate)return`<div style="background:transparent;min-height:64px"></div>`;
    if(hf2.planDate==='d7'){if(!huF.planDate)return`<div style="background:transparent;min-height:64px"></div>`;const dl2=Math.ceil((new Date(huF.planDate)-todayMs)/86400000);if(dl2<0||dl2>7)return`<div style="background:transparent;min-height:64px"></div>`;}
    if(hf2.planDate==='overdue'){if(!huF.planDate)return`<div style="background:transparent;min-height:64px"></div>`;const dl2=Math.ceil((new Date(huF.planDate)-todayMs)/86400000);if(dl2>=0)return`<div style="background:transparent;min-height:64px"></div>`;}
    if(hf2.dateExact&&huF.planDate!==hf2.dateExact)return`<div style="background:transparent;min-height:64px"></div>`;
    if(hf2.type&&(isOwnerUnit(key)?'地主戶':isBizUnit(key)?'業主戶':'自購戶')!==hf2.type)return`<div style="background:transparent;min-height:64px"></div>`;
    if(_hovTierSet&&!_hovTierSet.has(key))return`<div style="background:transparent;min-height:64px"></div>`;
    const pct=hoUnitPct(unitDisplayName(key))||hoUnitPct(key)||0;
    const grade=hoGrade(pct);
    const hu=S.handoverUnits[key]||{};
    const daysLeft=hu.planDate?Math.ceil((new Date(hu.planDate)-today)/86400000):null;
    const isOwner=isOwnerUnit(key);const isBiz=isBizUnit(key);
    const isSelected=_hstatsSelected.has(key);
    const isExp=_hovExpanded===key;
    const bg=isOwner?'#EEEDFE':isBiz?'#E1F5EE':'var(--surface)';
    const color=isOwner?'#3C3489':isBiz?'#085041':'var(--text2)';
    const outlineStyle=isExp?'outline:2.5px solid var(--purple);':isSelected?'outline:2px solid #185FA5;':'';
    // 顯示完整 key（去掉地/業前綴），委外代驗加 ★
    const dispName=unitDisplayName(key);
    const isCom2=(S.handoverUnits[key]||{}).inspTypes&&(S.handoverUnits[key].inspTypes||[]).includes('委外代驗');
    const delivTick=hu.delivered?`<div style="font-size:8px;color:#3B6D11;line-height:1">✓交屋</div>`:'';
    const urgColor=daysLeft!=null?daysLeft<0?'#A32D2D':daysLeft<=3?'#EF9F27':'#185FA5':'';
    const dateTag=hu.planDate?`<div style="font-size:9px;color:${urgColor};line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hu.planDate.slice(5)}</div>`:'';
    const slotTag=hu.slot?`<div style="font-size:8px;color:var(--text3);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hu.slot.split('–')[0]}</div>`:'';
    return`<div onclick="hovCellClick('${esc(key)}')" style="position:relative;background:${bg};color:${color};${outlineStyle}border-radius:3px;border:1px solid rgba(0,0,0,.07);padding:4px 3px 3px;cursor:pointer;text-align:center;line-height:1.2;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:1px">
      <div style="font-size:11px;font-weight:600">${esc(dispName)}${isCom2?' <span style="color:#D4A900;font-size:10px">★</span>':''}</div>
      ${inspIconBadges(key)}
      <div style="font-size:10px;font-weight:500;color:${grade.color}">${pct}%</div>
      ${dateTag}${slotTag}${delivTick}
      <div style="width:100%;height:3px;background:rgba(0,0,0,.1);border-radius:1px;margin-top:auto"><div style="height:3px;width:${pct}%;background:${grade.color};border-radius:1px"></div></div>
    </div>`;
  }

  // ── 欄標與格狀表 ──
  const MILESTONE_BELOW_H=new Set([5,10,15,20,25,31]);
  function buildGrid(rawData,cols,blockId){
    const colHdrs=cols.map(c=>`<div style="font-size:13px;text-align:center;color:var(--text2);font-weight:600;padding:3px 0">${c}</div>`).join('');
    const gridCols=`28px repeat(${cols.length},1fr)`;
    const rows=G95_FLOORS.map(fl=>{
      const flNum=Number(fl);
      const addSep=MILESTONE_BELOW_H.has(flNum);
      const cells=cols.map(col=>{
        const raw=rawData[col];
        return cellHTML(raw?raw[fl]:null,fl,col);
      }).join('');
      const expandKey=cols.map(col=>{const raw=rawData[col];return raw?raw[fl]:null;}).find(k=>k&&_hovExpanded===k);
      const expandDiv=expandKey?`<div style="grid-column:1/-1;margin:2px 0" id="hov-expand-${esc(expandKey)}">${buildExpandCard()}</div>`:'';
      return`<div style="display:contents">
        <div style="font-size:12px;color:var(--text3);text-align:right;padding-right:4px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:4px;font-weight:500">${fl}</div>
        ${cells}
      </div>
      ${addSep?`<div style="grid-column:1/-1;height:0;border-bottom:2.5px solid #C8C5C0;margin:2px 0"></div>`:''}

    return`<div>

      </div>
      <div style="display:grid;grid-template-columns:${gridCols};gap:4px">

    </div>`;
  }

function toggleHovDatePicker(btn){

  },{once:true}),50);
}
function hovCellClick(key){

function isOwnerUnit(key){

}

function _bslParseTokens(raw){
  return raw.split(/[、,，;；\s]+/).map(t=>t.trim()).filter(Boolean).map(t=>{
    let star=false,name=t;
    if(/[*＊]+$/.test(name)){star=true;name=name.replace(/[*＊]+$/,'').trim();}
    return {raw:t,name,star};
  });
}
function _bslLookup(){
  const map=new Map();
  _allUnitKeys().forEach(k=>{const dn=unitDisplayName(k);map.set(String(k).toUpperCase(),k);map.set(String(dn).toUpperCase(),k);});
  return map;
}

// ── 抓取此日期/時段目前戶別，帶入可勾選清單（V0701-07，取代手動打字＋可個別取消勾選）──────
function bslFillFromSlot(ns){
  const g=id=>document.getElementById(id+'-'+ns);
  const date=(g('bsl-date')||{}).value||'';
  const slot=(g('bsl-slot')||{}).value||'';
  const clean=(g('bsl-clean')||{}).value||'';
  if(!date){toast('請先選日期（時段留空＝抓當天所有時段）','⚠️');return;}
  if(!S.handoverUnits)S.handoverUnits={};
  // 排清潔時抓「清潔預定日」的戶別；否則抓「交屋驗收日」的戶別
  const _sc=clean&&clean.charAt(0)==='p';const _fld=_sc?'cleanPlanDate':'planDate';const _sfld=_sc?'cleanSlot':'slot';
  const keys=Object.entries(S.handoverUnits).filter(([k,hu])=>hu&&hu[_fld]===date&&(!slot||hu[_sfld]===slot)).map(([k])=>k);
  if(!keys.length){toast('該日期'+(slot?'／時段':'')+'目前沒有任何戶別','⚠️');return;}
  keys.sort((a,b)=>String(a).localeCompare(String(b),'zh-TW',{numeric:true}));
  const items=keys.map(k=>({key:k,owner:_ownerOf(k),checked:true,star:false}));
  window._bslOwner={ns,items,notfound:[],title:'📥 目前排在 '+date+(slot?' '+slot:'')+' 的戶別（預設全選，錯的留著、正確的取消勾選再操作）'};
  _bslRenderOwnerBox();
  toast('已帶入 '+keys.length+' 戶（'+date+(slot?' '+slot:'')+'），全部預設勾選，請把正確的取消勾選後再套用/清除','📥');
}
function bslClearChecked(ns){
  const o=window._bslOwner;if(!o||!o.items)return;
  const sel=o.items.filter(it=>it.checked);

function cwGenerate(){

  const todo=[];const noZone=[];
  list.forEach(it=>{
    if(_cwUnsel[it.key])return;
    if(_cwExistOpenCleanRow(it.key))return;
    const zone=_cwZonePick[it.key]||_cwZoneOf(it.key);
    if(!zone){noZone.push(unitDisplayName(it.key));return;}
    todo.push({key:it.key,zone,pd:_cwPlanDone(it.hu.planDate)});
  });

  if(!confirm('將在追蹤總表新增 '+todo.length+' 筆清潔工作（可用「復原上一批」還原）？'))return;
  window._cwUndo={rows:JSON.parse(JSON.stringify(S.rows)),nextId:S.nextId};

async function _pwoFillPdf(pdf,vendors,byV,ver){
  let first=true;
  for(const v of vendors){
    const rowsArr=_pwoPdfRowsArr(byV[v]);
    const PER=16;const chunks=[];for(let i=0;i<rowsArr.length;i+=PER)chunks.push(rowsArr.slice(i,i+PER));if(!chunks.length)chunks.push([]);
    const N=chunks.length;
    const sub=esc(v)+'　'+_pwoRound+' 未完成缺失　共 '+byV[v].length+' 筆　版次 '+ver;
    const colHead=_pwoPdfColHead();
    for(let p=0;p<N;p++){
      if(!first)pdf.addPage('a4','landscape');first=false;
      const cv=await _pwoRenderCanvas(_pwoPageHTML(v,sub,colHead,chunks[p].join(''),(p+1)+'/'+N));
      const pageW=pdf.internal.pageSize.getWidth(),pageH=pdf.internal.pageSize.getHeight();
      const imgW=pageW-40;let imgH=cv.height*(imgW/cv.width);if(imgH>pageH-40)imgH=pageH-40;
      pdf.addImage(cv.toDataURL('image/jpeg',0.92),'JPEG',20,20,imgW,imgH);
    }
  }
}

            <th style="padding:4px 8px;text-align:center;border:1px solid var(--border);border-left:2px solid var(--purple);font-size:10px;color:var(--purple)">地主</th>
            <th style="padding:4px 8px;text-align:center;border:1px solid var(--border);font-size:10px;color:var(--purple)">自購</th>
            <th style="padding:4px 8px;text-align:center;border:1px solid var(--border);font-size:10px;color:var(--purple)">業主</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`:''}
  </div>`;

  const fFloors=_hstatsFloors;
  const fType=_hstatsType;
  const fBlock=_hstatsBlock;
  const fUnitCols=_hstatsUnitCols;
  const fPlanDate=_hstatsPlanDate;
  const fDateExact=window._hstatsDateExact||'';
  const today2=new Date();today2.setHours(0,0,0,0);
  const flLabel=fFloors.size>0?`樓層（已選 ${fFloors.size}）`:'樓層';
  const blockLabel=fBlock.size>0?`棟別（已選 ${fBlock.size}）`:'棟別';
  const colLabel=fUnitCols.size>0?`戶別（已選 ${fUnitCols.size}）`:'戶別';
  const planDateLabel=fPlanDate?({has:'已設驗收日',none:'未設驗收日',overdue:'驗收日逾期',d7:'7天內驗收'}[fPlanDate]||'預定驗收日'):'預定驗收日';
  const allUnitCols=[...G95_A_COLS,...G95_B_COLS];

  // ── Build card list: A棟 | B棟 ────────────────────────────────────────
  const today=new Date();today.setHours(0,0,0,0);
  function buildUnitCard(key,floor,colId,blockId){
    if(!key)return'';
    const flStr=String(floor);
    if(fFloors.size>0&&!fFloors.has(flStr))return'';
    if(fBlock.size>0&&blockId&&!fBlock.has(blockId))return'';
    if(fUnitCols.size>0&&colId&&!fUnitCols.has(colId))return'';
    const uType=isOwnerK(key)?'地主戶':isBizK(key)?'業主戶':'自購戶';
    if(fType&&uType!==fType)return'';
    // 預定驗收日篩選
    if(fPlanDate){
      const hu2=S.handoverUnits[key]||{};
      if(fPlanDate==='has'&&!hu2.planDate)return'';
      if(fPlanDate==='none'&&hu2.planDate)return'';
      if(fPlanDate==='overdue'){if(!hu2.planDate)return'';const dl=Math.ceil((new Date(hu2.planDate)-today2)/86400000);if(dl>=0)return'';}
      if(fPlanDate==='d7'){if(!hu2.planDate)return'';const dl=Math.ceil((new Date(hu2.planDate)-today2)/86400000);if(dl<0||dl>7)return'';}
    }
    // 精確日期篩選
    if(fDateExact){const hu2=S.handoverUnits[key]||{};if(hu2.planDate!==fDateExact)return'';}
    // 時段篩選
    const _ts=window._hstatsTs;
    if(_ts&&_ts.size>0){const hu2=S.handoverUnits[key]||{};if(!_ts.has(hu2.slot||''))return'';}
    const hu=S.handoverUnits[key]||{};
    const cl=S.clientData[key]||{};
    const displayName=unitDisplayName(key);
    const pct=hoUnitPct(displayName)||hoUnitPct(key);
    const grade=hoGrade(pct);
    const daysLeft=hu.planDate?Math.ceil((new Date(hu.planDate)-today)/86400000):null;
    const overdueInsp=hu.planDate&&daysLeft<0&&!hu.delivered;
    const urgentInsp=hu.planDate&&daysLeft!=null&&daysLeft>=0&&daysLeft<=3&&!hu.delivered;
    const isExp=_expandedUnit===key;
    const isOwner=isOwnerK(key);const isBiz=isBizK(key);
    const typeBg=isOwner?'background:#EEEDFE;':isBiz?'background:#E1F5EE;':'background:var(--card);';
    const cardBorder=isExp?'border:2px solid var(--purple);':'border:1px solid var(--border);';
    let warnHtml='';
    if(hu.planDate){
      if(overdueInsp) warnHtml=`<div style="margin-top:5px;font-size:10px;color:#791F1F;background:#FCEBEB;border-radius:4px;padding:3px 7px;display:flex;align-items:center;gap:4px">⚠ 驗收日 ${hu.planDate} — 還有 ${daysLeft} 天，完成度不足</div>`;
      else if(urgentInsp) warnHtml=`<div style="margin-top:5px;font-size:10px;color:#633806;background:#FAEEDA;border-radius:4px;padding:3px 7px;display:flex;align-items:center;gap:4px">⏰ 驗收日 ${hu.planDate} — 還有 ${daysLeft} 天</div>`;
    }
    let expandHtml='';
    if(isExp){
      const insps=hu.inspections||[];
      const inspCols=insps.map((ins,i)=>{
        const isDone=!!ins.date;
        return`<div style="display:flex;flex-direction:column;gap:2px">
          <span style="font-size:10px;color:var(--text2)">${esc(ins.label)}</span>
          <div style="display:flex;align-items:center;gap:3px">
            <input type="date" value="${esc(ins.date||'')}" onchange="setHuFieldH('${esc(key)}',${i},this.value)" style="font-size:10px;padding:2px 4px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);${isDone?'color:var(--green);border-color:var(--green)':''}">
            <button class="btn btn-sm btn-d" onclick="event.stopPropagation();delHuInspH2('${esc(key)}',${i})" style="padding:1px 4px;font-size:9px">—</button>
          </div>
        </div>`;
      }).join('');
      const staticPark=G95_PARKING[key]||[];
      const allPark=[...new Set([...staticPark,...(cl.parkings||[])])];
      const parkChips=allPark.length?allPark.map(p=>`<span style="font-size:10px;padding:1px 6px;background:#E6F1FB;color:#0C447C;border-radius:20px;display:inline-flex;align-items:center;gap:3px">🚗 ${esc(p)} <input type="checkbox" title="已驗收" ${(hu.parkChecked||{})[p]?'checked':''} onchange="setHuParkCheck('${esc(key)}','${esc(p)}',this.checked)" style="accent-color:var(--green);cursor:pointer"></span>`).join(''):'';
      expandHtml=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)">
        ${inspCheckRow(key)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px">
          <div><span style="font-size:10px;color:var(--text2)">客戶姓名</span><br><input value="${esc(cl.name||'')}" placeholder="姓名" onchange="setCl('${esc(key)}','name',this.value)" onclick="event.stopPropagation()" style="width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);margin-top:2px"></div>
          <div><span style="font-size:10px;color:var(--text2)">電話</span><br><input value="${esc(cl.tel||'')}" placeholder="電話" onchange="setCl('${esc(key)}','tel',this.value)" onclick="event.stopPropagation()" style="width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);margin-top:2px"></div>
        </div>
        ${parkChips?`<div style="margin-bottom:7px;display:flex;flex-wrap:wrap;gap:4px">${parkChips}</div>`:''}
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text2)">驗屋方式：</span>
          <label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer" onclick="event.stopPropagation()"><input type="checkbox" ${(hu.inspTypes||[]).includes('自驗')?'checked':''} onchange="setHuInspType('${esc(key)}','自驗',this.checked)"> 自驗</label>
          <label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer" onclick="event.stopPropagation()"><input type="checkbox" ${(hu.inspTypes||[]).includes('委外代驗')?'checked':''} onchange="setHuInspType('${esc(key)}','委外代驗',this.checked)"> 委外代驗 ★</label>
        </div>
        <div style="display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap">
          <div style="display:flex;flex-direction:column;gap:2px">
            <span style="font-size:10px;color:var(--text2)">預定驗收</span>
            <input type="date" value="${esc(hu.planDate||'')}" onchange="setHuField('${esc(key)}','planDate',this.value)" onclick="event.stopPropagation()" style="font-size:10px;padding:2px 4px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font)">
          </div>
          <div style="display:flex;flex-direction:column;gap:2px">
            <span style="font-size:10px;color:var(--text2)">驗收時段</span>
            <select onchange="setHuField('${esc(key)}','slot',this.value)" onclick="event.stopPropagation()" style="font-size:10px;padding:2px 5px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font)">
              <option value="" ${!hu.slot?'selected':''}>— 未設定 —</option>
              <option value="09:00–10:20" ${hu.slot==='09:00–10:20'?'selected':''}>09:00–10:20</option>
              <option value="10:30–11:50" ${hu.slot==='10:30–11:50'?'selected':''}>10:30–11:50</option>
              <option value="14:00–15:20" ${hu.slot==='14:00–15:20'?'selected':''}>14:00–15:20</option>
              <option value="15:30–16:50" ${hu.slot==='15:30–16:50'?'selected':''}>15:30–16:50</option>
            </select>
          </div>
          ${inspCols}
          <button class="btn btn-sm" onclick="event.stopPropagation();addHuInspH2('${esc(key)}')" style="padding:2px 6px;align-self:flex-end;font-size:10px">＋</button>
          <button class="btn btn-sm btn-g" onclick="event.stopPropagation();toggleDeliveredH('${esc(key)}')" style="align-self:flex-end;padding:2px 8px;font-size:10px">${hu.delivered?'取消交屋':'🏠 已交屋'}</button>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:10px;font-weight:600">📋 缺失清單</span>
            ${(()=>{const dr=getDefectRows(key);const dt=dr.length;const dp=dr.filter(r=>r.compId==null).length;return dt?`<span style="padding:1px 7px;border-radius:20px;font-size:10px;background:${dp>0?'#FCEBEB':'#EAF3DE'};color:${dp>0?'#791F1F':'#3B6D11'};font-weight:600">未完成 ${dp}／總缺失 ${dt}</span>`:''})()}
            <button class="btn btn-sm btn-pdf no-print" onclick="event.stopPropagation();printUnitDefects('${esc(key)}')" style="margin-left:auto;font-size:10px">🖨 PDF</button>
          </div>
          ${buildUnitDefectTable(key)}
        </div>
      </div>`;
    }
    const chk=_hstatsSelected.has(key);
    // 驗收日期行（直接顯示，不需點開）
    const inspsAll=hu.inspections||[];
    // 車位
    const staticPark2=G95_PARKING[key]||[];
    const allPark3=[...new Set([...staticPark2,...(cl.parkings||[])])];
    const parkBadge=allPark3.length?`<span style="font-size:10px;color:#0C447C;background:#E6F1FB;border-radius:20px;padding:1px 6px">🚗 ${allPark3.join('、')}</span>`:'';
    let dateRowHtml='';
    if(hu.planDate||inspsAll.length){
      const planTag=hu.planDate?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:#EBF4FF;color:#185FA5;border-radius:20px">📅 預定 ${hu.planDate}${daysLeft!=null&&!hu.delivered?`（${daysLeft>=0?daysLeft+'天後':'逾期'+Math.abs(daysLeft)+'天'}）`:''}</span>`:'';
      const inspTags=inspsAll.map(ins=>`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:${ins.date?'#EAF3DE':'var(--surface)'};color:${ins.date?'#3B6D11':'var(--text3)'};border-radius:20px">${esc(ins.label)} ${ins.date?ins.date:'—'}</span>`).join('');
      const delivTag=hu.delivered?`<span style="font-size:10px;padding:1px 7px;background:#EAF3DE;color:#3B6D11;border-radius:20px">🏠 已交屋</span>`:'';
      const slotTag=hu.slot?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;background:#F0EEFF;color:#3C3489;border-radius:20px">🕐 ${hu.slot}</span>`:'';
      const _ds=inspDoneStatus(hu);const statusTag=`<span style="font-size:10px;padding:1px 7px;background:${_ds.type?'#EDF7FF':'#F3F3F3'};color:${_ds.color};border-radius:20px;font-weight:600">${_ds.label}${_ds.date?'（'+String(_ds.date).slice(5)+'）':''}</span>`;
      dateRowHtml=`<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${statusTag}${planTag}${slotTag}${inspTags}${delivTag}</div>`;
    }
    return`<div style="${typeBg}${cardBorder}border-radius:var(--r);padding:8px 10px;margin-bottom:5px;cursor:default" onclick="if(event.target.closest('input,button,select'))return;toggleHUnit('${esc(key)}')">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <input type="checkbox" ${chk?'checked':''} onclick="event.stopPropagation()" onchange="toggleHStatsSel('${esc(key)}',this.checked)">
        <span style="font-size:12px;font-weight:600">${esc(displayName)}${((S.handoverUnits[key]||{}).inspTypes||[]).includes('委外代驗')?'<span style="color:#D4A900;font-size:11px"> ★</span>':''}</span>
        <span style="font-size:11px;color:var(--text3)">${floor}F</span>
        ${isOwner?`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:#EEEDFE;color:#3C3489">地主</span>`:isBiz?`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:#E1F5EE;color:#085041">業主</span>`:''}
        ${cl.name?`<span style="font-size:10px;color:var(--text2)">${esc(cl.name)}</span>`:''}
        <div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end">
          <div style="width:80px;height:6px;background:#E7E7E7;border-radius:3px;overflow:hidden;flex-shrink:0">
            <div style="height:6px;width:${pct??0}%;background:${grade.color};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:${grade.color}">${pct??'—'}%</span>
        </div>
      </div>
      ${warnHtml}
      ${parkBadge?`<div style="margin-top:4px">${parkBadge}</div>`:''}
      ${dateRowHtml}${expandHtml}
    </div>`;
  }

  // ── 共用格子建構器 ───────────────────────────────────────────────────
  const today3=new Date();today3.setHours(0,0,0,0);
  function makeGridCell(key,fl,col,blockId,extraStyle){
    if(!key)return`<div style="background:transparent;min-height:64px"></div>`;
    const hu=S.handoverUnits[key]||{};
    // 篩選
    if(fFloors.size>0&&!fFloors.has(String(fl)))return`<div style="background:transparent;min-height:64px"></div>`;
    if(fUnitCols.size>0&&col&&!fUnitCols.has(col))return`<div style="background:transparent;min-height:64px"></div>`;
    if(fType&&(isOwnerK(key)?'地主戶':isBizK(key)?'業主戶':'自購戶')!==fType)return`<div style="background:transparent;min-height:64px"></div>`;
    if(fPlanDate==='has'&&!hu.planDate)return`<div style="background:transparent;min-height:64px"></div>`;
    if(fPlanDate==='none'&&hu.planDate)return`<div style="background:transparent;min-height:64px"></div>`;
    if(fDateExact&&hu.planDate!==fDateExact)return`<div style="background:transparent;min-height:64px"></div>`;
    const _ts=window._hstatsTs;if(_ts&&_ts.size>0&&!_ts.has(hu.slot||''))return`<div style="background:transparent;min-height:64px"></div>`;
    const bg=isOwnerK(key)?'#EEEDFE':isBizK(key)?'#E1F5EE':'var(--surface)';
    const color=isOwnerK(key)?'#3C3489':isBizK(key)?'#085041':'var(--text2)';
    const isExp=_expandedUnit===key;
    const isSel=_hstatsSelected.has(key);
    const outlineStyle=isExp?'outline:2.5px solid var(--purple);':isSel?'outline:2px solid #185FA5;':'';
    const dispName=(col&&(blockId==='A'||blockId==='B'))?`${col}-${fl}`:(col||unitDisplayName(key));
    const isCom=(S.handoverUnits[key]||{}).inspTypes&&(S.handoverUnits[key].inspTypes||[]).includes('委外代驗');
    const pct=hoUnitPct(unitDisplayName(key))||hoUnitPct(key)||0;
    const grade=hoGrade(pct);
    const daysLeft=hu.planDate?Math.ceil((new Date(hu.planDate)-today3)/86400000):null;
    const delivTick=hu.delivered?`<div style="font-size:8px;color:#3B6D11;line-height:1">✓交屋</div>`:'';
    const urgColor=daysLeft!=null?daysLeft<0?'#A32D2D':daysLeft<=3?'#EF9F27':'#185FA5':'';
    const dateTag=hu.planDate?`<div style="font-size:9px;color:${urgColor};line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hu.planDate.slice(5)}</div>`:'';
    const slotTag=hu.slot?`<div style="font-size:8px;color:var(--text3);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${hu.slot.split('–')[0]}</div>`:'';
    // 車位直接顯示編號（每個一行，空間不夠則截斷）
    const cl2=S.clientData&&S.clientData[key]||{};
    const allPark2=[...new Set([...(G95_PARKING[key]||[]),...(cl2.parkings||[])])];
    const parkTag=allPark2.length?allPark2.map(p=>`<div style="font-size:8px;color:#0C447C;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🚗${esc(p)}</div>`).join(''):'';
    return`<div onclick="toggleHUnit('${esc(key)}')" style="position:relative;background:${bg};color:${color};${outlineStyle}border-radius:3px;border:1px solid rgba(0,0,0,.07);padding:4px 3px 3px;cursor:pointer;text-align:center;line-height:1.2;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:1px;${extraStyle||''}">
      <div style="font-size:11px;font-weight:600;white-space:nowrap">${esc(dispName)}${isCom?' <span style="color:#D4A900;font-size:10px">★</span>':''}</div>
      ${inspIconBadges(key)}
      ${parkTag}
      <div style="font-size:10px;font-weight:500;color:${grade.color}">${pct}%</div>
      ${dateTag}${slotTag}${delivTick}
      <div style="width:100%;height:3px;background:rgba(0,0,0,.1);border-radius:1px;margin-top:auto"><div style="height:3px;width:${pct}%;background:${grade.color};border-radius:1px"></div></div>
    </div>`;
  }

  // 分隔線邏輯：在 5/10/15/20/25/31 的「下方」加粗線，即這些樓層的 margin-bottom
  // MILESTONE_BELOW = 樓層下方要加分隔線的樓層（例如 5F 下方→5和4之間加線）
  const MILESTONE_BELOW=new Set([5,10,15,20,25,31]);

  function buildCol2(rawData,cols,title,blockId,showFloorCol){
    if(showFloorCol===undefined)showFloorCol=true;
    const colHdrs=(showFloorCol?`<div></div>`:'')+cols.map(c=>`<div style="font-size:13px;text-align:center;color:var(--text2);font-weight:600;padding:3px 0">${c}</div>`).join('');
    const gridCols=showFloorCol?`28px repeat(${cols.length},1fr)`:`repeat(${cols.length},1fr)`;
    const rows=G95_FLOORS.map(fl=>{
      const flNum=Number(fl);
      const addSep=MILESTONE_BELOW.has(flNum);
      const cells=cols.map(col=>{
        const raw=rawData[col];const key=raw?raw[fl]:null;
        return makeGridCell(key,fl,col,blockId,'height:100%');
      }).join('');
      const expandKey=cols.map(col=>{const raw=rawData[col];return raw?raw[fl]:null;}).find(k=>k&&_expandedUnit===k);
      const expandDiv=expandKey?`<div style="margin:2px 0" id="hu-expand-${esc(expandKey)}">${buildExpandedUnit(expandKey)}</div>`:'';
      const sepStyle=addSep?'padding-bottom:4px;border-bottom:2.5px solid #C8C5C0;margin-bottom:4px;':'';
      const flCell=showFloorCol?`<div style="font-size:12px;color:var(--text3);text-align:right;padding-right:4px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:4px;font-weight:500">${fl}</div>`:'';
      return`<div style="display:grid;grid-template-columns:${gridCols};gap:4px;align-items:stretch;${sepStyle}">
        ${flCell}
        ${cells}
      </div>
      ${expandDiv}`;
    }).join('');
    return`<div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:var(--text2);padding:5px 8px;background:var(--surface);border-radius:var(--rs);margin-bottom:6px">${title}</div>
      <div style="display:grid;grid-template-columns:${gridCols};gap:4px;margin-bottom:4px">${colHdrs}</div>
      <div style="display:flex;flex-direction:column;gap:4px">${rows}</div>
    </div>`;
  }

  // ── Shop section ─────────────────────────────────────────────────────
  const shopList=[
    {key:'地A1-1',col:'店A1'},{key:'A2-1',col:'店A2'},{key:'A3-1',col:'店A3'},

function quickCompleteDefect(id){
  const r=S.rows.find(x=>x.id===id);
  if(!r)return;
  if(!r.actualDone)r.actualDone=todayISO();
  if(!r.actualIn)r.actualIn=r.planIn||todayISO();
  S.completed.push({...r,compId:S.nextCompId++,completedAt:todayISO()});
  S.rows=S.rows.filter(x=>x.id!==id);
  save();renderAll();
}
function buildUnitDefectTable(unitKey){
  if(!unitKey)return`<div style="font-size:11px;color:var(--text3);padding:4px 0">此戶目前無缺失項目記錄</div>`;
  const allRows=getDefectRows(unitKey);
  if(!allRows.length)return`<div style="font-size:11px;color:var(--text3);padding:4px 0">此戶目前無缺失項目記錄</div>`;
  // 以 compId 判斷是否已完成（S.completed 的物件有 compId）
  const isComp=r=>r.compId!=null;
  const sortByVendor=(a,b)=>(a.vendor||'').localeCompare(b.vendor||'','zh-TW');
  // 未完成在上（A-Z），已完成在下（A-Z）
  const rows=[
    ...allRows.filter(r=>!isComp(r)).sort(sortByVendor),
    ...allRows.filter(r=>isComp(r)).sort(sortByVendor),
  ];
  const thead=`<tr style="background:#E9E9E9"><th style="padding:5px 6px;font-size:11px;font-weight:600;width:36px">完成</th><th style="padding:5px 6px;font-size:11px;font-weight:600;width:24px">#</th><th style="padding:5px 6px;font-size:11px;font-weight:600">廠商</th><th style="padding:5px 6px;font-size:11px;font-weight:600">缺失內容</th><th style="padding:5px 6px;font-size:11px;font-weight:600">預計完成</th><th style="padding:5px 6px;font-size:11px;font-weight:600">狀態</th></tr>`;
  const tbody=rows.map((r,idx)=>{
    const done=isComp(r);
    const st=done?'done':getStatus(r);
    const stLabel={done:'已完成',ongoing:'進行中',overdue:'逾期',pending:'未開始'}[st]||'';
    const stColor={done:var_green,ongoing:var_blue,overdue:var_red,pending:'var(--text3)'}[st]||'';
    const rowBg=done?'background:rgba(59,109,17,.04);':st==='overdue'?'background:rgba(163,45,45,.04);':'';

// ── Defect lookup cache（renderHandover/renderHStats 開頭呼叫 _buildDefectCache() 建立）──
let _defectCache=null;
function _buildDefectCache(){
  _defectCache=new Map(); // key: r.unit.trim() → rows[]
  if(!S.rows)return;
  // S.rows 優先（最新 vendor/資料）；S.completed 補充已完成項
  // 同 ID 只保留一筆，避免在追蹤總表改廠商後 hpend 仍顯示舊廠商
  const seenIds=new Set();
  const allRows=[...S.rows,...(S.completed||[])];
  allRows.forEach(r=>{
    if(!r.unit)return;
    if(r.id!=null&&seenIds.has(r.id))return;
    if(r.id!=null)seenIds.add(r.id);
    const k=String(r.unit).trim();
    if(!_defectCache.has(k))_defectCache.set(k,[]);
    _defectCache.get(k).push(r);
  });
}
function getDefectRows(unitKey){
  if(!unitKey||!S.rows)return[];
  const displayName=unitDisplayName(unitKey);
  const m=displayName.match(/^([A-Za-z]+\d*)-(\d+)$/);
  const col=m?m[1].toUpperCase():'';
  const flr=m?m[2]:'';
  const seen=new Set();const result=[];
  function addRows(rows){if(!rows)return;rows.forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);result.push(r);}});}
  // 優先從 cache 查，沒有 cache 就掃全表
  const source=_defectCache||new Map(S.rows.map(r=>{const k=String(r.unit||'').trim();return[k,_defectCache?.get(k)||[]]}));
  const db=_defectCache?_defectCache:(()=>{const m2=new Map();S.rows.forEach(r=>{const k=String(r.unit||'').trim();if(!m2.has(k))m2.set(k,[]);m2.get(k).push(r);});return m2;})();
  // 精確比對
  addRows(db.get(unitKey));addRows(db.get(displayName));
  addRows(db.get(unitKey.toUpperCase()));addRows(db.get(displayName.toUpperCase()));
  // fuzzy 比對（unit 欄位格式如 A1(地) + floor=28F）
  if(col&&flr&&result.length===0){
    db.forEach((rows,ru)=>{
      if(!rows.length)return;
      const clean=ru.replace(/^(地|業)/,'').trim();
      if(clean.toUpperCase()===displayName.toUpperCase()){addRows(rows);return;}
      const ruCol=clean.replace(/[(（][^)）]*[)）]/g,'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
      if(ruCol===col){
        // 逐筆過濾 floor，避免把整批不同樓層的 rows 全部撈入
        const matched=rows.filter(r=>String(r.floor||'').replace(/[^0-9]/g,'')===flr);
        if(matched.length)addRows(matched);
      }
    });
  }
  return result;
}

function _hpendUnitSortKey(name){
  const m=String(name).match(/^(.*)-(\d+)$/);
  if(!m)return{unit:String(name),floor:0};
  return{unit:m[1],floor:parseInt(m[2],10)};
}
function _hpendItemCompare(a,b){
  const aDone=a.st==='done'?1:0,bDone=b.st==='done'?1:0;
  if(aDone!==bDone)return aDone-bDone;
  if(a.planDate!==b.planDate)return a.planDate<b.planDate?-1:1;
  const ka=_hpendUnitSortKey(a.unit),kb=_hpendUnitSortKey(b.unit);
  if(ka.floor!==kb.floor)return kb.floor-ka.floor;
  return ka.unit.localeCompare(kb.unit,'zh-Hant',{numeric:true});
}
function printHPendBatch(){
  const{byVendor}=_hpendGather();
  let vendorNames=Object.keys(byVendor).sort((a,b)=>a.localeCompare(b,'zh-Hant')).filter(v=>_hpendState.vendors.has(v));
  if(!vendorNames.length){toast('請至少選擇一家廠商','⚠️');return;}
  vendorNames=vendorNames.filter(v=>byVendor[v].some(it=>_hpendState.showDone||it.st!=='done'));
  if(!vendorNames.length){toast('所選廠商目前皆無未完成項目','⚠️');return;}
  const body=vendorNames.map((v,i)=>{
    const items=byVendor[v].filter(it=>_hpendState.showDone||it.st!=='done').sort(_hpendItemCompare);
    const rows=items.map(it=>`<tr class="r-${it.st}"><td>${esc(it.planDate.slice(5))}</td><td>${esc(it.unit)}</td><td>${esc(it.row.issue)}</td><td>${esc(it.row.note||'')}</td><td>${fmtMD(it.row.planIn)}</td><td>${fmtMD(it.row.planDone)}</td><td>${it.row.actualDone?fmtMD(it.row.actualDone):'—'}</td><td>${HPEND_ST_LABEL[it.st]||''}</td></tr>`).join('');
    return`<div style="${i>0?'page-break-before:always;':''}padding-top:${i>0?'14px':'0'}">
      <h3 style="font-size:26px;font-weight:700;margin:0 0 8px;color:#3C3489">🏢 ${esc(v)}</h3>

  printSection(`交屋前缺失彙整（共${vendorNames.length}家廠商）`,body,'交屋前缺失彙整');
}

// Undo buffer for batch changes
let _bchUndoStack=[];
function saveBchUndo(keys,fields){
  // Save snapshot of affected keys before change
  const snap={};
  keys.forEach(key=>{
    snap[key]={
      handoverUnit:S.handoverUnits[key]?{...S.handoverUnits[key]}:null,
      clientData:S.clientData[key]?{...S.clientData[key]}:null
    };
  });
  _bchUndoStack.push(snap);
  if(_bchUndoStack.length>10)_bchUndoStack.shift();
}
function undoBatchHStats(){
  if(!_bchUndoStack.length){toast('沒有可恢復的操作','⚠️');return;}
  const snap=_bchUndoStack.pop();
  Object.entries(snap).forEach(([key,data])=>{
    if(data.handoverUnit===null)delete S.handoverUnits[key];
    else{if(!S.handoverUnits)S.handoverUnits={};S.handoverUnits[key]=data.handoverUnit;}
    if(data.clientData===null)delete S.clientData[key];
    else{if(!S.clientData)S.clientData={};S.clientData[key]=data.clientData;}
  });
  save();toast(`已恢復上一個批次動作（${Object.keys(snap).length} 戶）`,'↩️');
  renderHStats();
}

function confirmBatchHStats(){
  if(!S.handoverUnits)S.handoverUnits={};
  if(!S.clientData)S.clientData={};
  const bchDate=window._bchDate||'';
  const bchTs=window._bchTs||'';
  // 讀取 select 的最新值（每次 render 後 select 已重設）
  const bchTypeSel=document.getElementById('bch-type-sel');
  const bchType=bchTypeSel?bchTypeSel.value:(window._bchTypeVal||'');
  if(bchTypeSel)window._bchTypeVal=bchTypeSel.value; // 同步
  if(!bchDate&&!bchTs&&!bchType){toast('請先設定要批次變更的欄位（日期、時段或類別）','⚠️');return;}
  const bchBlock=window._bchBlock||new Set();
  const bchFloors=window._bchFloors||new Set();
  const bchCols=window._bchCols||new Set();
  const keys=[];
  function collectKeys(rawData,cols){
    G95_FLOORS.forEach(fl=>{
      if(bchFloors.size>0&&!bchFloors.has(String(fl)))return;
      cols.forEach(col=>{
        if(bchCols.size>0&&!bchCols.has(col))return;
        const raw=rawData[col];const key=raw?raw[fl]:null;
        if(key)keys.push(key);
      });
    });
  }
  if(bchBlock.size===0||bchBlock.has('A'))collectKeys(G95_RAW_A,G95_A_COLS);
  if(bchBlock.size===0||bchBlock.has('B'))collectKeys(G95_RAW_B,G95_B_COLS);
  if(bchBlock.size===0||bchBlock.has('shop')){
    const shopAllKeys=['地A1-1','A2-1','A3-1','業A5-1','地A6-1','地A7-1','地A8-1','地A9-1','地A10-1','地A11-1','地A12-1','地A15-1','地A16-1','地A17-1','地A18-1','地A19-1','地A20-1','地A21-1','地A22-1','地A23-1','地A25-1','地A26-1','地A27-1','業A28-1','地A29-1','業A30-1','業C2-1','地C1-2'];
    shopAllKeys.forEach(key=>{
      const fl=key==='地C1-2'?2:1;
      if(bchFloors.size>0&&!bchFloors.has(String(fl)))return;
      // 店鋪戶別：bchCols 中用 shop: 前綴，全部不選代表全選
      if(bchCols.size>0){
        const colMatch=key.match(/([A-C]\d+)/);
        const col=colMatch?('shop:'+colMatch[1]):'';
        if(col&&!bchCols.has(col))return;
      }
      keys.push(key);
    });
  }
  if(keys.length===0){toast('沒有符合條件的戶別','⚠️');return;}
  // Save undo snapshot before modifying
  saveBchUndo(keys);
  keys.forEach(key=>{
    if(!S.handoverUnits[key])S.handoverUnits[key]={};
    if(bchDate)S.handoverUnits[key].planDate=bchDate;
    if(bchTs)S.handoverUnits[key].slot=bchTs;
    if(bchType){
      if(!S.clientData[key])S.clientData[key]={name:'',tel:'',type:'自購戶',parkings:[],note:''};
      S.clientData[key].type=bchType;
    }
  });
  save();
  toast(`已批次更新 ${keys.length} 戶 ✅`);
  // 保留日期、時段、類別，只清除棟別/樓層/戶別選取
  window._bchBlock=new Set();
  window._bchFloors=new Set();
  window._bchCols=new Set();
  renderHStats();
}

}

function _hostReRender(){try{if(typeof renderHandover==='function')renderHandover();}catch(e){}try{if(typeof activeTab!=='undefined'){if(activeTab==='hcal'&&typeof renderHCal==='function')renderHCal();if(activeTab==='clients'&&typeof renderClients==='function')renderClients();}}catch(e){}}
function renderHCal(){
  if(!S.handoverUnits)S.handoverUnits={};
  _buildDefectCache();
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay()===0?6:today.getDay()-1; // 週一=0
  const isoDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // 若 _hcalOffset===0 且本週無活動，自動跳到最近一次有活動的週次
  const baseMonday=new Date(today);baseMonday.setDate(today.getDate()-dow);
  function weekHasActivity(mondayDate){
    for(let i=0;i<7;i++){
      const d=new Date(mondayDate);d.setDate(mondayDate.getDate()+i);
      const ds=isoDate(d);
      if(Object.values(S.handoverUnits).some(hu=>hu.planDate===ds))return true;
    }
    return false;
  }
  // 只在首次進入（offset===0）且本週無資料時才自動跳
  // 使用者手動切換後不強制跳
  if(_hcalOffset===0&&!weekHasActivity(baseMonday)){
    for(let delta=1;delta<=104;delta++){
      const futMon=new Date(baseMonday);futMon.setDate(baseMonday.getDate()+delta*7);
      if(weekHasActivity(futMon)){_hcalOffset=delta;break;}
      const pastMon=new Date(baseMonday);pastMon.setDate(baseMonday.getDate()-delta*7);
      if(weekHasActivity(pastMon)){_hcalOffset=-delta;break;}
    }
  }

  const weekStart=new Date(baseMonday);weekStart.setDate(baseMonday.getDate()+(_hcalOffset*7));
  const week2Start=new Date(weekStart);week2Start.setDate(weekStart.getDate()+7);
  const week1Days=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
  const week2Days=Array.from({length:7},(_,i)=>{const d=new Date(week2Start);d.setDate(week2Start.getDate()+i);return d;});
  const _mmdd=d=>String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const w1tag=_mmdd(week1Days[0])+'-'+_mmdd(week1Days[6]);
  const w2tag=_mmdd(week2Days[0])+'-'+_mmdd(week2Days[6]);
  const fmtDate=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const fmtDay=d=>['日','一','二','三','四','五','六'][d.getDay()];

  function getUnitsForDateSlot(dateStr,slot){
    const result=[];
    Object.entries(S.handoverUnits).forEach(([key,hu])=>{
      if(hu.planDate===dateStr&&(!slot||hu.slot===slot)){
        const pct=hoUnitPct(unitDisplayName(key))||hoUnitPct(key);
        result.push({key,pct,delivered:hu.delivered});
      }
    });
    return result;
  }

  function buildWeekTable(days,title){
    const isWeekend=d=>d.getDay()===0||d.getDay()===6;
    const todayStr=isoDate(today);

    const dateHdrs=days.map(d=>{
      const ds=isoDate(d);const isToday=ds===todayStr;
      const diff=Math.ceil((d-today)/86400000);
      const diffLabel=isToday?'今天':diff>0?`${diff}天後`:`${Math.abs(diff)}天前`;
      const isPastH=ds<todayStr;
      const bg=isToday?'#F0EEFF':isPastH?'#E9E9E9':isWeekend(d)?'#F5F3EE':'var(--surface)';
      const color=isToday?'var(--purple)':diff<0?'var(--text3)':diff<=3?'var(--red)':'var(--text2)';
      return`<th style="padding:5px 4px;text-align:center;border:1px solid var(--border);${isToday?'border-left:3px dashed var(--purple);':''}font-size:12px;min-width:100px;background:${bg};${isPastH?'opacity:.9;':''}">

    const slotRows=HCAL_SLOTS.map(slot=>{

        const dateStr=isoDate(d);

        // A棟/B棟/店鋪色塊

          if(isShop)return{bg:'#FFF3CD',border:'#D4A900',text:'#6B4D00',label:'店'};
          if(isB)return{bg:'#E1F5EE',border:'#0A6640',text:'#085041',label:'B'};

        }

        function _calChip(key,pct,delivered){

          const statusColor=_cancel?'#8A8783':(_absent?'#A32D2D':(delivered?'#3B6D11':pct===100?'#3B6D11':pct>=80?'#854F0B':'#A32D2D'));
          const isComH=(S.handoverUnits[key]||{}).inspTypes&&(S.handoverUnits[key].inspTypes||[]).includes('委外代驗');

        }
        const _ownerCount={};
        units.forEach(u=>{const nm=((S.clientData||{})[u.key]||{}).name||'';if(nm)_ownerCount[nm]=(_ownerCount[nm]||0)+1;});
        const _doneOwner={};let _cellBody='';

        const _comTag=_comN>0?'<span style="margin-left:4px;background:#FAEEDA;color:#6B4D00;border:1px solid #E0B84B;border-radius:8px;padding:0 5px;font-weight:600;-webkit-print-color-adjust:exact;print-color-adjust:exact">★委外 '+_comN+'</span>':'';
        return`<td style="border:1px solid var(--border);${_isTodayCol?'border-left:3px dashed var(--purple);':''}padding:4px;vertical-align:top;background:${_isPast?'#E9E6E1':'#FAFAFA'}"><div><div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px">${units.length}戶${_comTag}</div>${_cellBody}</div></td>`;

  const w1Title=`第 ${_hcalOffset*2+1} 週（${fmtDate(week1Days[0])} – ${fmtDate(week1Days[6])}）`;

  document.getElementById('pane-hcal').innerHTML=`

    </div>`;
}

    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

function printHCal(){
  const el=document.getElementById('pane-hcal');
  // 取得週標題文字（div.section title）和表格
  const titleDivs=el.querySelectorAll('div[style*="font-weight:600"][style*="color"]');
  const tables=el.querySelectorAll('table');
  // 組合：週標題 + 表格
  let bodyHtml='';
  tables.forEach((tbl,i)=>{
    // 取得對應週標題文字，將併入表格左上角表頭
    const wrap=tbl.closest('div[style*="margin-bottom:14px"]');
    let titleText='';
    if(wrap){
      const titleDiv=wrap.querySelector('div[style*="font-weight:600"]');
      if(titleDiv)titleText=titleDiv.textContent;
    }
    // clone table 並把 var(--*) 全部換成實色
    let html=tbl.outerHTML
      .replace(/var\(--border\)/g,'#C8C5C0')
      .replace(/var\(--border2\)/g,'#E0DDD8')
      .replace(/var\(--surface\)/g,'#EBEBEB')
      .replace(/var\(--purple\)/g,'#3C3489')
      .replace(/var\(--text\b\)/g,'#1E1D1B')
      .replace(/var\(--text2\)/g,'#5F5E5A')
      .replace(/var\(--text3\)/g,'#9E9C99')
      .replace(/var\(--red\)/g,'#C0392B')
      .replace(/var\(--rs\)/g,'6px')
      .replace(/var\(--r\b\)/g,'8px')
      .replace('<table style="border-collapse:collapse;width:100%;min-width:700px">','<table style="border-collapse:collapse;width:100%;table-layout:fixed"><colgroup><col style="width:11%"><col style="width:13.5%"><col style="width:13.5%"><col style="width:13.5%"><col style="width:13.5%"><col style="width:13.5%"><col style="width:13.5%"><col style="width:6.5%"></colgroup>')
      .replace(/font-size:10px;padding:2px 5px;margin-bottom:3px;border-radius:3px;background:/g,'font-size:12px;padding:1px 6px;margin-bottom:1px;border-radius:3px;line-height:1.3;background:')
      .replace(/font-size:8px;padding:0 3px;background:/g,'font-size:10px;padding:0 4px;background:')
      .replace(/color:#D4A900;font-size:9px/g,'color:#D4A900;font-size:11px')
      .replace(/opacity:\.7;font-size:9px;color:/g,'opacity:.7;font-size:11px;color:')
      .replace(/font-size:10px;font-weight:600;color:#5F5E5A;margin-bottom:3px/g,'font-size:12px;font-weight:600;color:#5F5E5A;margin-bottom:1px;line-height:1.3')
      .replace(/padding:4px;vertical-align:top;height:50px/g,'padding:3px;vertical-align:top;height:50px')
      .replace(/padding:4px;vertical-align:top;background:#FAFAFA/g,'padding:3px;vertical-align:top;background:#FAFAFA')
      .replace(/padding:6px 10px;font-size:11px;border:1px solid #C8C5C0;white-space:nowrap;font-weight:500;background:#EBEBEB/g,'padding:4px 10px;font-size:13px;border:1px solid #C8C5C0;white-space:nowrap;font-weight:500;background:#EBEBEB')
      .replace(/padding:4px 10px;font-size:11px;border:1px solid #C8C5C0;font-weight:600/g,'padding:4px 10px;font-size:13px;border:1px solid #C8C5C0;font-weight:600')
      .replace(/text-align:center;padding:4px;font-size:12px;border:1px solid #C8C5C0;/g,'text-align:center;padding:3px;font-size:14px;border:1px solid #C8C5C0;')
      .replace(/padding:5px 4px;text-align:center;border:1px solid #C8C5C0;font-size:12px;min-width:100px;background:/g,'padding:3px 4px;text-align:center;border:1px solid #C8C5C0;font-size:14px;background:')
      .replace(/font-size:10px;color:/g,'font-size:11px;color:')
      .replace(/padding:6px 10px;border:1px solid #C8C5C0;background:#EBEBEB;white-space:nowrap;min-width:90px;font-size:11px/g,'padding:4px 10px;border:1px solid #C8C5C0;background:#EBEBEB;white-space:nowrap;font-size:13px');
    // 拆分 thead / tbody，將每週分成上午（前2時段）與下午（後2時段+統計列）兩張表格分頁列印
    const theadM=html.match(/<thead>[\s\S]*?<\/thead>/);
    const tbodyM=html.match(/<tbody>([\s\S]*?)<\/tbody>/);
    const tableOpen=html.slice(0,html.indexOf('<thead>'));
    const thead=theadM?theadM[0]:'';
    const trs=(tbodyM?tbodyM[1]:'').match(/<tr[\s\S]*?<\/tr>/g)||[];
    const statTr=trs[4]||'';
    function buildHalf(rows,label){
      const th=thead.replace('<th style="padding:4px 10px;border:1px solid #C8C5C0;background:#EBEBEB;white-space:nowrap;font-size:13px">時段 / 日期</th>',
        `<th style="padding:4px 10px;border:1px solid #C8C5C0;background:#EBEBEB;font-size:13px"><span style="font-size:11px;font-weight:700;color:#3C3489;white-space:nowrap">${titleText} ${label}</span><br>時段 / 日期</th>`);
      return tableOpen+th+'<tbody>'+rows.join('')+'</tbody></table>';
    }
    const amTable=buildHalf([trs[0],trs[1],statTr],'（上午）');
    const pmTable=buildHalf([trs[2],trs[3],statTr],'（下午）');
    if(_hcalPrintMode==='full'){
      const fullTable=buildHalf([trs[0],trs[1],trs[2],trs[3],statTr],'');
      if(i>0)bodyHtml+='<div style="page-break-before:always">'+fullTable+'</div>';
      else bodyHtml+=fullTable;
    }else{
      if(i>0)bodyHtml+='<div style="page-break-before:always">'+amTable+'</div>';
      else bodyHtml+=amTable;
      bodyHtml+='<div style="page-break-before:always">'+pmTable+'</div>';
    }
  });

  const w=window.open('','_blank','width=1300,height=800');
  w.document.write(`<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    @page{size:A4 landscape;margin:8mm}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}

    h2{font-size:15px;font-weight:700;margin-bottom:4px;padding-bottom:3px;border-bottom:2px solid #3C3489;color:#3C3489}
    .info{font-size:9px;color:#888;margin-bottom:4px}
    table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
    thead{display:table-header-group}
    th{background:#EBEBEB;font-size:13px;font-weight:600;color:#5F5E5A;padding:3px 4px;text-align:center;border:1.5px solid #C8C5C0;white-space:nowrap}
    td{padding:3px;border:1.5px solid #C8C5C0;vertical-align:top;word-break:break-word}
    tr:last-child td{border-bottom:1.5px solid #C8C5C0}
    @media print{
      button{display:none}
      body{padding:6px}
      tr{page-break-inside:avoid}
    }
    </style></head><body>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #3C3489">
      <h2 style="margin:0;padding:0;border:none;font-size:15px;font-weight:700;color:#3C3489">🏗 工程缺失追蹤系統 — 交屋行事曆</h2>
      <button onclick="window.print()" style="padding:14px 32px;background:#3C3489;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:24px;font-family:inherit;flex-shrink:0">🖨 列印 / 儲存PDF</button>
    </div>
    <div class="info">列印時間：${new Date().toLocaleString('zh-TW')}</div>
