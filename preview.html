<!DOCTYPE html>
<html lang="zh-TW" data-v="26">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工程缺失追蹤系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#E4E4E4;--surface:#EBEBEB;--card:#fff;--border:#D6D6D6;--border2:#E7E7E7;--pborder:#BCBDC9;
  --text:#1E1D1B;--text2:#5F5E5A;--text3:#9A9896;
  --purple:#3C3489;--green:#2E6B26;--green-lt:#EAF6E7;
  --red:#A32D2D;--red-lt:#FFF0F0;--amber:#7A4200;--amber-lt:#FFF4E0;
  --blue:#185FA5;--blue-lt:#EBF4FF;
  --font:'Noto Sans TC',sans-serif;--r:10px;--rs:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.shell{max-width:1700px;margin:0 auto;padding:14px}
.page-hdr{background:#3C3489;color:#fff;font-size:18px;font-weight:700;letter-spacing:.03em;margin-bottom:14px;padding:11px 18px;border-radius:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.page-hdr span{font-size:12px;font-weight:400;opacity:.65}
.hdr-icon-btn{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;padding:0 2px;line-height:1}
.hdr-icon-btn:hover{color:#fff}
.card{border-radius:14px;padding:16px;transition:box-shadow .3s}
.card-main  {background:#F0EEF8;box-shadow:0 2px 14px rgba(60,52,137,.13)}
.card-main:hover{box-shadow:0 8px 32px rgba(60,52,137,.22)}
.card-vendor{background:#EEF6F0;box-shadow:0 2px 14px rgba(15,110,86,.11)}
.card-vendor:hover{box-shadow:0 8px 32px rgba(15,110,86,.22)}
.card-warn  {background:#FFF5EE;box-shadow:0 2px 14px rgba(163,45,45,.11)}
.card-warn:hover{box-shadow:0 8px 32px rgba(163,45,45,.22)}
.card-cal   {background:#EEF4FF;box-shadow:0 2px 14px rgba(24,95,165,.11)}
.card-cal:hover{box-shadow:0 8px 32px rgba(24,95,165,.22)}
.card-zones {background:#FFFAEE;box-shadow:0 2px 14px rgba(122,66,0,.11)}
.card-zones:hover{box-shadow:0 8px 32px rgba(122,66,0,.22)}
.card-mgr   {background:#FFF0F8;box-shadow:0 2px 14px rgba(122,0,85,.11)}
.card-mgr:hover{box-shadow:0 8px 32px rgba(122,0,85,.22)}

/* ── Tabs — 上排藥丸 pill style（方案 A，V0701-25）───────────────── */
#mainCard{display:block;background:transparent!important;box-shadow:none!important;padding:0!important;border-radius:0}
.tabs-wrap{margin-bottom:14px}
.main-col{display:block}
.tab-btn-group{display:flex;gap:6px;align-items:center}
.tab-edit-btn{font-size:10.5px;padding:4px 10px;border:0.5px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px}
.tab-edit-btn:hover{color:var(--text);border-color:var(--text2)}
.tab-edit-btn.active{color:var(--purple);border-color:var(--purple);background:rgba(60,52,137,.06)}
.tab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.tab{padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--card);color:var(--text2);border-radius:20px;font-family:var(--font);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;text-align:left;transition:background .12s,color .12s;user-select:none}
.tab:hover{color:var(--text);border-color:var(--text2);background:var(--surface)}
.tab.active{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:700}
.tab-filler{box-sizing:border-box;min-height:32px;min-width:56px;border:1px dashed transparent;border-radius:20px;visibility:hidden}
.tabs-wrap.edit-mode .tab-filler{border-color:var(--border);visibility:visible}
.tabs-wrap.edit-mode .tab{cursor:grab}
.tabs-wrap.edit-mode .tab.tab-drag-over{border-color:var(--amber);border-width:2px}
.tab-grip{font-size:11px;color:var(--text3);line-height:1;margin-right:3px}
/* ── 深色模式（基礎版：翻轉底色變數；少數寫死白卡/粉彩待下一步補）── */
body.theme-dark{--bg:#161327;--surface:#221E3C;--card:#2A2547;--border:#3E3862;--border2:#332E52;--pborder:#565083;--text:#ECEAF6;--text2:#B4AFD2;--text3:#847FA6}

/* ── Alert / Event tables ─────────────────────────── */
.ae-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.ae-tbl th{background:#E9E9E9;font-size:11px;font-weight:600;color:var(--text2);padding:6px 7px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.ae-tbl td{padding:5px 6px;border-bottom:1px solid var(--border2);vertical-align:middle}
.ae-tbl tr:last-child td{border-bottom:none}
.ae-tbl tr:hover td{background:rgba(0,0,0,.02)}
.ae-tbl input[type=text],.ae-tbl textarea{width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:4px;font-family:var(--font);outline:none;background:var(--card)}
.ae-tbl input[type=text]:focus,.ae-tbl textarea:focus{border-color:var(--purple)}
.ae-tbl textarea{min-height:34px;resize:vertical}
.ae-tbl input[type=date]{font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:4px;font-family:var(--font);outline:none;background:var(--card);color:var(--text)}
.ae-tbl input[type=date]:focus{border-color:var(--purple)}
.ae-tbl select{width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:4px;font-family:var(--font);outline:none;background:var(--card)}
.ae-sec{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.ae-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ae-sec-title{font-size:13px;font-weight:700;flex:1}
.ae-done-date{color:var(--green);font-weight:600}
.ae-overdue{color:var(--red);font-weight:600}
.ae-id{color:var(--text3);font-size:10px;text-align:center;width:24px}
.card-event{background:#F0F4FF;box-shadow:0 2px 14px rgba(24,95,165,.13)}
.card-done{background:#EAF6E7;box-shadow:0 2px 14px rgba(46,107,38,.13)}
.card-done:hover{box-shadow:0 8px 32px rgba(46,107,38,.22)}
.card-event:hover{box-shadow:0 8px 32px rgba(24,95,165,.22)}


/* ── Progress bar ─────────────────────────────────────── */
.prog-wrap{margin-top:5px;background:#E7E7E7;border-radius:4px;height:7px;overflow:hidden}
.prog-bar{height:7px;border-radius:4px;transition:width .4s}
.prog-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-align:right}

/* ── PDF import button ─────────────────────────────────── */
.btn-pdf-import{background:#E8E0F8;color:#3C3489;border:1px solid #C4B8F0}
.btn-pdf-import:hover{background:#D8CCF4}


/* ── Pagination ───────────────────────────────────────── */
.pg-bar{display:flex;align-items:center;gap:6px;padding:8px 4px;flex-wrap:wrap}
.pg-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font)}
.pg-btn:hover{background:var(--surface)}
.pg-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:11px;color:var(--text2);margin:0 6px}

/* drag tabs */
.tab.tab-drag-over{border-bottom:2.5px solid var(--amber)!important}

.bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.bar select{font-size:12px;padding:6px 9px;border:1px solid var(--pborder);border-radius:var(--rs);background:var(--card);color:var(--text);font-family:var(--font);outline:none}
.bar select:focus{border-color:var(--purple)}
.btn{font-size:12px;padding:6px 12px;border:1px solid var(--pborder);border-radius:var(--rs);background:var(--card);color:var(--text);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .18s}
.btn:hover{background:var(--border2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-p{background:var(--purple)!important;color:#fff!important;border-color:var(--purple)!important;font-weight:500}
.btn-p:hover{background:#2a2460!important}
.btn-d{background:var(--red-lt)!important;color:var(--red)!important;border-color:#ffcaca!important}
.btn-pdf{background:#fff3e0!important;color:#a34200!important;border-color:#f5c07a!important}
.btn-g{background:var(--green-lt)!important;color:var(--green)!important;border-color:#b5d9ae!important}
.btn-sm{padding:3px 8px!important;font-size:11px!important}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-bottom:12px}
.stat{background:rgba(255,255,255,.65);border-radius:var(--rs);padding:.6rem .85rem;border:1px solid rgba(255,255,255,.9)}
.stat-l{font-size:10px;color:var(--text2);margin-bottom:2px;font-weight:500;letter-spacing:.04em}
.stat-v{font-size:21px;font-weight:700}

.bulk-bar{display:none;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(60,52,137,.08);border:1px solid rgba(60,52,137,.2);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:12px}
.bulk-bar.show{display:flex}
.bulk-bar select,.bulk-bar input[type=text],.bulk-bar input[type=date]{font-size:12px;padding:5px 8px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);outline:none;background:var(--card)}

.tbl-wrap{overflow-x:auto;border:1px solid var(--pborder);border-radius:var(--r);background:var(--card);box-shadow:0 1px 6px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:#E9E9E9;font-weight:600;font-size:10px;color:var(--text2);padding:7px 4px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:bottom}
thead th.th-chk{width:26px;text-align:center}
thead th.th-date{white-space:normal;line-height:1.3}
tbody tr{border-bottom:1px solid var(--border2);transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:rgba(60,52,137,.04)!important}
tbody tr.r-over td{background:#FFF0F0!important}
tbody tr.r-w3 td{background:#FFF4E0!important}
tbody tr.r-w7 td{background:#EBF4FF!important}
tbody tr.r-done td{background:#EAF6E7!important}
tbody tr.row-sel td{background:rgba(60,52,137,.1)!important;outline:1px solid var(--purple)}
td{padding:4px 4px;vertical-align:top;overflow:hidden}
td.td-txt{white-space:pre-wrap;word-break:break-all;min-width:90px;max-width:220px}
td.td-issue{white-space:pre-wrap;word-break:break-all;min-width:100px;max-width:240px}
td input[type=text],td textarea,td select{font-size:11px;padding:3px 4px;border:1px solid var(--pborder);border-radius:3px;background:var(--card);color:var(--text);font-family:var(--font);width:100%;outline:none}
td input[type=text],td select{height:36px;box-sizing:border-box}
td input[type=text]:focus,td select:focus,td textarea:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(60,52,137,.08)}
td input[type=date]{font-size:10px;padding:2px 3px;border:1px solid var(--pborder);border-radius:3px;width:auto;background:var(--card);color:var(--text);min-width:0}
td input[type=date]:focus{border-color:var(--purple)}
td input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--purple)}
td textarea{resize:vertical;min-height:32px;line-height:1.5}
.dow-lbl{font-size:10px;color:var(--purple);font-weight:600;margin-left:4px;white-space:nowrap}
.date-wrap{display:flex;align-items:center;flex-wrap:nowrap;gap:2px;margin-bottom:3px}
.date-pre{font-size:9px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
.date-pre.plan{color:#185FA5}.date-pre.actual{color:#2E6B26}

.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.bdone{background:var(--green-lt);color:var(--green)}.bover{background:var(--red-lt);color:var(--red)}
.b3{background:var(--amber-lt);color:var(--amber)}.b7{background:var(--blue-lt);color:var(--blue)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 3px;border-radius:3px;font-size:13px;line-height:1}
.del-btn:hover{color:var(--red);background:var(--red-lt)}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:12px}

#toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;background:var(--purple);color:#fff;border-radius:var(--rs);padding:9px 15px;font-size:12px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.22);animation:tIn .2s ease;max-width:320px;pointer-events:auto}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:14px;padding:22px 24px;min-width:300px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.modal input[type=text]{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--pborder);border-radius:var(--rs);font-family:var(--font);outline:none;margin-bottom:12px}
.modal input[type=text]:focus{border-color:var(--purple)}
.modal .modal-btns{display:flex;gap:8px;justify-content:flex-end}

.sec{border:1px solid var(--pborder);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);transition:box-shadow .2s}
.sec:hover{box-shadow:0 5px 18px rgba(0,0,0,.12)}
.sec-hdr{padding:8px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sec-hdr-l{display:flex;align-items:center;gap:8px}

.vcards{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:12px}
.vcards-4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.vc{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:11px 13px;cursor:pointer;transition:all .18s}
.vc:hover{border-color:#888;transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.vc.sel{border:2px solid var(--purple);box-shadow:0 0 0 3px rgba(60,52,137,.12)}
.vc-name{font-size:12px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.vc-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border2)}
.vcards2{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:12px}
.vc2{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:6px 8px;cursor:pointer;transition:all .18s}
.vc2:hover{border-color:#888;transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.vc2.sel{border:2px solid var(--purple);box-shadow:0 0 0 3px rgba(60,52,137,.12)}
.vc2.vc-done100{opacity:.6}
.vc2.vc-overdue{border:2px solid var(--red)}
.vc2-name{font-size:11px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc2-stat{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc-row:last-child{border-bottom:none}

.side-editor{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:13px;width:230px;flex-shrink:0;box-shadow:0 1px 5px rgba(0,0,0,.07)}
/* drag-sortable list */
.ed-list{list-style:none}
.ed-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2);cursor:default}
.ed-item:last-child{border-bottom:none}
.ed-item.drag-over{border-top:2px solid var(--purple)}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;flex-shrink:0;user-select:none;padding:0 2px}
.drag-handle:active{cursor:grabbing}

.ztab{padding:7px 14px;font-size:12px;border:1px solid var(--pborder);border-radius:20px;cursor:pointer;background:var(--card);color:var(--text2);font-family:var(--font);font-weight:500;transition:all .15s}
.ztab:hover{border-color:#888;transform:translateY(-1px)}
.ztab.active{color:#fff;border-color:transparent;font-weight:600}
.zs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.zs-card{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:11px 13px;border-left:4px solid transparent;cursor:pointer;transition:all .18s}
.zs-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.zs-card.sel{box-shadow:0 0 0 2px var(--purple)}
.zs-title{font-size:12px;font-weight:600;margin-bottom:7px}
.zs-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border2)}
.zs-row:last-child{border-bottom:none}
.zs-grid2{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.zs2-card{background:var(--card);border:1px solid var(--pborder);border-radius:var(--r);padding:8px 10px;border-left:3px solid transparent;cursor:pointer;transition:all .18s}
.zs2-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.zs2-card.sel{box-shadow:0 0 0 2px var(--purple)}
.zs2-card.zs2-done100{opacity:.6}
.zs2-title{font-size:11px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zs2-stat{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#E9E9E9;border-bottom:1px solid var(--border)}
.cal-lbl{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:12px;font-weight:600;color:var(--text2);padding:5px 0;background:var(--surface);border-bottom:1px solid var(--border2)}
.cal-dow.wknd{color:var(--red)}
.cal-cell{min-height:90px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:4px;background:var(--card);vertical-align:top;transition:background .12s}
.cal-cell:hover{background:#F6F4FF}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.today-c{background:#F0EEFF}
.cal-cell.wknd-c{background:#FAFAF8}
.cal-dnum{font-size:12px;font-weight:600;margin-bottom:2px;line-height:1.3}
.cal-dnum.today-n{background:var(--purple);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-ev{font-size:11px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.ev-in{background:#B5D4F4;color:#042C53}
.ev-done{background:#C0DD97;color:#173404}
.ev-ad{background:#CECBF6;color:#26215C}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--text2);padding:7px 13px;border-bottom:1px solid var(--border2)}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.import-drop{border:2px dashed var(--border);border-radius:var(--r);padding:14px;text-align:center;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:12px}
.import-drop:hover,.import-drop.drag{border-color:var(--purple);background:rgba(60,52,137,.04)}
.share-bar{background:#EAF0FF;border:1px solid #B0C4EE;border-radius:var(--rs);padding:9px 13px;font-size:12px;color:#1a3a6e;margin-bottom:12px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
@media print{
  body{background:#fff}.shell{padding:0}
  .page-hdr,.tabs,.tabs-wrap,.bar,.del-btn,.btn-pdf,.btn-p,.side-editor,#toast-wrap,.no-print,.modal-bg{display:none!important}
  .card{box-shadow:none;padding:0}.tbl-wrap{box-shadow:none;border:1px solid #ccc}
}

const CHUNK_LIMIT = 900000;
const chunksCol = collection(ref, '_chunks');
const fieldsCol = collection(ref, '_fields');
const SAVE_FIELDS = ['rows', 'completed', 'trash', 'changelog', 'meta'];

// 向後相容：讀取舊格式（payload / chunks）
async function _readChunkedPayload(snapData){
  if(snapData._chunks && snapData._chunks > 0){
    const parts = [];
    for(let i = 0; i < snapData._chunks; i++){
      const cs = await getDoc(doc(chunksCol, String(i)));
      if(cs.exists()) parts.push(cs.data().d);
    }
    return parts.join('');
  }
  return snapData.payload || null;
}

// 將 state 拆成 5 個欄位
function _splitState(data){
  const meta = {};
  for(const k of Object.keys(data)){
    if(!['rows','completed','trash','changelog'].includes(k)) meta[k]=data[k];
  }
  return {
    rows: data.rows||[],
    completed: data.completed||[],
    trash: data.trash||[],
    changelog: (data.changelog||[]).slice(0,200),
    meta: meta
  };
}

// 從 5 個欄位還原 state
function _mergeFieldsToState(fields){
  const state = Object.assign({}, fields.meta||{});
  state.rows = fields.rows||[];
  state.completed = fields.completed||[];
  state.trash = fields.trash||[];
  state.changelog = fields.changelog||[];
  return state;
}

// 從 _fields 子集合讀取完整 state
async function _readFieldDocs(){
  const fieldDocs = await getDocs(fieldsCol);
  const fields = {};
  fieldDocs.forEach(d=>{
    try{ fields[d.id]=JSON.parse(d.data().d); }catch(e){}
  });
  return _mergeFieldsToState(fields);
}

window._fbSave = async function(data, dirtyKeys){
  if(data.changelog && data.changelog.length > 200) data.changelog = data.changelog.slice(0,200);
  const fields = _splitState(data);
  const keysToWrite = (dirtyKeys && dirtyKeys.size > 0) ? [...dirtyKeys] : SAVE_FIELDS;

  // 並行寫入變動欄位
  const writes = keysToWrite.map(key=>
    setDoc(doc(fieldsCol, key), { d: JSON.stringify(fields[key]) })
  );
  await Promise.all(writes);

  // 更新主文件時間戳（觸發其他用戶端的 onSnapshot）
  await setDoc(ref, { _format:2, _ts:Date.now(), _chunks:0, payload:'' }, { merge:true });

  const totalKB = keysToWrite.reduce((sum,k)=>sum+JSON.stringify(fields[k]).length, 0)/1024;
  console.log('[Firebase] 差異儲存: ['+keysToWrite.join(', ')+'] ('+totalKB.toFixed(0)+'KB / 全量'+(JSON.stringify(data).length/1024).toFixed(0)+'KB)');
};

window._fbListen = function(onChange){
  let _snapTimer=null;
  return onSnapshot(ref, snap => {
    if(!snap.exists()) return;
    clearTimeout(_snapTimer);
    _snapTimer=setTimeout(async()=>{
      try{
        const data = snap.data();
        let state;
        if(data._format === 2){
          state = await _readFieldDocs();
        } else {
          const json = await _readChunkedPayload(data);
          if(!json) return;
          state = JSON.parse(json);
        }
        if(state && state.rows) onChange(state);
      } catch(e){ console.error('[Firebase] parse error', e); }
    },500);
  });
};

window._fbLoad = async function(){
  try{
    const snap = await getDoc(ref);
    if(!snap.exists()) return null;
    const data = snap.data();
    if(data._format === 2){
      return await _readFieldDocs();
    }
    const json = await _readChunkedPayload(data);
    if(!json) return null;
    return JSON.parse(json);
  } catch(e){ console.error('[Firebase] load error', e); return null; }
}

// ── 匯出未來N天交屋戶別缺失清單（供排程任務讀取，拆成多筆小文件避免單筆過大）──
// 完全獨立實作，不依賴 classic script 內的全域函式/變數（module scope 無法存取）
window.exportHandoverExport = async function(days){
  days = days || 14;
  try{
    const esc2=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const DOW2=['日','一','二','三','四','五','六'];
    const pd2=s=>{if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return isNaN(d)?null:d};
    const fmtMD2=s=>{const d=pd2(s);if(!d)return'';return`${d.getMonth()+1}/${d.getDate()}(${DOW2[d.getDay()]})`};
    const TODAY2=new Date();TODAY2.setHours(0,0,0,0);
    const du2=s=>{const d=pd2(s);if(!d)return null;return Math.ceil((d-TODAY2)/86400000)};
    const getStatus2=r=>{
      if(r.actualDone)return'done';
      const d=du2(r.planDone);
      if(d!==null&&d<0)return'overdue';
      if(r.actualIn)return'ongoing';
      return'pending';
    };
    const unitDisplayName2=key=>!key?'':String(key).replace(/^(地|業)/,'');

    const fb = await window._fbLoad();
    if(!fb || !fb.handoverUnits) return {error:'no data from _fbLoad'};
    const hu = fb.handoverUnits;
    const allRows=[...(fb.completed||[]),...(fb.rows||[])];
    const defectCache=new Map();
    allRows.forEach(r=>{
      if(!r.unit)return;
      const k=String(r.unit).trim();
      if(!defectCache.has(k))defectCache.set(k,[]);
      defectCache.get(k).push(r);
    });
    const getDefectRows2=unitKey=>{
      if(!unitKey)return[];
      const displayName=unitDisplayName2(unitKey);
      const m=displayName.match(/^([A-Za-z]+\d*)-(\d+)$/);
      const col=m?m[1].toUpperCase():'';
      const flr=m?m[2]:'';
      const seen=new Set();const result=[];
      const addRows=rows=>{if(!rows)return;rows.forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);result.push(r);}});};
      addRows(defectCache.get(unitKey));addRows(defectCache.get(displayName));
      addRows(defectCache.get(String(unitKey).toUpperCase()));addRows(defectCache.get(displayName.toUpperCase()));
      if(col&&flr&&result.length===0){
        defectCache.forEach((rows,ru)=>{
          if(!rows.length)return;
          const clean=ru.replace(/^(地|業)/,'').trim();
          if(clean.toUpperCase()===displayName.toUpperCase()){addRows(rows);return;}
          const ruCol=clean.replace(/[(（][^)）]*[)）]/g,'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
          if(ruCol===col){
            const matched=rows.filter(r=>String(r.floor||'').replace(/[^0-9]/g,'')===flr);
            if(matched.length)addRows(matched);
          }
        });
      }
      return result;
    };
    const hoUnitPct2=unit=>{
      const rows=getDefectRows2(unit);
      if(!rows.length)return null;
      const completedCnt=rows.filter(r=>r.compId!=null).length;
      return Math.round(completedCnt/rows.length*100);
    };
    const hoGrade2=pct=>{
      if(pct===null)return{label:'無資料',color:'#B4B2A9'};
      if(pct===100)return{label:'✅ 可交屋',color:'#3B6D11'};
      if(pct>=90) return{label:'🔵 接近完成',color:'#185FA5'};
      if(pct>=80) return{label:'🟡 進行中',color:'#854F0B'};
      if(pct>=60) return{label:'🟠 待加強',color:'#BA7517'};
      return{label:'🔴 未完成',color:'#A32D2D'};
    };
    const unitDefectsBody2=unitKey=>{
      const rows=getDefectRows2(unitKey);
      const huu=hu[unitKey]||{};
      const cl=(fb.clientData&&fb.clientData[unitKey])||{};
      const displayName=unitDisplayName2(unitKey);
      const pct=hoUnitPct2(displayName)??hoUnitPct2(unitKey);
      const grade=hoGrade2(pct);
      const info=`<div style="margin-bottom:10px;font-size:11px;color:#555">
        <span>戶別：<strong>${esc2(unitKey)}</strong></span>
        ${cl.name?`<span style="margin-left:12px">客戶：${esc2(cl.name)}</span>`:''}
        ${cl.tel?`<span style="margin-left:12px">電話：${esc2(cl.tel)}</span>`:''}
        <span style="margin-left:12px">完成度：<strong style="color:${grade.color}">${pct??'—'}%</strong></span>
        ${huu.planDate?`<span style="margin-left:12px">預定驗收：${huu.planDate}</span>`:''}
      </div>`;
      const thead=`<tr><th>廠商</th><th>缺失內容</th><th>備註</th><th>預計進場</th><th>預計完成</th><th>實際完成</th><th>狀態</th></tr>`;
      const tbody=rows.map(r=>{const st=getStatus2(r);const stLabel={done:'已完成',ongoing:'進行中',overdue:'逾期',pending:'未開始'}[st]||'';return`<tr class="r-${st}"><td>${esc2(r.vendor)}</td><td>${esc2(r.issue)}</td><td>${esc2(r.note)}</td><td>${fmtMD2(r.planIn)}</td><td>${fmtMD2(r.planDone)}</td><td>${r.actualDone?fmtMD2(r.actualDone):'—'}</td><td>${stLabel}</td></tr>`;}).join('');
      const empty=!rows.length?'<p style="color:#888;font-size:11px">此戶目前無缺失項目記錄</p>':'';
      return info+(rows.length?`<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`:empty);
    };

    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(today); end.setDate(end.getDate()+days);
    const fmt = d => _isoL(d);
    const keys = Object.keys(hu).filter(k=>{
      const p = hu[k].planDate;
      if(!p) return false;
      const d = new Date(p);
      return d>=today && d<=end;
    }).sort((a,b)=> (hu[a].planDate||'').localeCompare(hu[b].planDate||''));

    // 同時寫入分頁合併 HTML，供排程任務以固定路徑（無 pageToken）讀取
    const pageCol = collection(db,'projects/main/export_pages');
    const oldPages = await getDocs(pageCol);
    for(const d of oldPages.docs){ await deleteDoc(d.ref); }
    const CHUNK = 8;
    let pageCount = 0;
    for(let i=0;i<keys.length;i+=CHUNK){
      const chunk = keys.slice(i,i+CHUNK);
      let body='';
      chunk.forEach((k,idx)=>{
        const html = `<h3 style="font-size:13px;font-weight:700;margin:0 0 8px;color:#3C3489">${esc2(unitDisplayName2(k))}（預定交屋：${hu[k].planDate||''}）</h3>${unitDefectsBody2(k)}`;
        body += `<div style="${(i+idx)>0?'page-break-before:always;':''}padding-top:${(i+idx)>0?'14px':'0'}">${html}</div>`;
      });
      await setDoc(doc(pageCol, 'page'+pageCount), { body, from: i, to: Math.min(i+CHUNK,keys.length) });
      pageCount++;
    }
    await setDoc(doc(db,'projects/main/meta','handover_export'), {
      generatedAt: Date.now(), dateFrom: fmt(today), dateTo: fmt(end),
      order: keys.map(k=>k.replace(/[\/\.]/g,'_')), count: keys.length, pageCount
    });
    return { ok:true, count: keys.length, pageCount, dateFrom: fmt(today), dateTo: fmt(end) };
  } catch(e){ return { error: String(e) }; }
};

// ── 版本閘門：偵測新版部署，阻止舊版寫入 ──────────────────────
window._versionBlocked = false;
window._codeVersion = CODE_VERSION;

// 首次上線時寫入版本（若 meta 不存在或版本較舊才更新）
async function initVersionGate(){
  try{
    const metaSnap = await getDoc(metaRef);
    const remote = metaSnap.exists() ? (metaSnap.data().codeVersion || 0) : 0;
    if(CODE_VERSION > remote && !window._PREVIEW){
      await setDoc(metaRef, { codeVersion: CODE_VERSION, deployedAt: Date.now() }, { merge: true });
      console.log('[Version] 更新遠端版本號：' + remote + ' → ' + CODE_VERSION);
    }
  }catch(e){ console.warn('[Version] init error', e); }

  // 持續監聽版本變化
  onSnapshot(metaRef, async snap => {
    if(!snap.exists()) return;
    const remote = snap.data().codeVersion || 0;
    if(remote > CODE_VERSION && !window._versionBlocked){
      console.warn('[Version] 偵測到新版本 v' + remote + '，本機為 v' + CODE_VERSION);
      // ★ 先把待存資料存完，再封鎖
      try{
        if(_saveTimer || _saving){
          console.log('[Version] 偵測到未儲存資料，先自動存檔…');
          clearTimeout(_saveTimer); _saveTimer=null;
          // 等待進行中的寫入完成
          if(_saving){ for(let i=0;i<30&&_saving;i++) await new Promise(r=>setTimeout(r,200)); }
          // 再做一次最終存檔
          if(window._fbSave && typeof _takeSnapshot==='function'){
            try{ if(!window._VIEW_ONLY){
              // 只寫「本機真的改過」的欄位（差異儲存），避免舊分頁整包覆蓋別人的設定
              // （曾造成：改版瞬間某個舊分頁把檢視到期日/其他設定蓋回預設值）
              const _dk=(typeof _computeDirtyFields==='function')?_computeDirtyFields():null;
              if(!_dk || _dk.size>0){ setSyncStatus('saving'); await window._fbSave(S, _dk); }
              _savedSnapshot=_takeSnapshot();
              console.log('[Version] 自動存檔完成 ✅（僅寫變動欄位）');
            } }
            catch(e){ console.error('[Version] 自動存檔失敗',e); }
          }
        }
      }catch(e){ console.error('[Version] 自動存檔流程錯誤',e); }
      // 封鎖寫入
      window._versionBlocked = true;
      _saving=false; _saveQueued=false;
      // 顯示醒目橫幅
      const banner = document.createElement('div');
      banner.id = 'version-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#A32D2D,#C0392B);color:#fff;padding:12px 20px;text-align:center;font-size:14px;font-weight:700;box-shadow:0 2px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;gap:12px';
      banner.innerHTML = '⚠️ 偵測到新版本（v' + remote + '），您目前執行的是舊版（v' + CODE_VERSION + '）。資料已自動儲存，請重新整理頁面。'
        + '<button onclick="location.reload(true)" style="background:#fff;color:#A32D2D;border:none;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">立即重新整理</button>';
      document.body.prepend(banner);
      // 更新同步狀態
      if(typeof setSyncStatus === 'function') setSyncStatus('error');
    }
  });
}

// ── Presence（跨裝置在線人數）────────────────────────────────
async function setupPresence(){
  const PRESENCE_COL = 'projects/main/presence';
  const SESSION_ID = Math.random().toString(36).slice(2)+Date.now().toString(36);
  const presRef = doc(db, PRESENCE_COL, SESSION_ID);
  const HEARTBEAT_MS = 10000;  // 每 10 秒更新一次
  const STALE_MS = 25000;      // 超過 25 秒視為離線

  async function writeHeartbeat(){
    try{
      const _me=auth&&auth.currentUser;
      const _name=(_me&&(_me.displayName||_me.email))||'訪客';
      const _email=(_me&&_me.email)||'';
      await setDoc(presRef, { t: Date.now(), alive: true, name:_name, email:_email }, { merge: true });
    }catch(e){}
  }

  async function removeSession(){
    try{ await deleteDoc(presRef); }catch(e){}
  }

  // 離開時刪除 presence
  window.addEventListener('beforeunload', ()=>{ removeSession(); });
  window.addEventListener('pagehide', ()=>{ removeSession(); });

  // 定期心跳
  await writeHeartbeat();
  setInterval(writeHeartbeat, HEARTBEAT_MS);

  // 監聽 presence 集合，計算在線人數
  onSnapshot(collection(db, PRESENCE_COL), snap=>{
    const now=Date.now();
    let count=0;const names=[];
    snap.forEach(d=>{
      const data=d.data();
      const t=typeof data.t==='number'?data.t:(data.t?.seconds?data.t.seconds*1000:0);
      if(now-t < STALE_MS){ count++; if(data.name)names.push(data.name); }
    });
    // 更新畫面
    const el=document.getElementById('user-count');
    if(el){
      el.style.display='';
      el.textContent='👤 '+Math.max(1,count)+' 人';
      el.style.cursor='pointer';
      el.title=names.length?('在線：'+names.join('、')):'';
      el.onclick=function(){ toast(names.length?('在線：'+names.join('、')):'在線名單暫無資料','👤'); };
    }
    // 同步到主程式讓 BroadcastChannel 不再覆蓋
    window._onlineCount=Math.max(1,count);
    window._onlineNames=names;
  });
}

// ── 登入後才連資料庫（Firestore 規則啟用後，未登入讀寫會被拒）──

}
window._fbBoot = function(){

};
if(window._LOGIN_GATE){

} else {

}

// ── Row-level merge 多人同步 ─────────────────────────────────────────────
// 使用快照比對自動偵測本地修改，不需要在每個修改點手動標記
let _savedSnapshot=null; // 上次成功儲存到 Firestore 後的快照

function _takeSnapshot(){

// 比對兩個列陣列，找出 local 中與 snapshot 不同的列 ID
function _findDirtyIds(localRows, snapRows, idKey){
  idKey=idKey||'id';
  const dirty=new Set();
  const snapMap=new Map();
  (snapRows||[]).forEach(r=>snapMap.set(r[idKey],JSON.stringify(r)));
  (localRows||[]).forEach(r=>{
    const rid=r[idKey];
    const snapJson=snapMap.get(rid);
    if(!snapJson || snapJson!==JSON.stringify(r)){
      dirty.add(rid); // 新增或修改的列
    }
  });
  // 找出被刪除的列（在 snapshot 中有，local 中沒有）
  const localIds=new Set((localRows||[]).map(r=>r[idKey]));
  (snapRows||[]).forEach(r=>{
    if(!localIds.has(r[idKey])) dirty.add(r[idKey]);
  });
  return dirty;
}

// 逐戶合併物件型 meta（handoverUnits / clientData）：本地改過的 key 保留本地，其餘採用遠端
function _mergeKeyedMeta(local, remote, snap, kind){
  local=local||{}; remote=remote||{}; snap=snap||{};
  const out={};
  const mt=o=>(o&&typeof o==='object'&&o._mt)?o._mt:0;   // 每戶最後修改時間戳
  Object.keys(remote).forEach(k=>{out[k]=remote[k];});
  Object.keys(local).forEach(k=>{
    if(!(k in remote)){
      // 遠端沒有此 key：本地新增、或遠端較舊缺漏 → 保留本地（除非本地相對 snap 沒變且 snap 曾有＝視為遠端刪除）
      const lj=JSON.stringify(local[k]);
      const sj=(k in snap)?JSON.stringify(snap[k]):undefined;
      if(sj===undefined||lj!==sj)out[k]=local[k];
      return;
    }
    // 兩邊都有 → 比每戶時間戳，新的贏（解決舊資料蓋掉新編輯）
    const lmt=mt(local[k]),rmt=mt(remote[k]);
    if(lmt>rmt){out[k]=local[k];}
    else if(rmt>lmt){out[k]=remote[k];}
    else{
      const lj=JSON.stringify(local[k]);
      const sj=(k in snap)?JSON.stringify(snap[k]):undefined;
      if(lj!==sj)out[k]=local[k];
    }
  });
  Object.keys(snap).forEach(k=>{
    if(!(k in local)) delete out[k]; // 本地已刪除 → 移除
  });
  // 近期編輯保護盾（10 分鐘）：你改過的 key 在期間內保留本地，避免別人帶舊值蓋回；
  // 但若遠端有「更新的時間戳」（別人真的改得比你晚），不強行蓋掉，交給時間戳結果。
  if(kind&&window._metaTouch){
    const now=Date.now();const SHIELD=600000;
    Object.keys(local).forEach(k=>{
      const t=window._metaTouch[kind+':'+k];
      if(t&&now-t<SHIELD&&(!(k in remote)||mt(local[k])>=mt(remote[k])))out[k]=local[k];
    });
  }
  return out;
}
// 逐列合併：dirty 列保留本地版本，其餘採用遠端版本
function mergeRows(localRows, remoteRows, dirtyIds, idKey){
  idKey=idKey||'id';
  const localMap=new Map();
  localRows.forEach(r=>localMap.set(r[idKey],r));
  const merged=[];
  const seen=new Set();
  // 1. 以 remote 為基底
  remoteRows.forEach(r=>{
    const rid=r[idKey];
    seen.add(rid);
    const local=localMap.get(rid);
    if(!local){
      merged.push(r); // 遠端新增
    } else if(dirtyIds.has(rid)){
      merged.push(local); // 本地修改 → 保留本地
    } else {
      merged.push(r); // 本地未改 → 採用遠端
    }
  });
  // 2. 本地有但遠端沒有（本地新增或本地刪除已在 remote 反映）
  localRows.forEach(r=>{
    if(!seen.has(r[idKey]) && dirtyIds.has(r[idKey])){
      merged.push(r); // 本地新增的保留
    }
  });
  return merged;
}

// 合併 changelog（取聯集，按 ts 去重，最新在前）
function mergeChangelog(localLog, remoteLog){
  const map=new Map();
  (remoteLog||[]).forEach(c=>map.set(c.ts+'|'+c.detail, c));
  (localLog||[]).forEach(c=>map.set(c.ts+'|'+c.detail, c));
  return [...map.values()].sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,500);
}

// 合併 trash（取聯集）
function mergeTrash(localTrash, remoteTrash){
  const map=new Map();
  (remoteTrash||[]).forEach(t=>map.set(t.id+'_'+(t.compId||''), t));
  (localTrash||[]).forEach(t=>map.set(t.id+'_'+(t.compId||''), t));
  return [...map.values()];
}

// 合併 vendors/managers 清單（取聯集）

function setSyncStatus(status){

}

// ── 更新紀錄 ──────────────────────────────────────────────────────────────
function logChange(type, detail, extra){

// ── 比對 state 變動欄位（供差異儲存用）──
function _computeDirtyFields(){
  if(!_savedSnapshot) return new Set(SAVE_FIELDS);
  const dirty = new Set();
  // rows: 用長度+抽樣快速判斷
  if(S.rows.length !== _savedSnapshot.rows.length) dirty.add('rows');
  else if(S.rows.length > 0 && JSON.stringify(S.rows) !== JSON.stringify(_savedSnapshot.rows)) dirty.add('rows');
  // completed
  if(S.completed.length !== (_savedSnapshot.completed||[]).length) dirty.add('completed');
  else if(S.completed.length > 0 && JSON.stringify(S.completed) !== JSON.stringify(_savedSnapshot.completed)) dirty.add('completed');
  // trash（通常很小）
  if(JSON.stringify(S.trash||[]) !== JSON.stringify(_savedSnapshot.trash||[])) dirty.add('trash');
  // changelog
  if((S.changelog||[]).length !== (_savedSnapshot.changelog||[]).length) dirty.add('changelog');
  else if(JSON.stringify((S.changelog||[]).slice(0,5)) !== JSON.stringify((_savedSnapshot.changelog||[]).slice(0,5))) dirty.add('changelog');
  // meta：所有「非核心四欄（rows/completed/trash/changelog）」的欄位。
  // 與 _splitState 完全對齊——凡是會被塞進 meta 文件的 key 都在此比對，
  // 避免新增欄位（如 appTitle/rptFc/rptSaved/viewPass/hostBadgeMode…）因未列入白名單
  // 而漏判、導致只改這些欄位時儲存被跳過、資料未寫入 Firestore。
  const CORE = {rows:1, completed:1, trash:1, changelog:1};
  const allKeys = new Set([...Object.keys(S), ...Object.keys(_savedSnapshot)]);
  for(const k of allKeys){
    if(CORE[k]) continue;
    if(JSON.stringify(S[k]) !== JSON.stringify(_savedSnapshot[k])){ dirty.add('meta'); break; }
  }
  return dirty;
}

// ── 實際寫入 Firestore（含指數退避重試 + 併發鎖 + 差異儲存）──
async function _doSave(){
  if(window._VIEW_ONLY)return;
  // 防止併發：若已在寫入中，標記需要再存一次
  if(_saving){ _saveQueued=true; return; }
  _saving=true;

  // 計算變動欄位
  const dirtyKeys = _computeDirtyFields();
  if(dirtyKeys.size === 0){
    _saving=false; _saveTimer=null;
    setSyncStatus('online');
    console.log('[Save] 無變動，跳過儲存');
    return;
  }

  setSyncStatus('saving');
  let retries=0, maxRetries=3, delay=1000;
  while(retries<=maxRetries){
    try{
      await window._fbSave(S, dirtyKeys);
      _savedSnapshot=_takeSnapshot();
      _saveTimer=null;
      _saving=false;
      // 寫入期間有新變更？立即再存一次
      if(_saveQueued){
        _saveQueued=false;
        setTimeout(()=>_doSave(),100);
        setSyncStatus('pending');
      } else {
        setSyncStatus('online');
      }
      // save 完成，處理排隊中的遠端更新
      if(_pendingRemote&&!_pendingRow&&!_saveQueued){
        const d=_pendingRemote;_pendingRemote=null;
        setTimeout(()=>applyRemote(d),50);
      }
      return;
    }catch(err){
      retries++;
      if(retries>maxRetries){
        console.error('[Save] 寫入失敗（已重試'+maxRetries+'次）:',err);
        _saveTimer=null;
        _saving=false;
        _saveQueued=false;
        setSyncStatus('error');
        toast('⚠️ 資料儲存失敗，請稍後再試','⚠️');
        return;
      }
      console.warn('[Save] 寫入失敗，'+delay+'ms 後重試 ('+retries+'/'+maxRetries+')');
      await new Promise(r=>setTimeout(r,delay));
      delay*=2;
    }
  }
}

function _stampMetaTouch(){
  if(!window._metaTouch)window._metaTouch={};
  const now=Date.now();const snap=_savedSnapshot||{};

    Object.keys(prev).forEach(k=>{if(!(k in cur))window._metaTouch[kind+':'+k]=now;});

}
function save(){
  if(window._VIEW_ONLY)return;

// ── renderAll 節流：500ms 內最多渲染一次 ──
let _renderThrottleTimer=null;

function _isFieldEditing(){try{const el=document.activeElement;if(!el)return false;const tag=el.tagName;if(tag==='TEXTAREA'||tag==='SELECT')return true;if(tag==='INPUT'){if(el.readOnly||el.disabled)return false;const t=(el.type||'text').toLowerCase();return ['text','number','date','search','tel','email',''].includes(t);}return el.isContentEditable===true;}catch(e){return false;}}
function applyRemote(d){
  // 若 save 正在進行，排隊等完成後處理（不丟棄）
  if(_saveTimer){_pendingRemote=d;return;}
  if(_renderTimer){_pendingRemote=d;return;}
  // 若新增缺失表單開啟中，先暫存遠端資料，等表單關閉再套用
  if(_pendingRow){_pendingRemote=d;return;}
  // 若使用者正在輸入欄位，先暫存遠端資料，避免蓋掉未存的編輯（失焦後自動套用）
  if(_isFieldEditing()){_pendingRemote=d;return;}
  _defectCache=null;
  const remote=migrateState(d);
  // ── Row-level merge ──
  const snap=_savedSnapshot;
  const dirtyRowIds=snap?_findDirtyIds(S.rows, snap.rows, 'id'):new Set();
  const dirtyCompIds=snap?_findDirtyIds(S.completed, snap.completed, 'compId'):new Set();
  const hasDirty=dirtyRowIds.size>0||dirtyCompIds.size>0;
  // 交屋日期/時段(handoverUnits)與客戶資料(clientData)：逐戶合併，避免被遠端整包覆蓋
  const mHU=_mergeKeyedMeta(S.handoverUnits, remote.handoverUnits, snap?snap.handoverUnits:null, 'handoverUnits');
  const mCD=_mergeKeyedMeta(S.clientData, remote.clientData, snap?snap.clientData:null, 'clientData');
  if(hasDirty){
    // 有本地未儲存的修改 → 逐列合併
    S.rows=mergeRows(S.rows, remote.rows, dirtyRowIds, 'id');
    S.completed=mergeRows(S.completed, remote.completed, dirtyCompIds, 'compId');
    S.changelog=mergeChangelog(S.changelog, remote.changelog);
    S.trash=mergeTrash(S.trash, remote.trash);
    S.vendors=mergeList(S.vendors, remote.vendors);
    S.managers=mergeList(S.managers, remote.managers);
    S.alerts=remote.alerts||S.alerts;
    S.events=remote.events||S.events;
    // 其他 meta 採用遠端
    ['zones','zoneUnits','zoneFloors','floorConfig',
     'unitConfig','publicAreaList','unitFloorLock','managerDetails','tabOrder','uso'].forEach(k=>{
      if(k in remote) S[k]=remote[k];
    });
    S.handoverUnits=mHU; S.clientData=mCD;
    S.nextId=Math.max(S.nextId||0, remote.nextId||0);
    S.nextCompId=Math.max(S.nextCompId||0, remote.nextCompId||0);
    console.log('[Merge] row-level merge: dirty rows='+dirtyRowIds.size+', dirty comp='+dirtyCompIds.size);
  } else {
    // 沒有本地修改 → 直接採用遠端（原行為）；但交屋/客戶資料仍逐戶合併保護
    S=remote;
    S.handoverUnits=mHU; S.clientData=mCD;
  }
  _savedSnapshot=_takeSnapshot(); // 更新快照
  try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
  throttledRenderAll();
}
function applyPendingRemoteIfAny(){

function startFirebaseListen(){

async function load(){
  // 1. 先試分享連結
  try{
    const h=location.hash.slice(1);
    if(h.startsWith('data=')){
      const d=JSON.parse(decodeURIComponent(atob(h.slice(5))));
      if(d.rows){S=migrateState(d);applyUnitConfig();history.replaceState(null,'',location.pathname);toast('已從分享連結載入資料 🎉','✅');}
    }
  }catch(e){}

  // 2. 若 Firebase 已就緒，從雲端載入
  if(window._fbLoad){
    setSyncStatus('connecting');
    // 第一次連線時 Firestore 通道有時尚未就緒，可能長時間 pending；
    // 加上逾時保護，逾時就重試一次，避免畫面卡在「連線中…」
    const withTimeout=(ms)=>new Promise((resolve)=>{
      let done=false;
      const timer=setTimeout(()=>{if(!done){done=true;resolve('__TIMEOUT__');}},ms);
      window._fbLoad().then(v=>{if(!done){done=true;clearTimeout(timer);resolve(v);}})
        .catch(e=>{if(!done){done=true;clearTimeout(timer);resolve('__TIMEOUT__');}});
    });
    try{
      let remote=await withTimeout(7000);
      if(remote==='__TIMEOUT__')remote=await withTimeout(12000);
      if(remote&&remote!=='__TIMEOUT__'&&remote.rows){
        S=migrateState(remote);applyUnitConfig();
        _savedSnapshot=_takeSnapshot(); // 初始快照
        try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
        setSyncStatus('online');
        startFirebaseListen();
        return;
      }
    }catch(e){setSyncStatus('error');}
  }

  // 3. 備援：localStorage
  try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);if(d.rows)S=migrateState(d);}}catch(e){}
  applyUnitConfig();
  _savedSnapshot=_takeSnapshot();
  setSyncStatus(window._fbReady?'online':'offline');
  if(window._fbReady)startFirebaseListen();
}

// ── helpers ───────────────────────────────────────────────────────────────
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const _isoL=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');  // 任一 Date → 本地 YYYY-MM-DD
const todayISO=()=>_isoL(new Date());  // 本地日期，且「每次即時取當下」——分頁長開跨過午夜後不會再用到載入時的舊日期（V0701-33 修：清潔勾選會蓋成前一天）
const pd=s=>{if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return isNaN(d)?null:d};
const du=s=>{const d=pd(s);if(!d)return null;return Math.ceil((d-TODAY)/86400000)};
const fmtMD=s=>{const d=pd(s);if(!d)return'';return`${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function expandRangeToken(tok){
  const m=tok.match(/^(\D*)(\d+)(\D*)~(\D*)(\d+)(\D*)$/);
  if(m){
    const p1=m[1],n1=m[2],s1=m[3],p2=m[4],n2=m[5],s2=m[6];
    if(p1===p2&&s1===s2){
      const out=[];
      const a=+n1,b=+n2;
      const pad=(n1.length===n2.length&&/^0/.test(n1))?n1.length:0;
      for(let i=a;i<=b;i++){
        const numStr=pad?String(i).padStart(pad,'0'):String(i);
        out.push(p1+numStr+s1);
      }
      return out;
    }
  }
  return[tok];
}
function expandRangeList(str){
  const out=[];
  String(str||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(tok=>{
    expandRangeToken(tok).forEach(t=>out.push(t));
  });
  return out;
}

let _undoSnapshot=null;
function _saveUndoSnapshot(){
  _undoSnapshot={rows:JSON.parse(JSON.stringify(S.rows)),nextId:S.nextId,changelog:JSON.parse(JSON.stringify(S.changelog||[]))};
}
function undoLastAction(){
  if(!_undoSnapshot){toast('沒有可還原的操作','⚠️');return;}

function computeSelectedUnits(){
  if(!_pendingRow)return new Set();
  _ensureMultiSets();
  const out=new Set(_pendingRow.multiUnitsManual);
  const zs=_activeMultiZones();
  _pendingRow.multiFloors.forEach(f=>unitsOnFloor(f,zs).forEach(u=>out.add(u)));
  _pendingRow.multiZones.forEach(z=>unitsInZone(z).forEach(u=>out.add(u)));
  return out;
}
function toggleMultiPanel(kind,checked){

  if(checked){
    if(kind==='unit')renderMultiUnitList();
    if(kind==='floor')renderMultiFloorList();
    if(kind==='zone')renderMultiZoneList();
  }else{
    // 取消勾選該方式時，清除該方式自身的選取，互不影響其他方式
    if(kind==='unit')_pendingRow.multiUnitsManual=new Set();
    if(kind==='floor')_pendingRow.multiFloors=new Set();
    if(kind==='zone')_pendingRow.multiZones=new Set();

function checkDuplicate(unit,floor,issue){
  if(!unit&&!floor&&!issue)return null;
  const u=(unit||'').trim(),f=(floor||'').trim(),is=(issue||'').trim();
  const isDone=id=>(S.completed instanceof Set)?S.completed.has(id):Array.isArray(S.completed)&&S.completed.includes(id);
  return S.rows.find(r=>!isDone(r.id)&&(r.unit||'').trim()===u&&(r.floor||'').trim()===f&&(r.issue||'').trim()===is)||null;
}
function confirmInlineAdd(keepOpen){
  if(!_pendingRow){return;}
  if(_pendingRow.multiUnits&&_pendingRow.multiUnits.size>0){
    if(!_pendingRow.issue){toast('請填寫缺失內容','⚠️');return;}
    _saveUndoSnapshot();
    const units=uniqueUnits().filter(u=>_pendingRow.multiUnits.has(u));
    const floors=(_pendingRow.multiFloors&&_pendingRow.multiFloors.size>0)?uniqueFloors().filter(f=>_pendingRow.multiFloors.has(f)):null;
    let count=0;
    units.forEach(u=>{
      if(floors){
        floors.forEach(floor=>{
          const ref=S.rows.find(r=>r.unit===u&&r.floor===floor);
          const isOwner=ref?!!ref.isOwner:!!_pendingRow.isOwner;
          S.rows.push({id:S.nextId++,createdAt:Date.now(),round:(_pendingRow&&_pendingRow.round)||'初驗',zone:_pendingRow.zone,manager:_pendingRow.manager,unit:u,floor:floor||'',vendor:_pendingRow.vendor,issue:_pendingRow.issue,note:_pendingRow.note||'',planIn:_pendingRow.planIn||'',planDone:_pendingRow.planDone||'',actualIn:'',actualDone:'',isOwner});
          count++;
        });
      }else{
        const ref=S.rows.find(r=>r.unit===u&&r.floor);
        const floor=ref?ref.floor:_pendingRow.floor;
        const isOwner=ref?!!ref.isOwner:!!_pendingRow.isOwner;
        S.rows.push({id:S.nextId++,createdAt:Date.now(),round:(_pendingRow&&_pendingRow.round)||'初驗',zone:_pendingRow.zone,manager:_pendingRow.manager,unit:u,floor:floor||'',vendor:_pendingRow.vendor,issue:_pendingRow.issue,note:_pendingRow.note||'',planIn:_pendingRow.planIn||'',planDone:_pendingRow.planDone||'',actualIn:'',actualDone:'',isOwner});
        count++;
      }
    });
    const floorNote=floors?` × ${floors.length} 樓層`:'';
    logChange('➕ 批次新增項目',`缺失：${_pendingRow.issue} 套用至 ${units.length} 戶${floorNote}，共新增 ${count} 筆，目前共 ${S.rows.length} 筆`,{units});
    if(keepOpen){
      _pendingRow.issue='';
      const issueEl=document.getElementById('ia-issue');if(issueEl){issueEl.value='';issueEl.focus();}
      toast(`已新增 ${count} 筆，可繼續輸入`,'➕');save();
    }else{
      _pendingRow=null;
      const area=document.getElementById('inline-add-area');if(area)area.innerHTML='';
      toast(`已新增 ${count} 筆`,'➕');save();renderAll();applyPendingRemoteIfAny();
    }
    return;
  }
  if(!_pendingRow.issue&&!_pendingRow.unit){toast('請填寫缺失內容或戶別','⚠️');return;}
  if(_pendingRow.unit){
    const conflict=unitZoneConflict(_pendingRow.unit,_pendingRow.zone);
    if(conflict){
      alert(`⚠️ 戶別 ${_pendingRow.unit} 應屬於『${zLabel(conflict)}』，目前選擇『${zLabel(_pendingRow.zone)}』，無法輸入`);
      return;
    }
  }
  if(_pendingRow.planIn&&!_pendingRow.planDone)_pendingRow.planDone=_pendingRow.planIn;
  const dup=checkDuplicate(_pendingRow.unit,_pendingRow.floor,_pendingRow.issue);
  if(dup){
    const msg=`⚠️ 重複輸入

已有相同未完成記錄：
戶別：${dup.unit||'—'}　樓層：${dup.floor||'—'}　缺失：${dup.issue||'—'}

確定要繼續新增？`;
    if(!confirm(msg))return;
  }
  _saveUndoSnapshot();
  S.rows.push({id:S.nextId++,createdAt:Date.now(),round:(_pendingRow&&_pendingRow.round)||'初驗',zone:_pendingRow.zone,manager:_pendingRow.manager,unit:_pendingRow.unit,floor:_pendingRow.floor,vendor:_pendingRow.vendor,issue:_pendingRow.issue,note:'',planIn:_pendingRow.planIn||'',planDone:_pendingRow.planDone||'',actualIn:'',actualDone:'',isOwner:!!_pendingRow.isOwner});
  logChange('➕ 新增項目',`戶別：${_pendingRow.unit||'—'} 廠商：${_pendingRow.vendor||'—'}，目前共 ${S.rows.length} 筆`);
  if(keepOpen){
    _pendingRow.issue='';
    const issueEl=document.getElementById('ia-issue');if(issueEl){issueEl.value='';issueEl.focus();}
    toast('已新增，可繼續輸入同戶下一筆','➕');save();
  }else{
    _pendingRow=null;
    const area=document.getElementById('inline-add-area');if(area)area.innerHTML='';
    toast('已新增一筆項目','➕');save();renderAll();applyPendingRemoteIfAny();
  }
}

function rowClick(e,id,visIds){
  if(['INPUT','SELECT','TEXTAREA','BUTTON'].includes(e.target.tagName))return;
  const idx=visIds.indexOf(id);
  if(e.shiftKey&&lastSelIdx!==null){
    const lo=Math.min(lastSelIdx,idx),hi=Math.max(lastSelIdx,idx);
    for(let i=lo;i<=hi;i++)selectedIds.add(visIds[i]);
  }else{
    selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
  }
  lastSelIdx=idx;renderAll();
}

function toggleAll(checked,visIds){

function showSelectMenu(btn,visIds,allFilteredIds){

  // 選取本頁
  menu.appendChild(opt((allSelOnPage?'☑':'☐')+' 選取本頁（'+visIds.length+' 筆）',()=>{toggleAll(!allSelOnPage,visIds);}));
  // 選取篩選結果全部（若有篩選才顯示，label 說明）
  if(isFiltered){
    menu.appendChild(opt((allSelFiltered?'☑':'☐')+' 選取篩選結果（'+allFiltered.length+' 筆）',()=>{
      allFiltered.forEach(id=>allSelFiltered?selectedIds.delete(id):selectedIds.add(id));renderAll();
    }));
  }
  // 選取全部資料（不含篩選）
  const allSelAll=S.rows.length>0&&S.rows.every(r=>selectedIds.has(r.id));
  menu.appendChild(opt((allSelAll?'☑':'☐')+' 選取全部資料（'+S.rows.length+' 筆）',()=>{toggleAllPages(!allSelAll);}));
  if(selectedIds.size>0)menu.appendChild(opt('✕ 取消全選',()=>{selectedIds.clear();renderAll();}));
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',function h(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',h);}},{once:true}),0);
}

function applyBulkDates(){
  const fields=[
    {chk:'bChkPlanIn', inp:'bMPlanIn', key:'planIn'},
    {chk:'bChkPlanDone',inp:'bMPlanDone',key:'planDone'},
    {chk:'bChkActIn',  inp:'bMActIn',  key:'actualIn'},
    {chk:'bChkActDone',inp:'bMActDone',key:'actualDone'},
  ];
  const toApply=fields.filter(f=>{
    const chk=document.getElementById(f.chk);
    return chk&&chk.checked;
  }).map(f=>({key:f.key,val:(document.getElementById(f.inp)||{}).value||''}));
  if(!toApply.length){toast('請勾選至少一個日期欄位','⚠️');return;}

function applyBulk(){

  let value='';
  if(field==='vendor')value=(document.getElementById('bVendorSel')||{}).value||'';
  else if(field==='zone')value=(document.getElementById('bZoneSel')||{}).value||'';
  else if(field==='manager')value=(document.getElementById('bMgrSel')||{}).value||'';
  else value=(document.getElementById('bText')||{}).value||'';
  if(!field){toast('請選擇欄位','⚠️');return;}
  // date bulk with validation
  if(field==='planIn'){

      r.planDone=value;
    });
  } else if(field==='actualDone'){

      const r=S.rows.find(x=>x.id===id);if(!r)return;

function wireBulk(){
  const sel=document.getElementById('bField');if(!sel)return;
  const showEl=(id,show)=>{const e=document.getElementById(id);if(e)e.style.display=show?'':'none';};
  sel.onchange=()=>{
    const v=sel.value;
    showEl('bVendorSel',v==='vendor');
    showEl('bZoneSel',v==='zone');
    showEl('bMgrSel',v==='manager');
    showEl('bText',['floor','unit'].includes(v));
    showEl('bDateIn',['planIn','actualIn'].includes(v));
    showEl('bDateDone',['planDone','actualDone'].includes(v));
  };
  // Live conflict check on bulk date inputs
  function checkBulkDateConflict(){
    const field=sel.value;
    const dateIn=document.getElementById('bDateIn'),dateDone=document.getElementById('bDateDone');
    const val=(dateDone&&dateDone.style.display!=='none')?dateDone.value:(dateIn?dateIn.value:'');
    if(!val||!field){
      if(dateIn)dateIn.style.cssText=dateIn.style.cssText.replace(/;?color:[^;]+/,'').replace(/;?border-color:[^;]+/,'');
      if(dateDone)dateDone.style.cssText=dateDone.style.cssText.replace(/;?color:[^;]+/,'').replace(/;?border-color:[^;]+/,'');
      return;
    }
    let hasConflict=false;
    if(field==='planDone'||field==='actualDone'){
      const inField=field==='planDone'?'planIn':'actualIn';
      selectedIds.forEach(id=>{const r=S.rows.find(x=>x.id===id);if(r&&r[inField]&&val<r[inField])hasConflict=true;});
      const el=dateDone;
      if(el){el.style.color=hasConflict?'var(--red)':'';el.style.borderColor=hasConflict?'var(--red)':'';}
    } else if(field==='planIn'||field==='actualIn'){
      const doneField=field==='planIn'?'planDone':'actualDone';
      selectedIds.forEach(id=>{const r=S.rows.find(x=>x.id===id);if(r&&r[doneField]&&val>r[doneField])hasConflict=true;});
      const el=dateIn;
      if(el){el.style.color=hasConflict?'var(--red)':'';el.style.borderColor=hasConflict?'var(--red)':'';}
    }
  }
  const bDateIn=document.getElementById('bDateIn'),bDateDone=document.getElementById('bDateDone');
  if(bDateIn){bDateIn.onchange=()=>{checkBulkDateConflict();};}
  if(bDateDone){bDateDone.onchange=()=>{checkBulkDateConflict();};}
}

let dragSrc=null;

function dsDrop(e,toIdx,listKey,rerender){
  e.preventDefault();
  document.querySelectorAll('.ed-item').forEach(el=>el.classList.remove('drag-over'));

  const arr=listKey==='vendor'?S.vendors:listKey==='zone'?S.zones:listKey==='mgr'?S.managers:null;

// tab drag-sort
let tabDragSrc=null;
function tabDragStart(e,id){tabDragSrc=id;e.dataTransfer.effectAllowed='move';}
function tabDragOver(e,target){
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('tab-drag-over',typeof target==='string'&&t.dataset.id===target&&target!==tabDragSrc);
  });
}
function tabDrop(e,target){
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('tab-drag-over'));
  if(!tabDragSrc||!_editSlots)return;
  const from=_editSlots.indexOf(tabDragSrc);
  if(from<0){tabDragSrc=null;return;}
  // 目標格：丟在空格上＝移到那一格、原位留空（可自由排到任一列、含第四列）；丟在別的分頁上＝兩者交換。都不會弄丟分頁。
  let to=(typeof target==='number')?(-target-1):_editSlots.indexOf(target);
  if(to<0||from===to){tabDragSrc=null;return;}
  while(_editSlots.length<=to)_editSlots.push(null);   // 目標若在補位列，先確保陣列夠長
  const tmp=_editSlots[to];
  _editSlots[to]=tabDragSrc;   // 拖曳者移到目標格
  _editSlots[from]=tmp;        // 目標原內容回填原位（null＝留空格；分頁＝交換位置）
  tabDragSrc=null;renderTabBar();
}

const FMAP={
  '管理人':'manager','管理人員':'manager',
  '戶別':'unit','戶名':'unit','戶號':'unit',
  '樓層':'floor',
  '廠商':'vendor','廠商名稱':'vendor',
  '缺失內容':'issue','缺失':'issue','問題':'issue','缺失項目':'issue','工項':'issue',
  '備註':'note','備註說明':'note','說明':'note','備注':'note',
  '預計進場':'planIn','預計進場日期':'planIn','進場日期':'planIn','預計進場時間':'planIn',
  '預計完成':'planDone','預計完成日期':'planDone','完成日期':'planDone','預計完成時間':'planDone',
  '實際進場':'actualIn','實際進場日期':'actualIn','實際進場時間':'actualIn','進場日':'actualIn',
  '實際完成':'actualDone','實際完成日期':'actualDone','實際完成時間':'actualDone','完成日':'actualDone','實際完工':'actualDone',
  '區域':'zone_label','分區':'zone_label','工區':'zone_label','狀態':'_status',
};
const DATE_FIELDS=['planIn','planDone','actualIn','actualDone'];

function excelToISO(v){
  if(v===null||v===undefined||v==='')return'';
  // Excel Date 物件
  if(v instanceof Date){
    const y=v.getFullYear(),mo=v.getMonth()+1,d=v.getDate();
    if(y<1900||y>2200)return'';
    return`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  // Excel 序列數（整數或浮點）
  if(typeof v==='number'){
    if(v<1||v>100000)return'';
    const d=new Date(Math.round((v-25569)*86400000));
    const y=d.getUTCFullYear();
    if(y<1900||y>2200)return'';
    return`${y}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  if(typeof v!=='string')return'';
  const s=v.trim().replace(/\s+/g,' ');
  if(!s)return'';
  const thisYear=new Date().getFullYear();
  let m;

  // 1. YYYY-MM-DD（ISO 標準）
  m=s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})([T\s].*)?$/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;

  // 2. YYYY年M月D日
  m=s.match(/^(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*[日号]?/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;

  // 3. 民國年 RRR/M/D 或 RRR-M-D（三位數 100-200）
  m=s.match(/^(\d{3})[-\/.](\d{1,2})[-\/.](\d{1,2})$/);
  if(m){
    const roc=parseInt(m[1]);
    if(roc>=100&&roc<=200)return`${roc+1911}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }

  // 4. M/D/YYYY 或 D/M/YYYY（四位數年份在後）
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})$/);
  if(m)return`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;

  // 5. 純數字 YYYYMMDD
  m=s.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m)return`${m[1]}-${m[2]}-${m[3]}`;

  // 6. 只有月/日（M/D 或 M-D）→ 自動補當年
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})$/);
  if(m){
    const mo=parseInt(m[1]),d=parseInt(m[2]);
    if(mo>=1&&mo<=12&&d>=1&&d<=31)
      return`${thisYear}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  }

  // 7. 英文月份：June 10, 2026 / 10 June 2026
  const MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
    january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  m=s.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if(m){const mo=MONTHS[m[1].toLowerCase()];if(mo)return`${m[3]}-${String(mo).padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
  m=s.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
  if(m){const mo=MONTHS[m[2].toLowerCase()];if(mo)return`${m[3]}-${String(mo).padStart(2,'0')}-${m[1].padStart(2,'0')}`;}

  return'';
}
function importExcel(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      const wsName=wb.SheetNames.find(n=>n.includes('追蹤')||n.includes('缺失'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('Excel無有效資料','⚠️');return;}
      let added=0,skipped=0;
      raw.forEach(row=>{
        const mapped={};
        Object.entries(row).forEach(([k,rawVal])=>{
          // 標頭正規化：去除前後空白、全形空白、全形符號轉半形
          const kn=k.trim().replace(/[\s　]+/g,'').replace(/：/g,':').replace(/（/g,'(').replace(/）/g,')');
          const fk=FMAP[kn]||FMAP[k.trim()];if(!fk||fk==='_status')return;
          if(DATE_FIELDS.includes(fk)){
            const iso=excelToISO(rawVal);
            mapped[fk]=iso;
          }else{mapped[fk]=String(rawVal||'').trim();}
        });
        if(!mapped.issue&&!mapped.unit){skipped++;return;}
        // auto-add vendor
        if(mapped.vendor&&!S.vendors.includes(mapped.vendor)){if(_vendorHasCode(mapped.vendor)){S.vendors.push(mapped.vendor);toast(`已自動新增廠商：${mapped.vendor}`,'🏢');}else{toast(`廠商「${mapped.vendor}」缺代碼，未加入清單`,'⚠️');}}
        // auto-add manager
        if(mapped.manager&&!S.managers.includes(mapped.manager)){S.managers.push(mapped.manager);toast(`已自動新增管理人：${mapped.manager}`,'👤');}
        let zone=S.zones[0]?S.zones[0].id:'indoor';
        if(mapped.zone_label){
          const zn=S.zones.find(z=>z.label===mapped.zone_label||mapped.zone_label.includes(z.label.replace(/\s/g,'')));
          if(zn){zone=zn.id;}
          else{
            // 自動新增分區
            const newZoneId='z'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
            const newColor=V_COLORS[S.zones.length%V_COLORS.length];
            S.zones.push({id:newZoneId,label:mapped.zone_label,color:newColor});
            zone=newZoneId;
            toast('已自動新增分區：'+mapped.zone_label,'📁');
          }
        }
        // enforce date order
        if(mapped.planIn&&mapped.planDone&&mapped.planDone<mapped.planIn)mapped.planDone=mapped.planIn;
        if(mapped.actualIn&&mapped.actualDone&&mapped.actualDone<mapped.actualIn)mapped.actualDone=mapped.actualIn;
        if(mapped.planIn&&!mapped.planDone)mapped.planDone=mapped.planIn;
        S.rows.push({id:S.nextId++,createdAt:Date.now(),round:(_pendingRow&&_pendingRow.round)||'初驗',zone,manager:mapped.manager||'',unit:mapped.unit||'',floor:mapped.floor||'',
          vendor:mapped.vendor||S.vendors[0]||'',issue:mapped.issue||'',note:mapped.note||'',
          planIn:mapped.planIn||'',planDone:mapped.planDone||'',actualIn:mapped.actualIn||'',actualDone:mapped.actualDone||''});
        added++;
      });
      toast(`匯入完成：新增 ${added} 筆，略過 ${skipped} 筆`,'📊');
      logChange('📂 Excel 匯入', `檔案：${file.name}，新增 ${added} 筆，略過 ${skipped} 筆`);
      save();renderAll();
    }catch(ex){toast('匯入失敗：'+ex.message,'❌');}
  };
  rd.readAsArrayBuffer(file);
}
function setupImport(dropId,inpId){
  const drop=document.getElementById(dropId),inp=document.getElementById(inpId);if(!drop||!inp)return;
  drop.onclick=()=>inp.click();
  inp.onchange=e=>{if(e.target.files[0])importExcel(e.target.files[0])};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])importExcel(e.dataTransfer.files[0])};
}

function onPlanInChange(id,val){

// ── date cell named handlers (avoid nested backticks) ────────────────────
function onPlanDoneChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.planDone=v;save();renderAll();return;}
  if(r.planIn&&v<r.planIn){toast('完成日期不可早於進場日期','⚠️');renderAll();return;}
  r.planDone=v;save();renderAll();
}
function onActualInChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.actualIn=v;save();renderAll();return;}
  if(r.actualDone&&v>r.actualDone){toast('實際進場不可晚於實際完成','⚠️');renderAll();return;}
  r.actualIn=v;save();renderAll();
}
function onActualDoneChange(id,v){
  var r=S.rows.find(x=>x.id===id);if(!r)return;
  if(!v){r.actualDone=v;save();renderAll();return;}
  if(r.actualIn&&v<r.actualIn){toast('實際完成不可早於實際進場','⚠️');renderAll();return;}
  r.actualDone=v;if(v&&!r.actualIn)r.actualIn=v;save();renderAll();
}
function dateCell(id,planF,planV,actualF,actualV){
  const planDow=dowStr(planV),actualDow=dowStr(actualV);
  // Use named handlers to avoid nested backtick issue
  const onPlanChange=planF==='planIn'
    ?'onPlanInChange('+id+',this.value)'
    :'onPlanDoneChange('+id+',this.value)';
  const onActualChange=actualF==='actualIn'
    ?'onActualInChange('+id+',this.value)'
    :'onActualDoneChange('+id+',this.value)';
  const r=S.rows.find(x=>x.id===id);
  const planConflict=r&&planF==='planDone'&&planV&&r.planIn&&planV<r.planIn;
  const actualConflict=r&&actualF==='actualDone'&&actualV&&r.actualIn&&actualV<r.actualIn;
  const planStyle='width:92px'+(planConflict?';color:var(--red);font-weight:600;border-color:var(--red)':'');
  const actualStyle='width:92px'+(actualConflict?';color:var(--red);font-weight:600;border-color:var(--red)':'');
  return '<td style="vertical-align:top;padding:3px 4px">'
    +'<div class="date-wrap">'
    +'<span class="date-pre plan">預</span>'
    +'<input type="date" value="'+planV+'" onchange="'+onPlanChange+'" onclick="event.stopPropagation()" style="'+planStyle+'">'
    +'<span class="dow-lbl">'+planDow+'</span>'
    +'</div>'
    +'<div class="date-wrap" style="margin-top:2px">'
    +'<span class="date-pre actual">實</span>'
    +'<input type="date" value="'+actualV+'" onchange="'+onActualChange+'" onclick="event.stopPropagation()" style="'+actualStyle+'">'
    +'<span class="dow-lbl">'+actualDow+'</span>'
    +'</div>'
    +'</td>';
}

// ── 分頁工具函式 ────────────────────────────────────────────────────────────
function pgBarHTML(total, page, onClickFn){
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(pages<=1)return '';
  const start=page*PAGE_SIZE+1, end=Math.min((page+1)*PAGE_SIZE,total);
  let btns='';
  // 上一頁
  btns+=`<button class="pg-btn no-print" ${page===0?'disabled':''} onclick="${onClickFn}(${page-1})">‹</button>`;
  // 頁碼按鈕（顯示前2、當前±2、後2）
  const show=new Set([0,1,page-2,page-1,page,page+1,page+2,pages-2,pages-1].filter(p=>p>=0&&p<pages));
  let prev=-1;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(prev>=0&&p-prev>1)btns+='<span class="pg-info">…</span>';
    btns+=`<button class="pg-btn no-print${p===page?' active':''}" onclick="${onClickFn}(${p})">${p+1}</button>`;
    prev=p;
  });
  // 下一頁
  btns+=`<button class="pg-btn no-print" ${page>=pages-1?'disabled':''} onclick="${onClickFn}(${page+1})">›</button>`;
  btns+=`<span class="pg-info">${start}–${end} / 共 ${total} 筆</span>`;
  // 快速跳頁
  btns+=`<input type="number" min="1" max="${pages}" value="${page+1}" onchange="gotoMainPage(this.value-1,${pages})" style="width:48px;font-size:11px;padding:3px 5px;border:1px solid var(--pborder);border-radius:6px;text-align:center;font-family:var(--font)" title="跳至頁數">`;
  return `<div class="pg-bar">${btns}</div>`;
}

// ── 重點提示事項：匯入檔案分流（PDF / Excel） ──────────────────────────
function handleAlertImport(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    importMeetingPDF(file);
  } else if(['xlsx','xls','csv'].includes(ext)){
    importAlertExcel(file);
  } else {
    toast('不支援的檔案格式，請選擇 PDF 或 Excel','⚠️');
  }
}
function importAlertExcel(file){
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,raw:true});
      const wsName=wb.SheetNames.find(n=>n.includes('提示')||n.includes('議題')||n.includes('會議'))||wb.SheetNames[0];
      const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:'',raw:true});
      if(!raw.length){toast('Excel 無有效資料','⚠️');return;}
      const AMAP={
        '管理人':'manager','負責人':'manager',
        '對應單位':'unit','單位':'unit',
        '區域位置':'location','位置':'location','區域':'location',
        '內容說明':'content','缺失內容':'content','說明':'content','議題':'content',
        '限辦日期':'limitDate','期限':'limitDate','完成期限':'limitDate',
        '實際完成日期':'doneDate','完成日期':'doneDate',
        '備註事項':'remark','備註':'remark'
      };
      let added=0,skipped=0;
      raw.forEach(row=>{
        const mapped={};
        Object.entries(row).forEach(([k,v])=>{
          const fk=AMAP[k.trim()];if(!fk)return;
          if(['limitDate','doneDate'].includes(fk))mapped[fk]=excelToISO(v);
          else mapped[fk]=String(v||'').trim();
        });
        if(!mapped.content&&!mapped.unit){skipped++;return;}
        if(mapped.manager&&!S.managers.includes(mapped.manager))S.managers.push(mapped.manager);
        S.alerts.push({
          id:S.nextAlertId++,
          manager:mapped.manager||'',
          unit:mapped.unit||'',
          location:mapped.location||'',
          content:mapped.content||'',
          limitDate:mapped.limitDate||'',
          doneDate:mapped.doneDate||'',
          remark:mapped.remark||''
        });
        added++;
      });
      save();renderMain();
      toast(`Excel 匯入完成：新增 ${added} 筆，略過 ${skipped} 筆`,'📊');
      logChange('📂 提示事項匯入',`檔案：${file.name}，新增 ${added} 筆`);
    }catch(ex){toast('匯入失敗：'+ex.message,'❌');}
  };
  rd.readAsArrayBuffer(file);
}


function setupPdfImport(dropId, inpId){
  const drop=document.getElementById(dropId), inp=document.getElementById(inpId);
  if(!drop||!inp)return;
  drop.onclick=()=>inp.click();
  inp.onchange=e=>{if(e.target.files[0])importMeetingPDF(e.target.files[0]);};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])importMeetingPDF(e.dataTransfer.files[0]);};
}

async function importMeetingPDF(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){toast('請選擇 PDF 檔案','⚠️');return;}
  toast('正在解析 PDF 會議記錄，請稍候…','⏳');
  try{
    const base64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=()=>rej(new Error('讀取失敗'));
      r.readAsDataURL(file);
    });
    const resp=await fetch('https://pdf-proxy.nasa-jetta.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pdfBase64:base64,filename:file.name})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error||'Worker 錯誤 '+resp.status);
    }
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    const text=data.text||'{"items":[]}';
    let parsed;
    try{
      const clean=text.replace(/```json|```/g,'').trim();
      parsed=JSON.parse(clean);
    }catch(e){throw new Error('解析 AI 回應失敗：'+e.message);}
    const items=parsed.items||[];
    if(!items.length){toast('PDF 中未找到議題內容，請確認 PDF 格式','⚠️');return;}
    let added=0;
    items.forEach(item=>{
      if(!item.content&&!item.remark)return;
      if(item.manager&&!S.managers.includes(item.manager))S.managers.push(item.manager);
      S.alerts.push({
        id:S.nextAlertId++,
        manager:item.manager||'',
        unit:item.unit||'',
        location:item.location||'',
        content:item.content||'',
        limitDate:item.limitDate||'',
        doneDate:'',
        remark:item.remark||''
      });
      added++;
    });
    save();renderMain();
    toast('PDF 匯入完成：已新增 '+added+' 筆議題','✅');
    logChange('📄 PDF 匯入',`檔案：${file.name}，新增 ${added} 筆重點提示`);
  }catch(e){
    console.error('[PDF Import]',e);
    toast('PDF 匯入失敗：'+e.message,'❌');
  }
}

function bulkMarkDone(){
  const doneIds=[...selectedIds].filter(id=>{
    const r=S.rows.find(x=>x.id===id);
    return r&&getStatus(r)==='done';
  });
  if(!doneIds.length){toast('選取項目中沒有狀態為「已完成」的項目','⚠️');return;}
  const notDone=[...selectedIds].filter(id=>{
    const r=S.rows.find(x=>x.id===id);
    return r&&getStatus(r)!=='done';
  });
  let msg='確定將 '+doneIds.length+' 筆已完成項目移至已完成工作看板？';
  if(notDone.length)msg+='\n（另有 '+notDone.length+' 筆非完成狀態的項目將被略過）';
  if(!confirm(msg))return;
  doneIds.forEach(id=>{
    const r=S.rows.find(x=>x.id===id);
    if(!r)return;
    if(!r.actualDone)r.actualDone=todayISO();
    if(!r.actualIn)r.actualIn=r.planIn||todayISO();
    S.completed.push({...r,compId:S.nextCompId++,completedAt:todayISO()});
    S.rows=S.rows.filter(x=>x.id!==id);
    selectedIds.delete(id);
  });
  save();renderAll();
  toast('已移動 '+doneIds.length+' 筆至「已完成工作」看板 ✅');
}
function markDone(id){
  const r=S.rows.find(x=>x.id===id);
  if(!r){renderAll();return;}
  if(!confirm('確定將「'+r.issue+'」標記為完成並移至已完成工作看板？')){renderAll();return;}
  if(!r.actualDone)r.actualDone=todayISO();
  if(!r.actualIn)r.actualIn=r.planIn||todayISO();
  S.completed.push({...r,compId:S.nextCompId++,completedAt:todayISO()});
  S.rows=S.rows.filter(x=>x.id!==id);
  selectedIds.delete(id);
  // 若目前在管理人員看板展開明細，清除展開狀態（避免重繪後再次顯示已移走項目）
  if(activeTab==='mgr')selMgr=null;
  save();renderAll();
  toast('已移至「已完成工作」看板 ✅');
}

function toggleMainUnitMenu(){
  const m=document.getElementById('fUnit-menu');if(!m)return;
  const show=m.style.display==='none';
  m.style.display=show?'block':'none';
  if(show)setTimeout(()=>document.addEventListener('click',function h(e){
    const btn=document.getElementById('fUnit-btn');
    if(!m.contains(e.target)&&e.target!==btn){m.style.display='none';document.removeEventListener('click',h);}
  },{once:true}),50);
}

function filterMainKeyword(){
  const mc=document.getElementById('main-content');
  if(!mc){renderMain();return;}
  const fUnitSet=window._fUnitSet;
  const fFloor=(document.getElementById('fFloor')||{}).value||'';
  const fVendor=(document.getElementById('fVendor')||{}).value||'';
  const fZone=(document.getElementById('fZone')||{}).value||'';
  const fStatus=(document.getElementById('fStatus')||{}).value||'';
  const fMgr=(document.getElementById('fMgr')||{}).value||'';
  const fRound=(document.getElementById('fRound')||{}).value||'';
  let data=[...S.rows];
  if(fUnitSet.size>0)data=data.filter(r=>fUnitSet.has(r.unit));
  if(fFloor)data=data.filter(r=>r.floor===fFloor);
  if(fVendor)data=data.filter(r=>(r.vendor||'').includes(fVendor));
  if(fZone)data=data.filter(r=>r.zone===fZone);
  if(fStatus)data=data.filter(r=>getStatus(r)===fStatus);
  if(fMgr)data=data.filter(r=>r.manager===fMgr);
  if(fRound){if(fRound==='自檢')data=data.filter(r=>!r.round);else data=data.filter(r=>(r.round||'')===fRound);}
  const fKeyword=window._fKeyword||'';
  if(fKeyword)data=data.filter(r=>(r.issue||'').includes(fKeyword)||(r.note||'').includes(fKeyword)||(r.unit||'').includes(fKeyword)||(r.vendor||'').includes(fKeyword)||(r.manager||'').includes(fKeyword));
  if(window._fMissingDate){data=data.filter(r=>{const isDone=(S.completed instanceof Set)?S.completed.has(r.id):Array.isArray(S.completed)&&S.completed.includes(r.id);const hasDoneStatus=getStatus(r)==='done';return(isDone||hasDoneStatus)&&(!r.actualIn||!r.actualDone);});}
  if(window._fMissingVendor){data=data.filter(r=>!r.vendor);}
  const grp=r=>{const st=getStatus(r);if(st==='overdue')return 0;if(st==='done')return 2;return 1;};
  data.sort((a,b)=>grp(a)-grp(b)||a.id-b.id);
  const total=data.length,done=data.filter(r=>getStatus(r)==='done').length,over=data.filter(r=>getStatus(r)==='overdue').length,w3=data.filter(r=>getStatus(r)==='warn3').length;
  const totalFiltered=data.length,totalPages=Math.ceil(totalFiltered/PAGE_SIZE)||1;
  if(mainPage>=totalPages)mainPage=0;
  const pageData=data.slice(mainPage*PAGE_SIZE,(mainPage+1)*PAGE_SIZE);
  const visIds=pageData.map(r=>r.id);
  const allFilteredIds=data.map(r=>r.id);
  mc.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-l">總項目</div><div class="stat-v">${total}</div></div>
      <div class="stat"><div class="stat-l">已完成</div><div class="stat-v" style="color:var(--green)">${done}</div></div>
      <div class="stat"><div class="stat-l">逾期</div><div class="stat-v" style="color:var(--red)">${over}</div></div>
      <div class="stat"><div class="stat-l">3天警示</div><div class="stat-v" style="color:var(--amber)">${w3}</div></div>
    </div>
    ${bulkBarHTML(visIds,allFilteredIds)}
    ${pgBarHTML(totalFiltered,mainPage,'setMainPage')}${tblHTML(pageData,true,allFilteredIds)}${pgBarHTML(totalFiltered,mainPage,'setMainPage')}
  `;
  wireBulk();
}
function renderMain(){
  const fUnitSet=window._fUnitSet;

  const fVendor=(document.getElementById('fVendor')||{}).value||'';

  const fStatus=(document.getElementById('fStatus')||{}).value||'';
  const fMgr=(document.getElementById('fMgr')||{}).value||'';
  const fRound=(document.getElementById('fRound')||{}).value||'';
  let data=[...S.rows];
  if(fUnitSet.size>0)data=data.filter(r=>fUnitSet.has(r.unit));
  if(fFloor)data=data.filter(r=>r.floor===fFloor);
  if(fVendor)data=data.filter(r=>(r.vendor||'').includes(fVendor));
  if(fZone)data=data.filter(r=>r.zone===fZone);
  if(fStatus)data=data.filter(r=>getStatus(r)===fStatus);
  if(fMgr)data=data.filter(r=>r.manager===fMgr);
  if(fRound){if(fRound==='自檢')data=data.filter(r=>!r.round);else data=data.filter(r=>(r.round||'')===fRound);}
  const fKeyword=window._fKeyword||'';

  if(window._fMissingDate){
    data=data.filter(r=>{const isDone=(S.completed instanceof Set)?S.completed.has(r.id):Array.isArray(S.completed)&&S.completed.includes(r.id);const hasDoneStatus=getStatus(r)==='done';return(isDone||hasDoneStatus)&&(!r.actualIn||!r.actualDone);});
  }
  if(window._fMissingVendor){
    data=data.filter(r=>!r.vendor);
  }

  // ── 自動排序：逾期頂置 > 非完成 > 已完成置底 ──────────────────────
  // 群組：0=逾期  1=進行中/未開始  2=已完成(done但仍在rows)
  const grp=r=>{
    const st=getStatus(r);
    if(st==='overdue')return 0;
    if(st==='done')return 2;
    return 1;
  };
  // 逾期：廠商(S.vendors順序) > 延遲天數多→少(du越小越逾期)
  // 進行中/未開始：廠商 > planDone由近到遠
  // 已完成：廠商 > actualDone由近到遠
  const vIdx=v=>{
    const i=S.vendors.indexOf(v);
    return i>=0?i:999;
  };
  data.sort((a,b)=>{
    const ga=grp(a),gb=grp(b);
    if(ga!==gb)return ga-gb;
    const va=vIdx(a.vendor||''),vb=vIdx(b.vendor||'');
    if(va!==vb)return va-vb;
    if(ga===0){
      // 逾期：延遲天數多到少（du越負越嚴重）
      const da=du(a.planDone)??0,db=du(b.planDone)??0;
      return da-db; // 負更多的（更逾期）排前面
    }
    if(ga===2){
      // 已完成：完成日期近到遠
      return (a.actualDone||'9999').localeCompare(b.actualDone||'9999');
    }
    // 進行中/未開始：planDone 近到遠
    return (a.planDone||'9999').localeCompare(b.planDone||'9999');
  });
  // ────────────────────────────────────────────────────────────────────

  const total=S.rows.length,done=S.rows.filter(r=>r.actualDone).length;
  const over=S.rows.filter(r=>getStatus(r)==='overdue').length;
  const w3=S.rows.filter(r=>{const d=du(r.planDone);return d!==null&&d>=0&&d<=3&&!r.actualDone}).length;
  const units=uniqueUnits();
  const floors=[...new Set(S.rows.map(r=>r.floor).filter(Boolean))].sort((a,b)=>_floorRank(a)-_floorRank(b));
  const unitBtnLabel=fUnitSet.size===0?'全部戶別':fUnitSet.size===1?[...fUnitSet][0]:`戶別（${fUnitSet.size}）`;
